    // === RENDERING ===
    function resizeCanvas() {
      const wrapper = document.getElementById('canvas-wrapper');
      const maxW = wrapper.clientWidth;
      const maxH = wrapper.clientHeight;
      // Compute cellSize in physical pixels so canvas internals match DPR scaling
      cellSize = Math.floor(Math.min((maxW * dpr) / COLS, (maxH * dpr) / ROWS));
      // Canvas renders at full physical pixel resolution
      canvas.width = COLS * cellSize;
      canvas.height = ROWS * cellSize;
      // CSS size is smaller (CSS pixels = physical / dpr)
      canvas.style.width = `${COLS * cellSize / dpr}px`;
      canvas.style.height = `${ROWS * cellSize / dpr}px`;
    }

    function render() {
      ctx.save();

      if (screenShake.duration > 0) {
        screenShake.x = (Math.random() - 0.5) * 4;
        screenShake.y = (Math.random() - 0.5) * 4;
        ctx.translate(screenShake.x, screenShake.y);
      }

      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawPath();
      drawPathFlow();
      drawTowers();
      drawEnemies();
      drawProjectiles();
      drawDeathParticles();
      drawHitNumbers();
      drawSpawnAndBase();

      if (flashTiles.length > 0) {
        for (let i = flashTiles.length - 1; i >= 0; i--) {
          const ft = flashTiles[i];
          ft.elapsed += 1 / 60;
          if (ft.elapsed >= ft.duration / 1000) {
            flashTiles.splice(i, 1);
          } else {
            ctx.fillStyle = ft.color;
            ctx.fillRect(ft.col * cellSize + 1, ft.row * cellSize + 1, cellSize - 2, cellSize - 2);
          }
        }
      }

      // Wave preview overlay
      if (gameState === GameStates.WAVE_ACTIVE && previewTimer > 0) {
        drawWavePreview();
      }

      // Power-up visual effects
      if (bossWarningFlash > 0) {
        // Red edge vignette
        const gradient = ctx.createRadialGradient(
          canvas.width/2, canvas.height/2, canvas.width * 0.3,
          canvas.width/2, canvas.height/2, canvas.width * 0.8
        );
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(1, `rgba(180,0,0,${bossWarningFlash * 0.6})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Warning text
        if (bossWarningTimer > 0.5) {
          ctx.save();
          ctx.font = `bold ${cellSize * 2}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ff0000';
          ctx.shadowColor = '#ff0000';
          ctx.shadowBlur = 20;
          ctx.fillText('⚠ BOSS INCOMING ⚠', canvas.width/2, canvas.height/2);
          ctx.restore();
        }
      }

      if (powerFreezeTimer > 0) {
        ctx.fillStyle = 'rgba(68,136,255,0.12)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      if (powerBoostTimer > 0) {
        // Pulsing glow on towers
        const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
        for (const tower of towers) {
          const cx = tower.col * cellSize + cellSize / 2;
          const cy = tower.row * cellSize + cellSize / 2;
          ctx.beginPath();
          ctx.arc(cx, cy, cellSize * 0.8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,215,0,${pulse * 0.2})`;
          ctx.fill();
        }
      }
      if (powerFlashTimer > 0) {
        const el = document.getElementById('power-flash');
        if (el) {
          el.textContent = powerFlashText;
          el.style.color = powerFlashColor;
          el.style.opacity = Math.min(powerFlashTimer * 2, 1).toString();
        }
      } else {
        const el = document.getElementById('power-flash');
        if (el) el.style.opacity = '0';
      }

      ctx.restore();
    }

    function drawGrid() {
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 1;
      for (let row = 0; row <= ROWS; row++) {
        ctx.beginPath();
        ctx.moveTo(0, row * cellSize);
        ctx.lineTo(canvas.width, row * cellSize);
        ctx.stroke();
      }
      for (let col = 0; col <= COLS; col++) {
        ctx.beginPath();
        ctx.moveTo(col * cellSize, 0);
        ctx.lineTo(col * cellSize, canvas.height);
        ctx.stroke();
      }
    }

    function drawPath() {
      for (const tile of pathTiles) {
        let color = '#2d2d44';
        let borderColor = '#4a4a6a';

        if (pathInvalidFlash > 0 && !validatePath()) {
          color = '#ff4444';
          borderColor = '#ff6666';
        }

        ctx.fillStyle = color;
        ctx.fillRect(tile.col * cellSize + 1, tile.row * cellSize + 1, cellSize - 2, cellSize - 2);
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 2;
        ctx.strokeRect(tile.col * cellSize + 2, tile.row * cellSize + 2, cellSize - 4, cellSize - 4);
      }
    }

    // Animated flow indicators: dashed trail + arrow markers along connected path
    function drawPathFlow() {
      if (gameState !== GameStates.PLANNING) return;  // hide once wave starts
      if (pathTiles.length === 0 || !validatePath()) return;

      const ordered = getOrderedPath();
      if (ordered.length === 0) return;

      const now = Date.now();
      const t = (now / 2000) % 1; // 0-1 flowing animation cycle

      // Draw flowing dots along the path
      for (let i = 0; i < ordered.length; i++) {
        const tile = ordered[i];
        const cx = (tile.col + 0.5) * cellSize;
        const cy = (tile.row + 0.5) * cellSize;

        // Direction arrow on each tile
        let dx = 0, dy = 0;
        if (i < ordered.length - 1) {
          dx = ordered[i + 1].col - tile.col;
          dy = ordered[i + 1].row - tile.row;
        } else {
          // Last tile: direction to BASE
          dx = BASE_POS.col - tile.col;
          dy = BASE_POS.row - tile.row;
        }
        const angle = Math.atan2(dy, dx);

        // Pulsing dot flowing along the path
        const dotPhase = (i / ordered.length + t) % 1;
        const dotDist = dotPhase * ordered.length;
        const dotIdx = Math.floor(dotDist);
        if (dotIdx < ordered.length - 1) {
          const t2 = dotDist - dotIdx;
          const from = ordered[dotIdx];
          const to = dotIdx < ordered.length - 1 ? ordered[dotIdx + 1] : { col: BASE_POS.col, row: BASE_POS.row };
          const fx = from.col + (to.col - from.col) * t2 + 0.5;
          const fy = from.row + (to.row - from.row) * t2 + 0.5;
          const pulse = Math.sin(t * Math.PI * 2) * 0.3 + 0.7;
          ctx.beginPath();
          ctx.arc(fx * cellSize, fy * cellSize, cellSize * 0.1 * pulse, 0, Math.PI * 2);
          ctx.fillStyle = '#4ade80';
          ctx.shadowColor = '#4ade80';
          ctx.shadowBlur = 6;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Small arrow marker on tile
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.fillStyle = 'rgba(74,222,128,0.5)';
        ctx.beginPath();
        ctx.moveTo(cellSize * 0.25, 0);
        ctx.lineTo(-cellSize * 0.1, -cellSize * 0.12);
        ctx.lineTo(-cellSize * 0.1, cellSize * 0.12);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      // Draw dashed flow line through center of path tiles
      if (ordered.length >= 2) {
        ctx.save();
        ctx.strokeStyle = 'rgba(74,222,128,0.2)';
        ctx.lineWidth = cellSize * 0.06;
        ctx.setLineDash([cellSize * 0.15, cellSize * 0.15]);
        ctx.lineDashOffset = 0;  // static dashed line, no animation
        ctx.beginPath();
        ctx.moveTo((ordered[0].col + 0.5) * cellSize, (ordered[0].row + 0.5) * cellSize);
        for (let i = 1; i < ordered.length; i++) {
          ctx.lineTo((ordered[i].col + 0.5) * cellSize, (ordered[i].row + 0.5) * cellSize);
        }
        ctx.lineTo((BASE_POS.col + 0.5) * cellSize, (BASE_POS.row + 0.5) * cellSize);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    // Static path flow: dashed line + arrows, no animation
    function drawPathFlow() {
      if (gameState !== GameStates.PLANNING) return;
      if (pathTiles.length === 0 || !validatePath()) return;
      const ordered = getOrderedPath();
      if (ordered.length === 0) return;

      // Smooth dot traveling the full path in ~5s
      const now = Date.now();
      const cycle = 5000; // 5 seconds per loop
      const t = (now % cycle) / cycle; // 0..1
      const pathLen = ordered.length;
      const dotPos = t * pathLen;
      const fromIdx = Math.floor(dotPos) % pathLen;
      const frac = dotPos - Math.floor(dotPos);
      const a = ordered[fromIdx];
      let b = fromIdx < pathLen - 1 ? ordered[fromIdx + 1] : { col: BASE_POS.col, row: BASE_POS.row };
      const fx = (a.col + (b.col - a.col) * frac + 0.5) * cellSize;
      const fy = (a.row + (b.row - a.row) * frac + 0.5) * cellSize;
      const pulse = Math.sin(t * Math.PI * 2) * 0.3 + 0.7;
      ctx.save();
      ctx.beginPath();
      ctx.arc(fx, fy, cellSize * 0.12 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = '#4ade80';
      ctx.shadowColor = '#4ade80';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.restore();

      // Direction arrows on each tile
      for (let i = 0; i < ordered.length; i++) {
        const tile = ordered[i];
        const cx = (tile.col + 0.5) * cellSize;
        const cy = (tile.row + 0.5) * cellSize;
        let dx = 0, dy = 0;
        if (i < ordered.length - 1) {
          dx = ordered[i + 1].col - tile.col;
          dy = ordered[i + 1].row - tile.row;
        } else {
          dx = BASE_POS.col - tile.col;
          dy = BASE_POS.row - tile.row;
        }
        const angle = Math.atan2(dy, dx);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.fillStyle = 'rgba(74,222,128,0.4)';
        ctx.beginPath();
        ctx.moveTo(cellSize * 0.2, 0);
        ctx.lineTo(-cellSize * 0.1, -cellSize * 0.1);
        ctx.lineTo(-cellSize * 0.1, cellSize * 0.1);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      // Static dashed line through path center
      ctx.save();
      ctx.strokeStyle = 'rgba(74,222,128,0.12)';
      ctx.lineWidth = cellSize * 0.06;
      ctx.setLineDash([cellSize * 0.2, cellSize * 0.2]);
      ctx.beginPath();
      ctx.moveTo((ordered[0].col + 0.5) * cellSize, (ordered[0].row + 0.5) * cellSize);
      for (let i = 1; i < ordered.length; i++) {
        ctx.lineTo((ordered[i].col + 0.5) * cellSize, (ordered[i].row + 0.5) * cellSize);
      }
      ctx.lineTo((BASE_POS.col + 0.5) * cellSize, (BASE_POS.row + 0.5) * cellSize);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // Draws a small tower preview on a named canvas element (for HOW TO PLAY screen)
    function drawTowerPreview(canvasId, type, color) {
      const c = document.getElementById(canvasId);
      if (!c) return;
      const ctx = c.getContext('2d');
      const w = c.width;
      const h = c.height;
      const cx = w / 2;
      const cy = h / 2;
      const baseSize = Math.min(w, h) * 0.75;
      ctx.clearRect(0, 0, w, h);

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;

      if (type === 'TURRET') {
        ctx.fillStyle = '#1a2a3a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.1, cy - baseSize * 0.1, baseSize * 0.65, baseSize * 0.2);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = '#0a1520';
        ctx.fill();
      } else if (type === 'CANNON') {
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.strokeRect(cx - baseSize / 2 + 2, cy - baseSize / 2 + 2, baseSize - 4, baseSize - 4);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.05, cy - baseSize * 0.18, baseSize * 0.5, baseSize * 0.36);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = '#1a0a00';
        ctx.fill();
      } else if (type === 'SNIPER') {
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx + baseSize / 2 - baseSize * 0.15, cy - baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx - baseSize / 2, cy + baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx + baseSize / 2 - baseSize * 0.15, cy + baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.05, cy - baseSize * 0.07, baseSize * 0.9, baseSize * 0.14);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy - baseSize * 0.28, baseSize * 0.1, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = '#200a0a';
        ctx.fill();
      } else if (type === 'FROST') {
        ctx.translate(cx, cy);
        ctx.rotate(Math.PI / 6);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.48;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0a1a3a';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.28;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * baseSize * 0.45, Math.sin(a) * baseSize * 0.45);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(0, 0, baseSize * 0.1, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.fill();
      }
      ctx.restore();
    }

    function drawTowers() {
      for (const tower of towers) {
        const cx = tower.col * cellSize + cellSize / 2;
        const cy = tower.row * cellSize + cellSize / 2;
        const baseSize = cellSize * 0.7;
        const boosted = powerBoostTimer > 0;
        const frozen = powerFreezeTimer > 0;

        // Range indicator when tower is selected (tap in PLANNING)
        if (selectedTower === tower) {
          ctx.beginPath();
          ctx.arc(cx, cy, tower.range * cellSize, 0, Math.PI * 2);
          ctx.strokeStyle = tower.color + '66';
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = tower.color + '11';
          ctx.fill();
        }

        ctx.save();
        ctx.translate(cx, cy);

        // Glow
        ctx.shadowColor = tower.color;
        ctx.shadowBlur = boosted ? 25 : 12;

        if (tower.type === 'TURRET') {
          // Dark base square
          ctx.fillStyle = '#1a2a3a';
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);

          // Rotating turret head
          ctx.rotate(tower.angle);
          const recoilOffset = tower.recoil * 3;

          // Barrel
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize * 0.1, -baseSize * 0.1, baseSize * 0.65 - recoilOffset, baseSize * 0.2);

          // Circular body
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.28, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.fill();

          // Inner circle
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.15, 0, Math.PI * 2);
          ctx.fillStyle = '#0a1520';
          ctx.fill();

          // Muzzle flash
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash;
            ctx.beginPath();
            ctx.arc(baseSize * 0.65 - recoilOffset, 0, baseSize * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

        } else if (tower.type === 'CANNON') {
          // Chunky dark base
          ctx.fillStyle = '#2a1a0a';
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);

          // Thick border
          ctx.strokeStyle = tower.color;
          ctx.lineWidth = 3;
          ctx.strokeRect(-baseSize / 2 + 2, -baseSize / 2 + 2, baseSize - 4, baseSize - 4);

          ctx.rotate(tower.angle);
          const recoilOffset = tower.recoil * 4;

          // Short thick barrel
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize * 0.05, -baseSize * 0.18, baseSize * 0.5 - recoilOffset, baseSize * 0.36);

          // Body circle
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.3, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.fill();

          // Inner dark
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.18, 0, Math.PI * 2);
          ctx.fillStyle = '#1a0a00';
          ctx.fill();

          // Muzzle flash
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash * 0.9;
            ctx.beginPath();
            ctx.arc(baseSize * 0.5 - recoilOffset, 0, baseSize * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc44';
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 25;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

        } else if (tower.type === 'SNIPER') {
          // Dark base
          ctx.fillStyle = '#1a0a0a';
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);

          // Red accent corners
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize * 0.15, baseSize * 0.15);
          ctx.fillRect(baseSize / 2 - baseSize * 0.15, -baseSize / 2, baseSize * 0.15, baseSize * 0.15);
          ctx.fillRect(-baseSize / 2, baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
          ctx.fillRect(baseSize / 2 - baseSize * 0.15, baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);

          ctx.rotate(tower.angle);
          const recoilOffset = tower.recoil * 2;

          // Very long thin barrel
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize * 0.05, -baseSize * 0.07, baseSize * 0.9 - recoilOffset, baseSize * 0.14);

          // Body
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.22, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.fill();

          // Scope
          ctx.beginPath();
          ctx.arc(0, -baseSize * 0.28, baseSize * 0.1, 0, Math.PI * 2);
          ctx.strokeStyle = tower.color;
          ctx.lineWidth = 2;
          ctx.stroke();

          // Scope glint
          ctx.beginPath();
          ctx.arc(-baseSize * 0.03, -baseSize * 0.28, baseSize * 0.03, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.fill();

          // Inner body
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.12, 0, Math.PI * 2);
          ctx.fillStyle = '#200a0a';
          ctx.fill();

          // Muzzle flash (small and sharp)
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash;
            ctx.beginPath();
            ctx.arc(baseSize * 0.9 - recoilOffset, 0, baseSize * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

        } else if (tower.type === 'FROST') {
          // Hexagonal crystal shape
          ctx.rotate(tower.angle + Math.PI / 6); // Rotate for crystal orientation

          // Crystal glow aura
          const pulse = Math.sin(Date.now() / 400) * 0.15 + 0.85;
          ctx.globalAlpha = frozen ? 0.3 : 0.6 * pulse;
          ctx.fillStyle = tower.color;
          ctx.shadowBlur = boosted ? 30 : 18;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            const r = baseSize * 0.48;
            if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();
          ctx.globalAlpha = 1;

          // Inner crystal
          ctx.fillStyle = '#0a1a3a';
          ctx.shadowBlur = 0;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            const r = baseSize * 0.28;
            if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();

          // Crystal shard lines
          ctx.strokeStyle = tower.color;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.5;
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * baseSize * 0.45, Math.sin(a) * baseSize * 0.45);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;

          // Center glow
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.1, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.shadowColor = tower.color;
          ctx.shadowBlur = 10;
          ctx.fill();

          // Frost muzzle flash
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash * 0.8;
            ctx.beginPath();
            ctx.arc(baseSize * 0.45, 0, baseSize * 0.18, 0, Math.PI * 2);
            ctx.fillStyle = '#aaeeff';
            ctx.shadowColor = '#aaeeff';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        const cx = (enemy.col + 0.5) * cellSize;
        const cy = (enemy.row + 0.5) * cellSize;
        let radius = cellSize * 0.32;
        if (enemy.shape === 'medium') radius = cellSize * 0.36;
        if (enemy.shape === 'large') radius = cellSize * 0.46;
        if (enemy.isBoss) radius = cellSize * 0.55;

        if (enemy.dying) {
          // Expanding white circle death flash
          const scale = 1 + (enemy.deathTimer / 0.15) * 1.5;
          ctx.globalAlpha = 1 - enemy.deathTimer / 0.15;
          ctx.fillStyle = '#ffffff';
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 20;
          ctx.beginPath();
          ctx.arc(cx, cy, radius * scale, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
          continue;
        }

        // Frost slow visual - blue tint overlay with ice shards
        if (enemy.slowTimer > 0) {
          const frostAlpha = 0.3;
          const frostRadius = radius * 1.3;

          // Blue glow circle
          ctx.globalAlpha = frostAlpha;
          ctx.fillStyle = '#4488ff';
          ctx.shadowColor = '#4488ff';
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(cx, cy, frostRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;

          // Ice crystal shards around the enemy
          ctx.save();
          ctx.translate(cx, cy);
          const shardCount = 6;
          const frozenAngle = enemy.angle || 0;
          ctx.rotate(frozenAngle);
          ctx.strokeStyle = '#88ccff';
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.6;
          for (let s = 0; s < shardCount; s++) {
            const a = (s / shardCount) * Math.PI * 2;
            const innerR = radius * 0.9;
            const outerR = radius * 1.4;
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * innerR, Math.sin(a) * innerR);
            ctx.lineTo(Math.cos(a) * outerR, Math.sin(a) * outerR);
            ctx.stroke();
            // Small crystal tip
            ctx.beginPath();
            ctx.moveTo(Math.cos(a - 0.3) * outerR, Math.sin(a - 0.3) * outerR);
            ctx.lineTo(Math.cos(a) * outerR * 1.15, Math.sin(a) * outerR * 1.15);
            ctx.lineTo(Math.cos(a + 0.3) * outerR, Math.sin(a + 0.3) * outerR);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
          ctx.restore();
        }

        // === Draw speed trail (ghosts) ===
        const trail = enemy.trail || [];
        for (let t = 0; t < trail.length; t++) {
          const tp = trail[t];
          const tx = (tp.col + 0.5) * cellSize;
          const ty = (tp.row + 0.5) * cellSize;
          let trailOpacity = 0;
          if (enemy.type === 'SCOUT') {
            trailOpacity = [0.35, 0.15][t] || 0;
          } else if (enemy.type === 'SOLDIER') {
            trailOpacity = [0.3][t] || 0;
          } else if (enemy.type === 'SPEEDSTER') {
            trailOpacity = [0.5, 0.25, 0.1][t] || 0;
          } else if (enemy.isBoss) {
            trailOpacity = [0.3, 0.15][t] || 0;
          }
          if (trailOpacity > 0) {
            ctx.globalAlpha = trailOpacity;
            ctx.save();
            ctx.translate(tx, ty);
            ctx.rotate(tp.angle || 0);
            drawEnemyShape(enemy.type, radius * 0.9, enemy.color, true, enemy.bossRotation);
            ctx.restore();
          }
        }
        ctx.globalAlpha = 1;

        // === Draw main enemy body ===
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(enemy.angle || 0);

        // Boss pulsing glow
        if (enemy.isBoss) {
          const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
          ctx.shadowColor = '#aa44ff';
          ctx.shadowBlur = 20 + pulse * 15;
        } else {
          ctx.shadowColor = enemy.color;
          ctx.shadowBlur = 6;
        }

        // Draw the appropriate shape for this enemy type
        drawEnemyShape(enemy.type, radius, enemy.color, false, enemy.bossRotation);

        ctx.shadowBlur = 0;
        ctx.restore();

        // === Thin HP bar (2px, semi-transparent) ===
        const hpPct = enemy.hp / enemy.maxHP;
        const barW = radius * 2.2;
        const barH = 2;
        const barX = cx - barW / 2;
        const barY = cy - radius - 10;
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffff44' : '#ff4444';
        ctx.fillRect(barX, barY, barW * hpPct, barH);
        ctx.globalAlpha = 1;
      }
    }

    // Helper function to draw enemy shapes (assumes ctx is already translated and rotated)
    function drawEnemyShape(type, radius, color, isTrail, bossRotation) {
      const bodyColor = color;
      const innerColor = lightenColor(color, 0.3);
      const darkColor = darkenColor(color, 0.3);

      if (type === 'SCOUT') {
        // Pointed arrow/dart shape pointing right (in movement direction)
        ctx.beginPath();
        // Arrow pointing right: tip at front, wings at back
        ctx.moveTo(radius * 1.1, 0); // Tip
        ctx.lineTo(radius * 0.2, -radius * 0.5); // Top wing
        ctx.lineTo(radius * 0.4, 0); // Back indent
        ctx.lineTo(radius * 0.2, radius * 0.5); // Bottom wing
        ctx.closePath();
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Inner highlight
        if (!isTrail) {
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          ctx.moveTo(radius * 0.8, 0);
          ctx.lineTo(radius * 0.3, -radius * 0.25);
          ctx.lineTo(radius * 0.4, 0);
          ctx.lineTo(radius * 0.3, radius * 0.25);
          ctx.closePath();
          ctx.fill();
        }

      } else if (type === 'SOLDIER') {
        // Diamond/rhombus shape
        ctx.beginPath();
        ctx.moveTo(radius * 1.0, 0); // Right point
        ctx.lineTo(0, -radius * 0.7); // Top
        ctx.lineTo(-radius * 0.8, 0); // Left point
        ctx.lineTo(0, radius * 0.7); // Bottom
        ctx.closePath();
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Inner diamond highlight
        if (!isTrail) {
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          ctx.moveTo(radius * 0.5, 0);
          ctx.lineTo(0, -radius * 0.35);
          ctx.lineTo(-radius * 0.4, 0);
          ctx.lineTo(0, radius * 0.35);
          ctx.closePath();
          ctx.fill();

          // Dark center
          ctx.fillStyle = darkColor;
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.2, 0, Math.PI * 2);
          ctx.fill();
        }

      } else if (type === 'TANK') {
        // Chunky rounded hexagon / armored square
        const size = radius * 0.9;
        ctx.beginPath();
        // Rounded square shape
        const corner = size * 0.3;
        ctx.moveTo(-size + corner, -size);
        ctx.lineTo(size - corner, -size);
        ctx.quadraticCurveTo(size, -size, size, -size + corner);
        ctx.lineTo(size, size - corner);
        ctx.quadraticCurveTo(size, size, size - corner, size);
        ctx.lineTo(-size + corner, size);
        ctx.quadraticCurveTo(-size, size, -size, size - corner);
        ctx.lineTo(-size, -size + corner);
        ctx.quadraticCurveTo(-size, -size, -size + corner, -size);
        ctx.closePath();
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Thick armored border
        ctx.strokeStyle = '#bbbbbb';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Inner darker plating
        if (!isTrail) {
          ctx.fillStyle = darkColor;
          const innerSize = size * 0.55;
          ctx.beginPath();
          ctx.moveTo(-innerSize + corner * 0.5, -innerSize);
          ctx.lineTo(innerSize - corner * 0.5, -innerSize);
          ctx.quadraticCurveTo(innerSize, -innerSize, innerSize, -innerSize + corner * 0.5);
          ctx.lineTo(innerSize, innerSize - corner * 0.5);
          ctx.quadraticCurveTo(innerSize, innerSize, innerSize - corner * 0.5, innerSize);
          ctx.lineTo(-innerSize + corner * 0.5, innerSize);
          ctx.quadraticCurveTo(-innerSize, innerSize, -innerSize, innerSize - corner * 0.5);
          ctx.lineTo(-innerSize, -innerSize + corner * 0.5);
          ctx.quadraticCurveTo(-innerSize, -innerSize, -innerSize + corner * 0.5, -innerSize);
          ctx.closePath();
          ctx.fill();

          // Armored rivets / bolts
          ctx.fillStyle = '#cccccc';
          const rivetR = radius * 0.08;
          const rivetDist = size * 0.65;
          ctx.beginPath();
          ctx.arc(-rivetDist, -rivetDist, rivetR, 0, Math.PI * 2);
          ctx.arc(rivetDist, -rivetDist, rivetR, 0, Math.PI * 2);
          ctx.arc(-rivetDist, rivetDist, rivetR, 0, Math.PI * 2);
          ctx.arc(rivetDist, rivetDist, rivetR, 0, Math.PI * 2);
          ctx.fill();
        }

      } else if (type === 'SPEEDSTER') {
        // Elongated ellipse / oval pointing forward
        ctx.beginPath();
        ctx.ellipse(0, 0, radius * 1.3, radius * 0.55, 0, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Inner highlight stripe
        if (!isTrail) {
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          ctx.ellipse(radius * 0.15, 0, radius * 0.7, radius * 0.25, 0, 0, Math.PI * 2);
          ctx.fill();

          // Motion lines
          ctx.strokeStyle = innerColor;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.5;
          for (let m = 0; m < 3; m++) {
            const offset = (m - 1) * radius * 0.25;
            ctx.beginPath();
            ctx.moveTo(-radius * 1.1, offset);
            ctx.lineTo(-radius * 0.6, offset);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }

      } else if (type === 'BOSS') {
        // Large circle with crown/spike accents
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();

        if (!isTrail) {
          // Crown spikes around the edge
          ctx.save();
          ctx.rotate(bossRotation || 0);
          const spikeCount = 8;
          ctx.fillStyle = lightenColor(bodyColor, 0.4);
          for (let s = 0; s < spikeCount; s++) {
            const a = (s / spikeCount) * Math.PI * 2;
            ctx.save();
            ctx.rotate(a);
            ctx.beginPath();
            ctx.moveTo(radius * 0.7, 0);
            ctx.lineTo(radius * 1.15, -radius * 0.15);
            ctx.lineTo(radius * 1.15, radius * 0.15);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
          ctx.restore();

          // Rotating inner star/triangle pattern
          ctx.save();
          ctx.rotate((bossRotation || 0) * 0.7);
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          for (let s = 0; s < 3; s++) {
            const a = (s / 3) * Math.PI * 2 - Math.PI / 2;
            const r = radius * 0.55;
            if (s === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();

          // Pulsing white ring
          const pulse = Math.sin(Date.now() / 150) * 0.3 + 0.7;
          ctx.strokeStyle = `rgba(255, 255, 255, ${pulse * 0.6})`;
          ctx.lineWidth = 2.5;
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(0, 0, radius * 1.05, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;

          // Dark core
          ctx.fillStyle = darkenColor(bodyColor, 0.4);
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.35, 0, Math.PI * 2);
          ctx.fill();

          // Glowing core center
          ctx.fillStyle = lightenColor(bodyColor, 0.5);
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.15, 0, Math.PI * 2);
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 8;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
    }

    // Color utility functions
    function lightenColor(hex, amount) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.min(255, (num >> 16) + Math.round(255 * amount));
      const g = Math.min(255, ((num >> 8) & 0x00FF) + Math.round(255 * amount));
      const b = Math.min(255, (num & 0x0000FF) + Math.round(255 * amount));
      return `rgb(${r},${g},${b})`;
    }

    function darkenColor(hex, amount) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.max(0, (num >> 16) - Math.round(255 * amount));
      const g = Math.max(0, ((num >> 8) & 0x00FF) - Math.round(255 * amount));
      const b = Math.max(0, (num & 0x0000FF) - Math.round(255 * amount));
      return `rgb(${r},${g},${b})`;
    }

    function drawProjectiles() {
      for (const proj of projectiles) {
        for (let i = 0; i < proj.trail.length; i++) {
          const t = proj.trail[i];
          ctx.fillStyle = proj.color;
          ctx.globalAlpha = 0.3 - i * 0.1;
          ctx.beginPath();
          ctx.arc((t.col) * cellSize, (t.row) * cellSize, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.fillStyle = proj.color;
        ctx.shadowColor = proj.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(proj.col * cellSize, proj.row * cellSize, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function drawSpawnAndBase() {
      const spawnCx = (SPAWN_POS.col + 0.5) * cellSize;
      const spawnCy = (SPAWN_POS.row + 0.5) * cellSize;
      const baseCx = (BASE_POS.col + 0.5) * cellSize;
      const baseCy = (BASE_POS.row + 0.5) * cellSize;
      const size = cellSize * 0.7;

      const spawnPulse = Math.sin(Date.now() / 300) * 0.15 + 1;
      ctx.fillStyle = '#44ff44';
      ctx.shadowColor = '#44ff44';
      ctx.shadowBlur = 15;
      ctx.fillRect(spawnCx - size * spawnPulse / 2, spawnCy - size * spawnPulse / 2, size * spawnPulse, size * spawnPulse);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a0f';
      ctx.font = `bold ${cellSize * 0.35}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', spawnCx, spawnCy);

      const basePulse = Math.sin(Date.now() / 300) * 0.15 + 1;
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 15;
      ctx.fillRect(baseCx - size * basePulse / 2, baseCy - size * basePulse / 2, size * basePulse, size * basePulse);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a0f';
      ctx.fillText('B', baseCx, baseCy);
    }

    function getWavePreviewLines() {
      if (currentWave <= BASE_WAVES) {
        const def = WAVE_DEFINITIONS[currentWave - 1];
        const counts = {};
        for (const g of def) {
          counts[g.type] = (counts[g.type] || 0) + g.count;
        }
        return Object.entries(counts).map(([type, count]) => {
          const label = type.charAt(0) + type.slice(1).toLowerCase();
          const color = ENEMY_TYPES[type].color;
          return { text: `${count} ${label}`, color };
        });
      } else {
        return [{ text: 'ENDLESS — SURVIVE!', color: '#aa44ff' }];
      }
    }

    function drawWavePreview() {
      // Dark overlay
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const lines = getWavePreviewLines();
      const centerX = canvas.width / 2;
      const waveY = canvas.height / 2 - (lines.length + 1) * cellSize * 1.4;

      // Wave label — large, centered
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${cellSize * 2}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#4ade80';
      ctx.shadowBlur = 20;
      const waveLabel = currentWave <= BASE_WAVES ? `WAVE ${currentWave}` : `WAVE ${currentWave} ∞`;
      ctx.fillText(waveLabel, centerX, waveY);
      ctx.shadowBlur = 0;

      // Enemy count lines
      ctx.font = `bold ${cellSize * 0.9}px -apple-system, sans-serif`;
      lines.forEach((line, i) => {
        const y = waveY + (i + 1) * cellSize * 1.4;
        const textWidth = ctx.measureText(line.text).width;

        // Color dot indicator
        ctx.fillStyle = line.color;
        ctx.shadowColor = line.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(centerX - textWidth / 2 - cellSize * 0.5, y, cellSize * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Enemy label
        ctx.fillStyle = '#ffffff';
        ctx.fillText(line.text, centerX, y);
      });

      // Countdown progress bar
      const barWidth = canvas.width * 0.5;
      const barHeight = 6;
      const barX = (canvas.width - barWidth) / 2;
      const barY = canvas.height / 2 + (lines.length + 1.5) * cellSize * 1.4;
      const progress = previewTimer / WAVE_PREVIEW_DURATION;

      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(barX, barY, barWidth, barHeight);
      ctx.fillStyle = '#4ade80';
      ctx.shadowColor = '#4ade80';
      ctx.shadowBlur = 8;
      ctx.fillRect(barX, barY, barWidth * progress, barHeight);
      ctx.shadowBlur = 0;
    }

    // === GAME LOOP ===
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;

      // Always render regardless of state
      // Game logic updates only when WAVE_ACTIVE (not when PAUSED, PLANNING, MENU, etc.)
      if (gameState === GameStates.WAVE_ACTIVE) {
        updateWave(dt);
        updateTowers(dt);
        updateEnemies(dt);
        updateProjectiles(dt);
        updateHUD();
      } else if (gameState === GameStates.PAUSED) {
        // Frozen - no updates, just keep rendering
        console.log('[GAMELOOP] PAUSED state - game logic frozen');
      }

      if (pathInvalidFlash > 0) {
        pathInvalidFlash -= dt;
      }

      if (screenShake.duration > 0) {
        screenShake.duration -= dt;
      }

      // Boss warning effect timers
      if (bossWarningTimer > 0) bossWarningTimer -= dt;
      if (bossWarningFlash > 0) bossWarningFlash -= dt * 3;
      // Tower range indicator auto-hide after 2s
      if (towerRangeTimer > 0) {
        towerRangeTimer -= dt;
        if (towerRangeTimer <= 0) { selectedTower = null; }
      }

      // Death particles update (always run, even when paused)
      updateDeathParticles(dt);
      updateHitNumbers(dt);

      // Power-up timers
      if (powerFreezeTimer > 0) powerFreezeTimer -= dt;
      if (powerBoostTimer > 0) powerBoostTimer -= dt;
      if (powerFlashTimer > 0) powerFlashTimer -= dt;
      updatePowerButtons();

      render();
      requestAnimationFrame(gameLoop);
    }

    // === INIT ===
    function init() {
      // Load high scores from localStorage
      bestWave = parseInt(localStorage.getItem('vibe-bestWave') || '0');
      bestScore = parseInt(localStorage.getItem('vibe-bestScore') || '0');

      resizeCanvas();
      initGrid();
      initTowers();
      updateHUD();

      window.addEventListener('resize', resizeCanvas);

      setupInput();

      updateMuteButton();

      startBtn.addEventListener('click', () => {
        if (gameState === GameStates.PLANNING) {
          vibrate();
          startWave();
        }
      });

      // Upgrade button setup
      const upgradeBtn = document.getElementById('upgrade-btn');
      function updateUpgradeButton() {
        if (selectedTower) {
          const lvl = selectedTower.level || 1;
          if (lvl >= 3) {
            upgradeBtn.style.opacity = '0.3';
            upgradeBtn.style.pointerEvents = 'none';
            upgradeBtn.querySelector('span').textContent = 'MAX';
          } else {
            const costs = [0, 30, 50];
            const cost = costs[lvl];
            upgradeBtn.style.opacity = currency >= cost ? '1' : '0.5';
            upgradeBtn.style.pointerEvents = 'auto';
            upgradeBtn.querySelector('span').textContent = '\u2191Lv' + lvl;
          }
        } else {
          upgradeBtn.style.opacity = '0.3';
          upgradeBtn.style.pointerEvents = 'none';
        }
      }

      upgradeBtn.addEventListener('click', () => {
        if (gameState !== GameStates.PLANNING || !selectedTower) return;
        const tower = selectedTower;
        const lvl = tower.level || 1;
        if (lvl >= 3) return;
        const costs = [0, 30, 50];
        const cost = costs[lvl];
        if (currency < cost) return;
        currency -= cost;
        tower.level = lvl + 1;
        tower.damage = Math.round(TOWER_TYPES[tower.type].damage * Math.pow(1.4, tower.level - 1));
        tower.range = +(TOWER_TYPES[tower.type].range * Math.pow(1.2, tower.level - 1)).toFixed(1);
        tower.fireRate = +(TOWER_TYPES[tower.type].fireRate / Math.pow(1.3, tower.level - 1)).toFixed(2);
        tower.upgradeFlash = 1.0;
        try { navigator.vibrate && navigator.vibrate(30); } catch(e) {}
        showTooltip('\u2191 Lv' + tower.level + '!');
        updateHUD();
        updateUpgradeButton();
      });
      upgradeBtn.addEventListener('touchend', (e) => { e.preventDefault(); upgradeBtn.click(); });

      document.getElementById('clear-btn').addEventListener('click', () => {
        if (gameState === GameStates.WAVE_ACTIVE) {
          clearPathReroute();
        } else if (gameState === GameStates.PLANNING || gameState === GameStates.MENU) {
          clearPath();
        }
      });

      document.getElementById('buy-hp-btn').addEventListener('click', () => {
        buyHP();
      });

      document.getElementById('freeze-btn').addEventListener('click', activateFreeze);
      document.getElementById('freeze-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateFreeze(); });
      document.getElementById('nuke-btn').addEventListener('click', activateNuke);
      document.getElementById('nuke-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateNuke(); });
      document.getElementById('boost-btn').addEventListener('click', activateBoost);
      document.getElementById('boost-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateBoost(); });

      document.getElementById('mute-btn').addEventListener('click', () => {
        muted = !muted;
        localStorage.setItem('vibe-muted', muted ? '1' : '0');
        updateMuteButton();
      });

      pauseBtn.addEventListener('click', () => {
        console.log('[PAUSE] click event fired! current state:', gameState);
        if (gameState === GameStates.WAVE_ACTIVE) {
          console.log('[PAUSE] Pausing game, showing overlay');
          gameState = GameStates.PAUSED;
          showOverlay('PAUSED');
          console.log('[PAUSE] gameState is now:', gameState);
        } else {
          console.log('[PAUSE] Ignored - not in WAVE_ACTIVE state, must be WAVE_ACTIVE to pause');
        }
      });
      
      // Also handle touchend for mobile Safari
      pauseBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        console.log('[PAUSE] touchend event fired! current state:', gameState);
        if (gameState === GameStates.WAVE_ACTIVE) {
          console.log('[PAUSE] Pausing game via touchend');
          gameState = GameStates.PAUSED;
          showOverlay('PAUSED');
        }
      });

      showOverlay('MENU');
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
