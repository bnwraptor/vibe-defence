<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vibe Defence — Path Architect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      align-items: center;
      justify-content: center;
    }
    #hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    #hud-top .hp-display { color: #ff4444; }
    #hud-top .wave-display { color: #aaa; }
    #hud-top .currency-display { color: #ffd700; }
    #canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      position: relative;
    }
    #game {
      display: block;
      image-rendering: pixelated;
    }
    #hud-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 500px;
      padding: 8px 12px 16px;
      flex-shrink: 0;
    }
    #budget-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #aaa;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    #budget-track {
      flex: 1;
      height: 8px;
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
    }
    #budget-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a4a6a, #6a6a8a);
      border-radius: 4px;
      transition: width 0.15s ease;
    }
    #start-btn {
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 40px;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    #start-btn:active { transform: scale(0.96); }
    #start-btn:disabled { opacity: 0.4; cursor: default; }
    #start-btn.pulsing {
      animation: btnPulse 1s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(64,145,108,0.5); }
      50% { box-shadow: 0 0 0 8px rgba(64,145,108,0); }
    }
    #buy-hp-btn:disabled { opacity: 0.35; cursor: default; }
    #freeze-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(68,136,255,0.4) !important; }
    #nuke-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(255,136,0,0.4) !important; }
    #boost-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(255,215,0,0.4) !important; }
    #power-flash {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: clamp(32px, 10vw, 64px); font-weight: 900; z-index: 30;
      pointer-events: none; opacity: 0; transition: opacity 0.1s;
      text-shadow: 0 0 20px currentColor;
    }
    #power-flash.visible { opacity: 1; }
    #pause-btn {
      position: fixed;
      top: 12px; right: 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 20px;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      color: #fff;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: clamp(28px, 8vw, 48px);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #overlay h2 {
      font-size: clamp(18px, 5vw, 28px);
      margin-bottom: 24px;
      color: #aaa;
    }
    #overlay .score-line {
      font-size: 16px;
      color: #888;
      margin-bottom: 8px;
    }
    #overlay .big-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
    }
    #overlay .secondary-btn {
      margin-top: 12px;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }
    #overlay .how-text {
      color: #aaa;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    #tooltip {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,60,60,0.9);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 15;
    }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud-top">
      <span class="wave-display" id="wave-text">WAVE 1/10</span>
      <span class="hp-display" id="hp-text">HP: ██████░░░░</span>
      <span class="currency-display" id="currency-text">💰 100</span>
    </div>
    <div id="canvas-wrapper">
      <canvas id="game"></canvas>
    </div>
    <div id="hud-bottom">
      <div id="budget-bar">
        <span>PATH</span>
        <div id="budget-track"><div id="budget-fill" style="width:0%"></div></div>
        <span id="budget-text">0/20</span>
        <button id="clear-btn" style="background:#333;border:none;color:#aaa;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:4px">CLEAR</button>
        <button id="buy-hp-btn" style="background:#441111;border:none;color:#ff6666;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:4px">+HP 15💰</button>
      </div>
      <button id="start-btn" class="pulsing">START WAVE</button>
    </div>
  </div>
  <button id="pause-btn">⏸</button>
  <div id="power-btn-bar" style="position:fixed;top:60px;right:12px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:10">
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <button id="freeze-btn" style="background:rgba(68,136,255,0.2);border:2px solid #4488ff;color:#88aaff;font-size:14px;width:40px;height:40px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">❄</button>
      <span id="freeze-cost" style="font-size:9px;color:#88aaff;font-weight:700">20💰</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <button id="nuke-btn" style="background:rgba(255,136,0,0.2);border:2px solid #ff8800;color:#ff8800;font-size:14px;width:40px;height:40px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">💥</button>
      <span id="nuke-cost" style="font-size:9px;color:#ff8800;font-weight:700">35💰</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <button id="boost-btn" style="background:rgba(255,215,0,0.2);border:2px solid #ffd700;color:#ffd700;font-size:14px;width:40px;height:40px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">⚡</button>
      <span id="boost-cost" style="font-size:9px;color:#ffd700;font-weight:700">25💰</span>
    </div>
  </div>
  <div id="overlay">
    <h1>Vibe Defence</h1>
    <h2>Path Architect</h2>
    <p style="color:#666;max-width:320px;text-align:center;font-size:14px;line-height:1.6">
      Draw the path enemies must follow.<br>
      Your towers will defend the base.
    </p>
    <button class="big-btn" id="overlay-start-btn">START GAME</button>
    <button class="secondary-btn" id="overlay-how-btn">HOW TO PLAY</button>
  </div>
  <div id="tooltip">Path not connected!</div>
  <div id="power-flash"></div>

  <script>
    // === CONSTANTS ===
    const COLS = 12;
    const ROWS = 16;
    const CELL_TYPES = { EMPTY: 0, BLOCKED: 1, SPAWN: 2, BASE: 3, TOWER: 4, PATH: 5 };
    const SPAWN_POS = { col: 0, row: 7 };
    const BASE_POS = { col: 11, row: 7 };
    const STARTING_TILE_BUDGET = 20;  // wave 1 total tiles
    const TILE_ACCUM_WAVES = 7;     // add 7 tiles each wave 1-8 (→76)
    const TILE_WAVE9_BONUS = 4;      // special: +4 at wave 9 (→80)
    const TILE_ACCUM_ENDLESS = 2;    // add 2 tiles every 10 waves in endless
    const MAX_TILE_BUDGET = 110;
    const BASE_HP = 100;
    const STARTING_CURRENCY = 100;
    const WAVE_BONUS = 20;
    const BASE_WAVES = 10;
    const ENDLESS_START = 11;
    const HP_COST = 15;
    const HP_RESTORE = 10;
    const POWER_FREEZE_COST = 20;
    const POWER_FREEZE_DUR = 3;
    const POWER_NUKE_COST = 35;
    const POWER_NUKE_DAMAGE = 50;
    const POWER_BOOST_COST = 25;
    const POWER_BOOST_DUR = 5;
    const SPAWN_INTERVAL = 0.8;
    const WAVE_DELAY = 3;
    const PROJ_SPEED = 400;
    const TOWER_TYPES = {
      TURRET: { color: '#00ffff', range: 3, fireRate: 0.5, damage: 10 },
      CANNON: { color: '#ff8800', range: 2, fireRate: 2, damage: 40 },
      SNIPER: { color: '#ff4444', range: 6, fireRate: 3, damage: 80 },
      FROST: { color: '#4488ff', range: 2.5, fireRate: 1, damage: 5, slow: 0.5 }
    };
    const ENEMY_TYPES = {
      SCOUT: { shape: 'small', color: '#44ff44', baseHP: 30, speed: 3, reward: 5 },
      SOLDIER: { shape: 'medium', color: '#ffff44', baseHP: 80, speed: 2, reward: 10 },
      TANK: { shape: 'large', color: '#888888', baseHP: 200, speed: 1, reward: 25 },
      SPEEDSTER: { shape: 'small', color: '#ff44ff', baseHP: 20, speed: 5, reward: 8 },
      BOSS: { shape: 'large', color: '#aa44ff', baseHP: 500, speed: 0.8, reward: 100, isBoss: true }
    };
    const WAVE_DEFINITIONS = [
      [{ type: 'SCOUT', count: 5 }],
      [{ type: 'SCOUT', count: 8 }, { type: 'SOLDIER', count: 2 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }],
      [{ type: 'SOLDIER', count: 10 }, { type: 'TANK', count: 2 }],
      [{ type: 'SOLDIER', count: 8 }, { type: 'TANK', count: 3 }, { type: 'SPEEDSTER', count: 1 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 2 }],
      [{ type: 'SOLDIER', count: 10 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 5 }],
      [{ type: 'SOLDIER', count: 15 }, { type: 'TANK', count: 8 }, { type: 'SPEEDSTER', count: 8 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 5 }, { type: 'BOSS', count: 3 }],
      [{ type: 'SOLDIER', count: 20 }, { type: 'TANK', count: 10 }, { type: 'SPEEDSTER', count: 10 }, { type: 'BOSS', count: 5 }]
    ];

    // === STATE ===
    const GameStates = { MENU: 'MENU', PLANNING: 'PLANNING', WAVE_ACTIVE: 'WAVE_ACTIVE', PAUSED: 'PAUSED', GAME_OVER: 'GAME_OVER', VICTORY: 'VICTORY' };
    let gameState = GameStates.MENU;
    let grid = [];
    let towers = [];
    let enemies = [];
    let projectiles = [];
    let pathTiles = [];
    let tileBudget = STARTING_TILE_BUDGET;  // total tiles available (accumulates)
    let currency = STARTING_CURRENCY;
    let baseHP = BASE_HP;
    let currentWave = 1;
    let waveEnemyQueue = [];
    let waveSpeedMult = 1.0;
    let spawnTimer = 0;
    let lastTime = 0;
    let pathInvalidFlash = 0;
    let selectedTower = null;
    let screenShake = { x: 0, y: 0, duration: 0 };
    let tooltipTimer = 0;

    // Power-up state
    let powerFreezeTimer = 0;
    let powerBoostTimer = 0;
    let powerFreezeAvail = true;
    let powerNukeAvail = true;
    let powerBoostAvail = true;
    let powerFlashText = '';
    let powerFlashTimer = 0;

    // Input state
    let pointerDown = false;
    let pointerStart = null;
    let pointerLastCell = null;
    let longPressTimer = null;
    let lastTapCell = null;
    let lastTapTime = 0;
    const DOUBLE_TAP_DELAY = 300;
    const LONG_PRESS_DELAY = 500;

    // DOM elements
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const waveText = document.getElementById('wave-text');
    const hpText = document.getElementById('hp-text');
    const currencyText = document.getElementById('currency-text');
    const budgetText = document.getElementById('budget-text');
    const budgetFill = document.getElementById('budget-fill');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const overlay = document.getElementById('overlay');
    const overlayStartBtn = document.getElementById('overlay-start-btn');
    const overlayHowBtn = document.getElementById('overlay-how-btn');
    const tooltip = document.getElementById('tooltip');

    let cellSize = 0;
    let dpr = window.devicePixelRatio || 1;

    // === GRID ===
    function initGrid() {
      grid = [];
      for (let row = 0; row < ROWS; row++) {
        grid[row] = [];
        for (let col = 0; col < COLS; col++) {
          grid[row][col] = CELL_TYPES.EMPTY;
        }
      }
      grid[SPAWN_POS.row][SPAWN_POS.col] = CELL_TYPES.SPAWN;
      grid[BASE_POS.row][BASE_POS.col] = CELL_TYPES.BASE;
    }

    function getCellAt(col, row) {
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return grid[row][col];
    }

    function isCellOccupied(col, row) {
      const cell = getCellAt(col, row);
      return cell === CELL_TYPES.BLOCKED || cell === CELL_TYPES.SPAWN || cell === CELL_TYPES.BASE || cell === CELL_TYPES.TOWER;
    }

    // === PATH ===
    function placePathTile(col, row) {
      if (tileBudget <= 0) {
        showTooltip('No path budget!');
        return false;
      }
      const cell = getCellAt(col, row);
      if (cell !== CELL_TYPES.EMPTY) {
        return false;
      }
      if (isPathTile(col, row)) {
        return false;
      }
      pathTiles.push({ col, row });
      tileBudget--;
      grid[row][col] = CELL_TYPES.PATH;
      playPlaceSound();
      flashTile(col, row, '#4a4a6a', 100);
      updateHUD();
      if (gameState === GameStates.PLANNING) setStartButton(true);
      return true;
    }

    function removePathTile(col, row) {
      const idx = pathTiles.findIndex(t => t.col === col && t.row === row);
      if (idx === -1) return false;
      pathTiles.splice(idx, 1);
      tileBudget++;
      grid[row][col] = CELL_TYPES.EMPTY;
      playRemoveSound();
      updateHUD();
      if (gameState === GameStates.PLANNING) setStartButton(pathTiles.length > 0);
      return true;
    }

    function isPathTile(col, row) {
      return pathTiles.some(t => t.col === col && t.row === row);
    }

    function isTower(col, row) {
      return towers.some(t => t.col === col && t.row === row);
    }

    function getTowerAt(col, row) {
      return towers.find(t => t.col === col && t.row === row);
    }

    function validatePath() {
      // No path drawn = enemies go straight from SPAWN to BASE (still valid)
      if (pathTiles.length === 0) return true;
      const visited = new Set();
      const queue = [{ col: SPAWN_POS.col, row: SPAWN_POS.row }];
      visited.add(`${SPAWN_POS.col},${SPAWN_POS.row}`);

      while (queue.length > 0) {
        const current = queue.shift();
        if (current.col === BASE_POS.col && current.row === BASE_POS.row) {
          return true;
        }

        const neighbors = [
          { col: current.col + 1, row: current.row },
          { col: current.col - 1, row: current.row },
          { col: current.col, row: current.row + 1 },
          { col: current.col, row: current.row - 1 }
        ];

        for (const n of neighbors) {
          const key = `${n.col},${n.row}`;
          if (visited.has(key)) continue;
          if (n.col < 0 || n.col >= COLS || n.row < 0 || n.row >= ROWS) continue;
          const cell = grid[n.row][n.col];
          if (cell === CELL_TYPES.PATH || cell === CELL_TYPES.BASE) {
            visited.add(key);
            queue.push(n);
          }
        }
      }
      return false;
    }

    function findPathDirection(col, row) {
      const idx = pathTiles.findIndex(t => t.col === col && t.row === row);
      if (idx === -1) {
        if (col === SPAWN_POS.col && row === SPAWN_POS.row) {
          if (pathTiles.length > 0) {
            return getDirection(SPAWN_POS.col, SPAWN_POS.row, pathTiles[0].col, pathTiles[0].row);
          }
          return getDirection(col, row, BASE_POS.col, BASE_POS.row);
        }
        return null;
      }

      if (idx === pathTiles.length - 1) {
        return getDirection(col, row, BASE_POS.col, BASE_POS.row);
      }

      const next = pathTiles[idx + 1];
      return getDirection(col, row, next.col, next.row);
    }

    function getDirection(fromCol, fromRow, toCol, toRow) {
      const dCol = toCol - fromCol;
      const dRow = toRow - fromRow;
      if (Math.abs(dCol) > Math.abs(dRow)) {
        return dCol > 0 ? 'right' : 'left';
      } else {
        return dRow > 0 ? 'down' : 'up';
      }
    }

    function getOrderedPath() {
      const ordered = [];
      let current = { col: SPAWN_POS.col, row: SPAWN_POS.row };
      const visited = new Set();
      visited.add(`${current.col},${current.row}`);

      for (let i = 0; i < pathTiles.length + 1; i++) {
        if (current.col === BASE_POS.col && current.row === BASE_POS.row) break;

        const neighbors = [
          { col: current.col + 1, row: current.row },
          { col: current.col - 1, row: current.row },
          { col: current.col, row: current.row + 1 },
          { col: current.col, row: current.row - 1 }
        ];

        let found = false;
        for (const n of neighbors) {
          const key = `${n.col},${n.row}`;
          if (visited.has(key)) continue;
          if (n.col < 0 || n.col >= COLS || n.row < 0 || n.row >= ROWS) continue;
          const cell = grid[n.row][n.col];
          if (cell === CELL_TYPES.PATH || cell === CELL_TYPES.BASE) {
            visited.add(key);
            ordered.push({ col: n.col, row: n.row });
            current = n;
            found = true;
            break;
          }
        }
        if (!found) break;
      }
      return ordered;
    }

    // === TOWERS ===
    function initTowers() {
      towers = [
        { type: 'TURRET', col: 3, row: 3 },
        { type: 'TURRET', col: 6, row: 5 },
        { type: 'CANNON', col: 9, row: 4 },
        { type: 'SNIPER', col: 2, row: 10 },
        { type: 'FROST', col: 8, row: 11 },
        { type: 'CANNON', col: 5, row: 13 },
        { type: 'SNIPER', col: 10, row: 9 }
      ];
      for (const t of towers) {
        const typeData = TOWER_TYPES[t.type];
        t.color = typeData.color;
        t.range = typeData.range;
        t.fireRate = typeData.fireRate;
        t.damage = typeData.damage;
        t.cooldown = 0;
        t.slow = typeData.slow || 0;
        t.angle = 0;
        t.muzzleFlash = 0;
        t.recoil = 0;
        grid[t.row][t.col] = CELL_TYPES.TOWER;
      }
    }

    function updateTowers(dt) {
      for (const tower of towers) {
        tower.cooldown = Math.max(0, tower.cooldown - dt);

        // Always track angle toward nearest enemy (for visual rotation)
        const towerX = tower.col + 0.5;
        const towerY = tower.row + 0.5;
        let nearestEnemy = null;
        let nearestDist = Infinity;
        for (const enemy of enemies) {
          const dist = Math.hypot(enemy.col + 0.5 - towerX, enemy.row + 0.5 - towerY);
          if (dist <= tower.range && dist < nearestDist) {
            nearestDist = dist;
            nearestEnemy = enemy;
          }
        }
        if (nearestEnemy) {
          tower.angle = Math.atan2(nearestEnemy.row + 0.5 - towerY, nearestEnemy.col + 0.5 - towerX);
        }

        // Decay recoil and muzzle flash
        if (tower.recoil > 0) tower.recoil = Math.max(0, tower.recoil - dt * 10);
        if (tower.muzzleFlash > 0) tower.muzzleFlash = Math.max(0, tower.muzzleFlash - dt * 20);

        if (tower.cooldown > 0) continue;

        // Boost: faster fire rate and double damage
        const boosted = powerBoostTimer > 0;
        const effectiveFireRate = boosted ? tower.fireRate * 0.5 : tower.fireRate;
        const effectiveDamage = boosted ? tower.damage * 2 : tower.damage;

        if (nearestEnemy) {
          tower.cooldown = effectiveFireRate;
          tower.muzzleFlash = 1.0;
          tower.recoil = 1.0;
          projectiles.push({
            col: tower.col + 0.5,
            row: tower.row + 0.5,
            target: nearestEnemy,
            damage: effectiveDamage,
            color: tower.color,
            slow: tower.slow,
            trail: [],
            boosted: boosted
          });
          playShootSound();
        }
      }
    }

    // === ENEMIES ===
    function spawnEnemy(type) {
      const typeData = ENEMY_TYPES[type];
      const hpScale = 1 + (currentWave - 1) * 0.15;
      const speed = typeData.speed * waveSpeedMult;
      enemies.push({
        type,
        col: SPAWN_POS.col,
        row: SPAWN_POS.row,
        hp: typeData.baseHP * hpScale,
        maxHP: typeData.baseHP * hpScale,
        speed: speed,
        reward: typeData.reward,
        color: typeData.color,
        shape: typeData.shape,
        isBoss: typeData.isBoss || false,
        pathIndex: 0,
        slowTimer: 0,
        deathTimer: 0,
        dying: false
      });
      playSpawnSound();
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];

        if (enemy.dying) {
          enemy.deathTimer += dt;
          if (enemy.deathTimer >= 0.15) {
            enemies.splice(i, 1);
          }
          continue;
        }

        if (enemy.slowTimer > 0) {
          enemy.slowTimer -= dt;
        }

        const speedMod = (enemy.slowTimer > 0 ? 0.5 : 1) * (powerFreezeTimer > 0 ? 0 : 1);
        const moveSpeed = enemy.speed * speedMod * dt;

        let targetCol, targetRow;
        const orderedPath = getOrderedPath();

        if (orderedPath.length > 0) {
          const pathIdx = Math.floor(enemy.pathIndex);
          if (pathIdx < orderedPath.length) {
            targetCol = orderedPath[pathIdx].col;
            targetRow = orderedPath[pathIdx].row;
          } else {
            targetCol = BASE_POS.col;
            targetRow = BASE_POS.row;
          }
        } else {
          targetCol = BASE_POS.col;
          targetRow = BASE_POS.row;
        }

        const dx = targetCol - enemy.col;
        const dy = targetRow - enemy.row;
        const dist = Math.hypot(dx, dy);

        if (dist < 0.1) {
          enemy.pathIndex++;
          if (Math.hypot(enemy.col - BASE_POS.col, enemy.row - BASE_POS.row) < 0.2) {
            const damage = Math.ceil(enemy.maxHP * 0.1);
            baseHP -= damage;
            screenShake.duration = 0.2;
            playBaseDamageSound();
            enemies.splice(i, 1);
            if (baseHP <= 0) {
              baseHP = 0;
              gameState = GameStates.GAME_OVER;
              showOverlay('GAME_OVER');
            }
            continue;
          }
        } else {
          enemy.col += (dx / dist) * moveSpeed;
          enemy.row += (dy / dist) * moveSpeed;
        }
      }
    }

    function killEnemy(enemy) {
      enemy.dying = true;
      enemy.deathTimer = 0;
      currency += enemy.reward;
      playDeathSound();
      updateHUD();
    }

    // === PROJECTILES ===
    function updateProjectiles(dt) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const proj = projectiles[i];
        const target = proj.target;

        if (!enemies.includes(target) || target.dying) {
          projectiles.splice(i, 1);
          continue;
        }

        proj.trail.unshift({ col: proj.col, row: proj.row });
        if (proj.trail.length > 3) proj.trail.pop();

        const dx = (target.col + 0.5) - proj.col;
        const dy = (target.row + 0.5) - proj.row;
        const dist = Math.hypot(dx, dy);

        if (dist < 0.2) {
          target.hp -= proj.damage;
          if (proj.slow > 0) {
            target.slowTimer = 1;
          }
          if (target.hp <= 0) {
            killEnemy(target);
          }
          projectiles.splice(i, 1);
        } else {
          const speed = PROJ_SPEED * dt / cellSize;
          proj.col += (dx / dist) * speed;
          proj.row += (dy / dist) * speed;
        }
      }
    }

    // === WAVE SYSTEM ===
    function generateWave(n) {
      // Scale from wave 10 baseline, escalating difficulty
      const scale = 1 + (n - 10) * 0.2;  // 20% harder each endless wave
      const speedMult = 1 + (n - 10) * 0.03;  // 3% faster per wave

      // Base: wave 10 composition scaled up
      let soldiers = Math.floor(20 * scale);
      let tanks = Math.floor(10 * scale);
      let speedsters = Math.floor(10 * scale);
      let bosses = Math.floor(5 * scale);
      let scouts = n >= 15 ? Math.floor(10 * scale) : 0;

      // Every 5th endless wave gets extra bosses
      if (n % 5 === 0) bosses += Math.floor(n / 5);

      // Build queue
      const queue = [];
      for (let i = 0; i < scouts; i++) queue.push('SCOUT');
      for (let i = 0; i < soldiers; i++) queue.push('SOLDIER');
      for (let i = 0; i < tanks; i++) queue.push('TANK');
      for (let i = 0; i < speedsters; i++) queue.push('SPEEDSTER');
      for (let i = 0; i < bosses; i++) queue.push('BOSS');

      // Shuffle the queue so enemies don't clump by type
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }

      return queue;
    }

    function buildWaveQueue() {
      waveEnemyQueue = [];
      if (currentWave <= BASE_WAVES) {
        const waveDef = WAVE_DEFINITIONS[currentWave - 1];
        for (const group of waveDef) {
          for (let i = 0; i < group.count; i++) {
            waveEnemyQueue.push(group.type);
          }
        }
      } else {
        waveEnemyQueue = generateWave(currentWave);
      }
    }

    function startWave() {
      if (!validatePath()) {
        pathInvalidFlash = 0.5;
        showTooltip('Path not connected!');
        return;
      }
      // Reset power-ups for this wave
      powerFreezeAvail = true;
      powerNukeAvail = true;
      powerBoostAvail = true;
      powerFreezeTimer = 0;
      powerBoostTimer = 0;
      buildWaveQueue();
      spawnTimer = 0;
      gameState = GameStates.WAVE_ACTIVE;
      setStartButton(false);
      updatePowerButtons();
    }

    function updateWave(dt) {
      if (gameState !== GameStates.WAVE_ACTIVE) return;

      if (powerFreezeTimer <= 0) {
        spawnTimer += dt;
        if (spawnTimer >= SPAWN_INTERVAL && waveEnemyQueue.length > 0) {
          spawnTimer = 0;
          spawnEnemy(waveEnemyQueue.shift());
        }
      }

      if (waveEnemyQueue.length === 0 && enemies.length === 0) {
        currentWave++;
        if (currentWave > BASE_WAVES) {
          // Endless mode — keep going
          clearPath();
          waveSpeedMult = 1 + (currentWave - 10) * 0.03;  // update speed scaling
          currency += WAVE_BONUS;
          gameState = GameStates.PLANNING;
          setStartButton(false);
          updateHUD();
          updateBuyHpButton();
          updatePowerButtons();
          playWaveCompleteSound();
        } else {
          resetPathBudget();
          currency += WAVE_BONUS;
          gameState = GameStates.PLANNING;
          setStartButton(pathTiles.length > 0);
          updateHUD();
          updateBuyHpButton();
          updatePowerButtons();
          playWaveCompleteSound();
        }
      }
    }

    // === AUDIO ===
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }
    function playTone(freq, duration, type = 'square', vol = 0.1) {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = type;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start();
        osc.stop(ctx.currentTime + duration);
      } catch (e) {}
    }
    function playPlaceSound() { playTone(440, 0.08, 'square', 0.08); }
    function playRemoveSound() { playTone(330, 0.08, 'square', 0.08); }
    function playShootSound() { playTone(880, 0.05, 'sine', 0.05); }
    function playSpawnSound() { playTone(220, 0.1, 'triangle', 0.08); }
    function playDeathSound() { playTone(150, 0.15, 'sawtooth', 0.1); }
    function playBaseDamageSound() { playTone(80, 0.3, 'sawtooth', 0.15); }
    function playWaveCompleteSound() {
      playTone(440, 0.1, 'sine', 0.1);
      setTimeout(() => playTone(554, 0.1, 'sine', 0.1), 100);
      setTimeout(() => playTone(659, 0.2, 'sine', 0.1), 200);
    }

    // === FLASH EFFECTS ===
    let flashTiles = [];
    function flashTile(col, row, color, duration) {
      flashTiles.push({ col, row, color, duration, elapsed: 0 });

    // === INPUT ===
    // === INPUT (Pointer Events — unified touch/mouse, avoids iOS Safari dual-fire bug) ===
    let activeTouchId = null; // Track unique pointer to avoid iOS Safari mouse-emulation bugs

    function screenToCell(screenX, screenY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (screenX - rect.left) * scaleX;
      const y = (screenY - rect.top) * scaleY;
      const col = Math.floor(x / cellSize);
      const row = Math.floor(y / cellSize);
      console.log('[screenToCell] x:', x, 'y:', y, 'col:', col, 'row:', row);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return { col, row };
    }

    function handlePointerDown(e) {
      console.log('[pointerdown] type:', e.pointerType, 'x:', e.clientX, 'y:', e.clientY, 'gameState:', gameState);
      if (gameState !== GameStates.PLANNING) { console.log('[pointerdown] REJECTED: wrong state'); return; }
      e.preventDefault();

      // Reject if this is a mouse event emulated after touch (iOS Safari fix)
      if (e.pointerType === 'mouse' && activeTouchId === null) {
        // Could be real mouse or emulated — accept it
      }
      if (e.pointerType === 'touch') {
        activeTouchId = e.pointerId;
      }

      const cell = screenToCell(e.clientX, e.clientY);
      console.log('[pointerdown] cell:', cell);
      if (!cell) { console.log('[pointerdown] REJECTED: no cell'); return; }

      pointerDown = true;
      pointerStart = cell;
      pointerLastCell = cell;

      longPressTimer = setTimeout(() => {
        if (pointerDown && pointerStart && pointerStart.col === cell.col && pointerStart.row === cell.row) {
          if (isPathTile(cell.col, cell.row)) {
            console.log('[longpress] removing tile');
            removePathTile(cell.col, cell.row);
            pointerDown = false;
            pointerStart = null;
          }
        }
      }, LONG_PRESS_DELAY);
    }

    function handlePointerMove(e) {
      if (!pointerDown || gameState !== GameStates.PLANNING) return;
      // Only handle the active pointer id (ignores other fingers)
      if (e.pointerType === 'touch' && e.pointerId !== activeTouchId) return;
      e.preventDefault();

      const cell = screenToCell(e.clientX, e.clientY);
      if (!cell) return;

      if (pointerLastCell && (cell.col !== pointerLastCell.col || cell.row !== pointerLastCell.row)) {
        console.log('[pointermove] drawing from', pointerLastCell, 'to', cell);
        if (isCellEmpty(cell.col, cell.row) && !isPathTile(cell.col, cell.row)) {
          placePathTile(cell.col, cell.row);
        }
        pointerLastCell = cell;
      }
    }

    function handlePointerUp(e) {
      console.log('[pointerup] pointerDown was:', pointerDown);
      if (!pointerDown) { console.log('[pointerup] REJECTED: not down'); return; }
      e.preventDefault();
      clearTimeout(longPressTimer);

      const cell = pointerStart;
      if (!cell) { pointerDown = false; pointerStart = null; pointerLastCell = null; return; }

      const moved = pointerLastCell && (
        Math.abs(pointerLastCell.col - pointerStart.col) > 1 ||
        Math.abs(pointerLastCell.row - pointerStart.row) > 1
      );

      console.log('[pointerup] cell:', cell, 'moved:', moved);

      if (!moved) {
        const now = Date.now();
        const isDoubleTap = lastTapCell &&
          lastTapCell.col === cell.col &&
          lastTapCell.row === cell.row &&
          now - lastTapTime < DOUBLE_TAP_DELAY;
        console.log('[pointerup] tap detected, isDoubleTap:', isDoubleTap, 'cellType:', getCellAt(cell.col, cell.row));

        if (isPathTile(cell.col, cell.row)) {
          console.log('[pointerup] removing path tile');
          removePathTile(cell.col, cell.row);
        } else if (getCellAt(cell.col, cell.row) === CELL_TYPES.EMPTY) {
          console.log('[pointerup] placing path tile');
          placePathTile(cell.col, cell.row);
        } else if (getCellAt(cell.col, cell.row) === CELL_TYPES.TOWER) {
          const tower = getTowerAt(cell.col, cell.row);
          console.log(`Tower: ${tower.type}, Range: ${tower.range}, Damage: ${tower.damage}, Fire Rate: ${tower.fireRate}s`);
        }

        lastTapCell = cell;
        lastTapTime = now;
      }

      pointerDown = false;
      pointerStart = null;
      pointerLastCell = null;
      activeTouchId = null;
    }

    function handlePointerCancel(e) {
      console.log('[pointercancel]');
      clearTimeout(longPressTimer);
      pointerDown = false;
      pointerStart = null;
      pointerLastCell = null;
      activeTouchId = null;
    }

    function isCellEmpty(col, row) {
      return getCellAt(col, row) === CELL_TYPES.EMPTY;
    }

    function setupInput() {
      // Use Pointer Events API — unified touch/mouse handling, avoids iOS Safari
      // dual-fire bug where touchend is followed by spurious mousedown/mouseup
      canvas.addEventListener('pointerdown', handlePointerDown, { passive: false });
      canvas.addEventListener('pointermove', handlePointerMove, { passive: false });
      canvas.addEventListener('pointerup', handlePointerUp, { passive: false });
      canvas.addEventListener('pointercancel', handlePointerCancel, { passive: false });
      canvas.addEventListener('pointerleave', handlePointerUp, { passive: false });
      // Prevent mouse emulated events on iOS after touch
      canvas.addEventListener('mousedown', e => e.preventDefault(), { passive: false });
      // Prevent context menu and text selection
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    function clearPath() {
      // Remove all path tiles and refund budget
      for (const tile of pathTiles) {
        grid[tile.row][tile.col] = CELL_TYPES.EMPTY;
      }
      pathTiles = [];
      tileBudget = STARTING_TILE_BUDGET;
      updateHUD();
      if (gameState === GameStates.PLANNING) setStartButton(false);
      playRemoveSound();
    }

    function resetPathBudget() {
      // Tile budget progression (after each wave completes):
      // Wave 1 (start): 20 | Wave 1 complete: +7 → 27
      // Wave 2 complete: +7 → 34 | Wave 3: 41 | Wave 4: 48
      // Wave 5: 55 | Wave 6: 62 | Wave 7: 69 | Wave 8: 76
      // Wave 9 complete: +4 → 80 | Wave 10: cap 80
      // Waves 11+: +2 each → capped at 110
      if (tileBudget >= MAX_TILE_BUDGET) { updateHUD(); return; }
      if (currentWave === BASE_WAVES) {
        // Wave 10: no accumulation
      } else if (currentWave > BASE_WAVES) {
        const target = 80 + (currentWave - BASE_WAVES) * TILE_ACCUM_ENDLESS;
        tileBudget = Math.min(target, MAX_TILE_BUDGET);
      } else if (currentWave === BASE_WAVES - 1) {
        // Wave 9 complete: +4 → reaches 80
        tileBudget = Math.min(tileBudget + TILE_WAVE9_BONUS, MAX_TILE_BUDGET);
      } else {
        // Waves 1-8: +7 per completed wave
        tileBudget = Math.min(tileBudget + TILE_ACCUM_WAVES, MAX_TILE_BUDGET);
      }
      updateHUD();
    }

    function buyHP() {
      if (gameState !== GameStates.PLANNING) return;
      if (currency < HP_COST) {
        showTooltip('Not enough currency!');
        return;
      }
      if (baseHP >= BASE_HP) {
        showTooltip('HP already full!');
        return;
      }
      currency -= HP_COST;
      baseHP = Math.min(baseHP + HP_RESTORE, BASE_HP);
      updateHUD();
      updateBuyHpButton();
      playPlaceSound();
    }

    function updateBuyHpButton() {
      const btn = document.getElementById('buy-hp-btn');
      if (!btn) return;
      const canAfford = currency >= HP_COST;
      const hpNotFull = baseHP < BASE_HP;
      const inPlanning = gameState === GameStates.PLANNING;
      btn.disabled = !canAfford || !hpNotFull || !inPlanning;
    }

    // === POWER-UPS ===
    let powerFlashColor = '#ffffff';
    function activateFreeze() {
      if (gameState !== GameStates.WAVE_ACTIVE) return;
      if (!powerFreezeAvail) return;
      if (currency < POWER_FREEZE_COST) { showTooltip('Not enough currency!'); return; }
      currency -= POWER_FREEZE_COST;
      powerFreezeAvail = false;
      powerFreezeTimer = POWER_FREEZE_DUR;
      powerFlashText = 'FROZEN!';
      powerFlashTimer = 1.0;
      powerFlashColor = '#88aaff';
      updateHUD();
      updatePowerButtons();
      playTone(200, 0.3, 'sine', 0.15);
    }

    function activateNuke() {
      if (gameState !== GameStates.WAVE_ACTIVE) return;
      if (!powerNukeAvail) return;
      if (currency < POWER_NUKE_COST) { showTooltip('Not enough currency!'); return; }
      currency -= POWER_NUKE_COST;
      powerNukeAvail = false;
      // Damage all enemies on screen
      for (const enemy of enemies) {
        enemy.hp -= POWER_NUKE_DAMAGE;
        if (enemy.hp <= 0) killEnemy(enemy);
      }
      powerFlashText = '💥 NUKE!';
      powerFlashTimer = 1.0;
      powerFlashColor = '#ff8800';
      screenShake.duration = 0.3;
      updateHUD();
      updatePowerButtons();
      playTone(100, 0.5, 'sawtooth', 0.2);
    }

    function activateBoost() {
      if (gameState !== GameStates.WAVE_ACTIVE) return;
      if (!powerBoostAvail) return;
      if (currency < POWER_BOOST_COST) { showTooltip('Not enough currency!'); return; }
      currency -= POWER_BOOST_COST;
      powerBoostAvail = false;
      powerBoostTimer = POWER_BOOST_DUR;
      powerFlashText = '⚡ BOOST!';
      powerFlashTimer = 1.0;
      powerFlashColor = '#ffd700';
      updateHUD();
      updatePowerButtons();
      playTone(880, 0.2, 'sine', 0.1);
    }

    function updatePowerButtons() {
      const inWave = gameState === GameStates.WAVE_ACTIVE;
      const freezeBtn = document.getElementById('freeze-btn');
      const nukeBtn = document.getElementById('nuke-btn');
      const boostBtn = document.getElementById('boost-btn');
      if (freezeBtn) {
        freezeBtn.classList.toggle('active', powerFreezeAvail && currency >= POWER_FREEZE_COST && inWave);
        freezeBtn.disabled = !powerFreezeAvail || currency < POWER_FREEZE_COST || !inWave;
        const fc = document.getElementById('freeze-cost');
        if (fc) fc.style.opacity = (powerFreezeAvail && currency >= POWER_FREEZE_COST && inWave) ? '1' : '0.3';
      }
      if (nukeBtn) {
        nukeBtn.classList.toggle('active', powerNukeAvail && currency >= POWER_NUKE_COST && inWave);
        nukeBtn.disabled = !powerNukeAvail || currency < POWER_NUKE_COST || !inWave;
        const nc = document.getElementById('nuke-cost');
        if (nc) nc.style.opacity = (powerNukeAvail && currency >= POWER_NUKE_COST && inWave) ? '1' : '0.3';
      }
      if (boostBtn) {
        boostBtn.classList.toggle('active', powerBoostAvail && currency >= POWER_BOOST_COST && inWave);
        boostBtn.disabled = !powerBoostAvail || currency < POWER_BOOST_COST || !inWave;
        const bc = document.getElementById('boost-cost');
        if (bc) bc.style.opacity = (powerBoostAvail && currency >= POWER_BOOST_COST && inWave) ? '1' : '0.3';
      }
    }

    function restartGame() {
      clearPath();
      currency = STARTING_CURRENCY;
      baseHP = BASE_HP;
      currentWave = 1;
      waveSpeedMult = 1.0;
      enemies = [];
      projectiles = [];
      waveEnemyQueue = [];
      powerFreezeAvail = true;
      powerNukeAvail = true;
      powerBoostAvail = true;
      powerFreezeTimer = 0;
      powerBoostTimer = 0;
      initGrid();
      initTowers();
      hideOverlay();
      updateHUD();
      gameState = GameStates.PLANNING;
      setStartButton(false);
      updateBuyHpButton();
      updatePowerButtons();
    }

    function resumeGame() {
      console.log('[RESUME] resumeGame called, current state:', gameState);
      hideOverlay();
      gameState = GameStates.WAVE_ACTIVE;
      console.log('[RESUME] gameState is now:', gameState);
    }

    // === RENDERING ===
    function resizeCanvas() {
      const wrapper = document.getElementById('canvas-wrapper');
      const maxW = wrapper.clientWidth;
      const maxH = wrapper.clientHeight;
      cellSize = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
      canvas.width = COLS * cellSize;
      canvas.height = ROWS * cellSize;
      canvas.style.width = `${COLS * cellSize}px`;
      canvas.style.height = `${ROWS * cellSize}px`;
    }

    function render() {
      ctx.save();

      if (screenShake.duration > 0) {
        screenShake.x = (Math.random() - 0.5) * 4;
        screenShake.y = (Math.random() - 0.5) * 4;
        ctx.translate(screenShake.x, screenShake.y);
      }

      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawPath();
      drawTowers();
      drawEnemies();
      drawProjectiles();
      drawSpawnAndBase();

      if (flashTiles.length > 0) {
        for (let i = flashTiles.length - 1; i >= 0; i--) {
          const ft = flashTiles[i];
          ft.elapsed += 1 / 60;
          if (ft.elapsed >= ft.duration / 1000) {
            flashTiles.splice(i, 1);
          } else {
            ctx.fillStyle = ft.color;
            ctx.fillRect(ft.col * cellSize + 1, ft.row * cellSize + 1, cellSize - 2, cellSize - 2);
          }
        }
      }

      // Power-up visual effects
      if (powerFreezeTimer > 0) {
        ctx.fillStyle = 'rgba(68,136,255,0.12)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      if (powerBoostTimer > 0) {
        // Pulsing glow on towers
        const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
        for (const tower of towers) {
          const cx = tower.col * cellSize + cellSize / 2;
          const cy = tower.row * cellSize + cellSize / 2;
          ctx.beginPath();
          ctx.arc(cx, cy, cellSize * 0.8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,215,0,${pulse * 0.2})`;
          ctx.fill();
        }
      }
      if (powerFlashTimer > 0) {
        const el = document.getElementById('power-flash');
        if (el) {
          el.textContent = powerFlashText;
          el.style.color = powerFlashColor;
          el.style.opacity = Math.min(powerFlashTimer * 2, 1).toString();
        }
      } else {
        const el = document.getElementById('power-flash');
        if (el) el.style.opacity = '0';
      }

      ctx.restore();
    }

    function drawGrid() {
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 1;
      for (let row = 0; row <= ROWS; row++) {
        ctx.beginPath();
        ctx.moveTo(0, row * cellSize);
        ctx.lineTo(canvas.width, row * cellSize);
        ctx.stroke();
      }
      for (let col = 0; col <= COLS; col++) {
        ctx.beginPath();
        ctx.moveTo(col * cellSize, 0);
        ctx.lineTo(col * cellSize, canvas.height);
        ctx.stroke();
      }
    }

    function drawPath() {
      for (const tile of pathTiles) {
        let color = '#2d2d44';
        let borderColor = '#4a4a6a';

        if (pathInvalidFlash > 0 && !validatePath()) {
          color = '#ff4444';
          borderColor = '#ff6666';
        }

        ctx.fillStyle = color;
        ctx.fillRect(tile.col * cellSize + 1, tile.row * cellSize + 1, cellSize - 2, cellSize - 2);
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 2;
        ctx.strokeRect(tile.col * cellSize + 2, tile.row * cellSize + 2, cellSize - 4, cellSize - 4);
      }
    }

    // Draws a small tower preview on a named canvas element (for HOW TO PLAY screen)
    function drawTowerPreview(canvasId, type, color) {
      const c = document.getElementById(canvasId);
      if (!c) return;
      const ctx = c.getContext('2d');
      const w = c.width;
      const h = c.height;
      const cx = w / 2;
      const cy = h / 2;
      const baseSize = Math.min(w, h) * 0.75;
      ctx.clearRect(0, 0, w, h);

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;

      if (type === 'TURRET') {
        ctx.fillStyle = '#1a2a3a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.1, cy - baseSize * 0.1, baseSize * 0.65, baseSize * 0.2);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = '#0a1520';
        ctx.fill();
      } else if (type === 'CANNON') {
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.strokeRect(cx - baseSize / 2 + 2, cy - baseSize / 2 + 2, baseSize - 4, baseSize - 4);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.05, cy - baseSize * 0.18, baseSize * 0.5, baseSize * 0.36);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = '#1a0a00';
        ctx.fill();
      } else if (type === 'SNIPER') {
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx + baseSize / 2 - baseSize * 0.15, cy - baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx - baseSize / 2, cy + baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx + baseSize / 2 - baseSize * 0.15, cy + baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.05, cy - baseSize * 0.07, baseSize * 0.9, baseSize * 0.14);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy - baseSize * 0.28, baseSize * 0.1, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = '#200a0a';
        ctx.fill();
      } else if (type === 'FROST') {
        ctx.translate(cx, cy);
        ctx.rotate(Math.PI / 6);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.48;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0a1a3a';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.28;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * baseSize * 0.45, Math.sin(a) * baseSize * 0.45);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(0, 0, baseSize * 0.1, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.fill();
      }
      ctx.restore();
    }

    function drawTowers() {
      for (const tower of towers) {
        const cx = tower.col * cellSize + cellSize / 2;
        const cy = tower.row * cellSize + cellSize / 2;
        const baseSize = cellSize * 0.7;
        const boosted = powerBoostTimer > 0;
        const frozen = powerFreezeTimer > 0;

        ctx.save();
        ctx.translate(cx, cy);

        // Glow
        ctx.shadowColor = tower.color;
        ctx.shadowBlur = boosted ? 25 : 12;

        if (tower.type === 'TURRET') {
          // Dark base square
          ctx.fillStyle = '#1a2a3a';
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);

          // Rotating turret head
          ctx.rotate(tower.angle);
          const recoilOffset = tower.recoil * 3;

          // Barrel
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize * 0.1, -baseSize * 0.1, baseSize * 0.65 - recoilOffset, baseSize * 0.2);

          // Circular body
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.28, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.fill();

          // Inner circle
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.15, 0, Math.PI * 2);
          ctx.fillStyle = '#0a1520';
          ctx.fill();

          // Muzzle flash
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash;
            ctx.beginPath();
            ctx.arc(baseSize * 0.65 - recoilOffset, 0, baseSize * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

        } else if (tower.type === 'CANNON') {
          // Chunky dark base
          ctx.fillStyle = '#2a1a0a';
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);

          // Thick border
          ctx.strokeStyle = tower.color;
          ctx.lineWidth = 3;
          ctx.strokeRect(-baseSize / 2 + 2, -baseSize / 2 + 2, baseSize - 4, baseSize - 4);

          ctx.rotate(tower.angle);
          const recoilOffset = tower.recoil * 4;

          // Short thick barrel
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize * 0.05, -baseSize * 0.18, baseSize * 0.5 - recoilOffset, baseSize * 0.36);

          // Body circle
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.3, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.fill();

          // Inner dark
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.18, 0, Math.PI * 2);
          ctx.fillStyle = '#1a0a00';
          ctx.fill();

          // Muzzle flash
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash * 0.9;
            ctx.beginPath();
            ctx.arc(baseSize * 0.5 - recoilOffset, 0, baseSize * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc44';
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 25;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

        } else if (tower.type === 'SNIPER') {
          // Dark base
          ctx.fillStyle = '#1a0a0a';
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);

          // Red accent corners
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize / 2, -baseSize / 2, baseSize * 0.15, baseSize * 0.15);
          ctx.fillRect(baseSize / 2 - baseSize * 0.15, -baseSize / 2, baseSize * 0.15, baseSize * 0.15);
          ctx.fillRect(-baseSize / 2, baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
          ctx.fillRect(baseSize / 2 - baseSize * 0.15, baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);

          ctx.rotate(tower.angle);
          const recoilOffset = tower.recoil * 2;

          // Very long thin barrel
          ctx.fillStyle = tower.color;
          ctx.fillRect(-baseSize * 0.05, -baseSize * 0.07, baseSize * 0.9 - recoilOffset, baseSize * 0.14);

          // Body
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.22, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.fill();

          // Scope
          ctx.beginPath();
          ctx.arc(0, -baseSize * 0.28, baseSize * 0.1, 0, Math.PI * 2);
          ctx.strokeStyle = tower.color;
          ctx.lineWidth = 2;
          ctx.stroke();

          // Scope glint
          ctx.beginPath();
          ctx.arc(-baseSize * 0.03, -baseSize * 0.28, baseSize * 0.03, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.fill();

          // Inner body
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.12, 0, Math.PI * 2);
          ctx.fillStyle = '#200a0a';
          ctx.fill();

          // Muzzle flash (small and sharp)
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash;
            ctx.beginPath();
            ctx.arc(baseSize * 0.9 - recoilOffset, 0, baseSize * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

        } else if (tower.type === 'FROST') {
          // Hexagonal crystal shape
          ctx.rotate(tower.angle + Math.PI / 6); // Rotate for crystal orientation

          // Crystal glow aura
          const pulse = Math.sin(Date.now() / 400) * 0.15 + 0.85;
          ctx.globalAlpha = frozen ? 0.3 : 0.6 * pulse;
          ctx.fillStyle = tower.color;
          ctx.shadowBlur = boosted ? 30 : 18;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            const r = baseSize * 0.48;
            if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();
          ctx.globalAlpha = 1;

          // Inner crystal
          ctx.fillStyle = '#0a1a3a';
          ctx.shadowBlur = 0;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            const r = baseSize * 0.28;
            if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();

          // Crystal shard lines
          ctx.strokeStyle = tower.color;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.5;
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * baseSize * 0.45, Math.sin(a) * baseSize * 0.45);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;

          // Center glow
          ctx.beginPath();
          ctx.arc(0, 0, baseSize * 0.1, 0, Math.PI * 2);
          ctx.fillStyle = tower.color;
          ctx.shadowColor = tower.color;
          ctx.shadowBlur = 10;
          ctx.fill();

          // Frost muzzle flash
          if (tower.muzzleFlash > 0) {
            ctx.globalAlpha = tower.muzzleFlash * 0.8;
            ctx.beginPath();
            ctx.arc(baseSize * 0.45, 0, baseSize * 0.18, 0, Math.PI * 2);
            ctx.fillStyle = '#aaeeff';
            ctx.shadowColor = '#aaeeff';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        const cx = (enemy.col + 0.5) * cellSize;
        const cy = (enemy.row + 0.5) * cellSize;
        let radius = cellSize * 0.3;
        if (enemy.shape === 'medium') radius = cellSize * 0.35;
        if (enemy.shape === 'large') radius = cellSize * 0.45;

        if (enemy.dying) {
          const scale = 1 - enemy.deathTimer / 0.15;
          ctx.globalAlpha = scale;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(cx, cy, radius * 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          continue;
        }

        if (enemy.slowTimer > 0) {
          ctx.fillStyle = 'rgba(68,136,255,0.3)';
          ctx.beginPath();
          ctx.arc(cx, cy, radius * 1.2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = enemy.color;
        ctx.shadowColor = enemy.color;
        ctx.shadowBlur = enemy.isBoss ? 15 : 5;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (enemy.isBoss) {
          const pulse = Math.sin(Date.now() / 100) * 0.2 + 1;
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(cx, cy, radius * pulse, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(cx - radius / 3, cy - radius / 3, radius / 3, 0, Math.PI * 2);
        ctx.fill();

        const hpPct = enemy.hp / enemy.maxHP;
        const barW = radius * 2;
        const barH = 4;
        const barX = cx - barW / 2;
        const barY = cy - radius - 8;
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffff44' : '#ff4444';
        ctx.fillRect(barX, barY, barW * hpPct, barH);
      }
    }

    function drawProjectiles() {
      for (const proj of projectiles) {
        for (let i = 0; i < proj.trail.length; i++) {
          const t = proj.trail[i];
          ctx.fillStyle = proj.color;
          ctx.globalAlpha = 0.3 - i * 0.1;
          ctx.beginPath();
          ctx.arc((t.col) * cellSize, (t.row) * cellSize, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.fillStyle = proj.color;
        ctx.shadowColor = proj.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(proj.col * cellSize, proj.row * cellSize, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function drawSpawnAndBase() {
      const spawnCx = (SPAWN_POS.col + 0.5) * cellSize;
      const spawnCy = (SPAWN_POS.row + 0.5) * cellSize;
      const baseCx = (BASE_POS.col + 0.5) * cellSize;
      const baseCy = (BASE_POS.row + 0.5) * cellSize;
      const size = cellSize * 0.7;

      const spawnPulse = Math.sin(Date.now() / 300) * 0.15 + 1;
      ctx.fillStyle = '#44ff44';
      ctx.shadowColor = '#44ff44';
      ctx.shadowBlur = 15;
      ctx.fillRect(spawnCx - size * spawnPulse / 2, spawnCy - size * spawnPulse / 2, size * spawnPulse, size * spawnPulse);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a0f';
      ctx.font = `bold ${cellSize * 0.35}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', spawnCx, spawnCy);

      const basePulse = Math.sin(Date.now() / 300) * 0.15 + 1;
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 15;
      ctx.fillRect(baseCx - size * basePulse / 2, baseCy - size * basePulse / 2, size * basePulse, size * basePulse);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a0f';
      ctx.fillText('B', baseCx, baseCy);
    }

    // === GAME LOOP ===
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;

      // Always render regardless of state
      // Game logic updates only when WAVE_ACTIVE (not when PAUSED, PLANNING, MENU, etc.)
      if (gameState === GameStates.WAVE_ACTIVE) {
        updateWave(dt);
        updateTowers(dt);
        updateEnemies(dt);
        updateProjectiles(dt);
        updateHUD();
      } else if (gameState === GameStates.PAUSED) {
        // Frozen - no updates, just keep rendering
        console.log('[GAMELOOP] PAUSED state - game logic frozen');
      }

      if (pathInvalidFlash > 0) {
        pathInvalidFlash -= dt;
      }

      if (screenShake.duration > 0) {
        screenShake.duration -= dt;
      }

      // Power-up timers
      if (powerFreezeTimer > 0) powerFreezeTimer -= dt;
      if (powerBoostTimer > 0) powerBoostTimer -= dt;
      if (powerFlashTimer > 0) powerFlashTimer -= dt;
      updatePowerButtons();

      render();
      requestAnimationFrame(gameLoop);
    }

    // === INIT ===
    function init() {
      resizeCanvas();
      initGrid();
      initTowers();
      updateHUD();

      window.addEventListener('resize', resizeCanvas);

      setupInput();

      startBtn.addEventListener('click', () => {
        if (gameState === GameStates.PLANNING) {
          startWave();
        }
      });

      document.getElementById('clear-btn').addEventListener('click', () => {
        if (gameState === GameStates.PLANNING || gameState === GameStates.MENU) {
          clearPath();
        }
      });

      document.getElementById('buy-hp-btn').addEventListener('click', () => {
        buyHP();
      });

      document.getElementById('freeze-btn').addEventListener('click', activateFreeze);
      document.getElementById('freeze-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateFreeze(); });
      document.getElementById('nuke-btn').addEventListener('click', activateNuke);
      document.getElementById('nuke-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateNuke(); });
      document.getElementById('boost-btn').addEventListener('click', activateBoost);
      document.getElementById('boost-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateBoost(); });

      pauseBtn.addEventListener('click', () => {
        console.log('[PAUSE] click event fired! current state:', gameState);
        if (gameState === GameStates.WAVE_ACTIVE) {
          console.log('[PAUSE] Pausing game, showing overlay');
          gameState = GameStates.PAUSED;
          showOverlay('PAUSED');
          console.log('[PAUSE] gameState is now:', gameState);
        } else {
          console.log('[PAUSE] Ignored - not in WAVE_ACTIVE state, must be WAVE_ACTIVE to pause');
        }
      });
      
      // Also handle touchend for mobile Safari
      pauseBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        console.log('[PAUSE] touchend event fired! current state:', gameState);
        if (gameState === GameStates.WAVE_ACTIVE) {
          console.log('[PAUSE] Pausing game via touchend');
          gameState = GameStates.PAUSED;
          showOverlay('PAUSED');
        }
      });

      showOverlay('MENU');
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
</html>
