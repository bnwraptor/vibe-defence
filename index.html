<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vibe Defence — Path Architect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      align-items: center;
      justify-content: center;
    }
    #hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
      contain: layout paint style;
    }
    #hud-top .hp-display { color: #ff4444; }
    #hud-top .wave-display { color: #aaa; }
    #hud-top .currency-display { color: #ffd700; margin-right: 6px; }
    #canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      position: relative;
    }
    #game {
      display: block;
    }
    #hud-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 500px;
      padding: 8px 12px 16px;
      flex-shrink: 0;
      contain: layout paint style;
    }
    #budget-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #aaa;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    #bottom-controls {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      width: 100%;
    }
    #budget-track {
      flex: 1;
      height: 8px;
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    #budget-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #4a4a6a, #6a6a8a);
      border-radius: 4px;
      transform-origin: left center;
      transform: scaleX(0);
      will-change: transform;
      transition: transform 0.15s ease;
    }
    #start-btn {
      background: rgba(45,106,79,0.3);
      border: 2px solid #2d6a4f;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      opacity: 0.3;
      pointer-events: none;
    }
    #upgrade-btn {
      background: rgba(255,215,0,0.2);
      border: 2px solid #ffd700;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
    }
    #start-btn::before {
      content: '';
      width: 0; height: 0;
      border-style: solid;
      border-width: 5px 0 5px 9px;
      border-color: transparent transparent transparent #4ade80;
      flex-shrink: 0;
    }
    #start-btn:active { transform: scale(0.95); }
    #start-btn:disabled { opacity: 0.3; }
    #start-btn.active {
      opacity: 1;
      pointer-events: auto;
      animation: btnPulse 1s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(64,145,108,0.5); }
      50% { box-shadow: 0 0 0 6px rgba(64,145,108,0); }
    }
    #buy-hp-btn:disabled { opacity: 0.35; cursor: default; }
    #freeze-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(68,136,255,0.4) !important; }
    #nuke-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(255,136,0,0.4) !important; }
    #boost-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(255,215,0,0.4) !important; }
    #power-flash {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: clamp(32px, 10vw, 64px); font-weight: 900; z-index: 30;
      pointer-events: none; opacity: 0; transition: opacity 0.1s;
      text-shadow: 0 0 20px currentColor;
    }
    #power-flash.visible { opacity: 1; }
    #pause-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 16px;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #speed-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid #555;
      color: #aaa;
      font-size: 11px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      padding: 2px 6px;
      min-width: 32px;
      flex-shrink: 0;
    }
    #speed-btn.fast {
      background: rgba(74,222,128,0.2);
      border-color: #4ade80;
      color: #4ade80;
    }
    #mute-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 14px;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      color: #fff;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: clamp(28px, 8vw, 48px);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #overlay h2 {
      font-size: clamp(18px, 5vw, 28px);
      margin-bottom: 24px;
      color: #aaa;
    }
    #overlay .score-line {
      font-size: 16px;
      color: #888;
      margin-bottom: 8px;
    }
    #overlay .big-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
    }
    #overlay .secondary-btn {
      margin-top: 12px;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }
    #overlay .how-text {
      color: #aaa;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    #tooltip {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,60,60,0.9);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 15;
    }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud-top">
      <button id="mute-btn">🔊</button>
      <span class="wave-display" id="wave-text">WAVE 1</span>
      <span class="hp-display" id="hp-text">HP: ██████░░░░</span>
      <span class="currency-display" id="currency-text">💰 100</span>
      <button id="pause-btn">⏸</button>
      <button id="speed-btn" style="background:#222;border:1px solid #555;color:#aaa;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;padding:2px 6px;min-width:32px">1×</button>
    </div>
    <div id="canvas-wrapper">
      <canvas id="game"></canvas>
    </div>
    <div id="hud-bottom">
      <div id="budget-bar">
        <span>PATH</span>
        <div id="budget-track"><div id="budget-fill" style="width:0%"></div></div>
        <span id="budget-text">0/20</span>
        <button id="clear-btn" style="background:#333;border:none;color:#aaa;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:4px">CLEAR</button>
        <button id="buy-hp-btn" style="background:#441111;border:none;color:#ff6666;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:4px">+HP 15💰</button>
      </div>
      <div id="bottom-controls">
        <div id="power-btn-bar" style="display:flex;flex-direction:row;align-items:center;gap:8px">
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <button id="freeze-btn" style="background:rgba(68,136,255,0.2);border:2px solid #4488ff;color:#88aaff;font-size:13px;width:38px;height:38px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">❄</button>
            <span id="freeze-cost" style="font-size:8px;color:#88aaff;font-weight:700">20💰</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <button id="nuke-btn" style="background:rgba(255,136,0,0.2);border:2px solid #ff8800;color:#ff8800;font-size:13px;width:38px;height:38px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">💥</button>
            <span id="nuke-cost" style="font-size:8px;color:#ff8800;font-weight:700">35💰</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <button id="boost-btn" style="background:rgba(255,215,0,0.2);border:2px solid #ffd700;color:#ffd700;font-size:13px;width:38px;height:38px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">⚡</button>
            <span id="boost-cost" style="font-size:8px;color:#ffd700;font-weight:700">25💰</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:row;align-items:center;gap:8px">
          <div id="upgrade-wrap" style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <button id="upgrade-btn" style="background:rgba(255,215,0,0.2);border:2px solid #ffd700;border-radius:50%;width:38px;height:38px;cursor:pointer;opacity:0.3">
              <span id="upgrade-label" style="font-size:12px;color:#ffd700">↑</span>
            </button>
            <span id="upgrade-cost" style="font-size:8px;color:#ffd700;font-weight:700">—</span>
          </div>
          <button id="start-btn"></button>
        </div>
      </div>
    </div>
  </div>
  <div id="overlay">
    <h1>Vibe Defence</h1>
    <h2>Path Architect</h2>
    <p style="color:#888;font-size:13px;margin-bottom:16px;text-align:center">Select Difficulty</p>
    <div style="display:flex;gap:10px;margin-bottom:8px">
      <button id="diff-easy" style="flex:1;padding:10px 6px;border-radius:8px;border:2px solid #333;background:#1a1a2e;color:#44ff44;font-weight:bold;cursor:pointer;font-size:12px;transition:transform 0.1s,box-shadow 0.1s">EASY</button>
      <button id="diff-normal" style="flex:1;padding:10px 6px;border-radius:8px;border:2px solid #4ade80;box-shadow:0 0 10px rgba(74,222,128,0.4);background:#1a2e1a;color:#4ade80;font-weight:bold;cursor:pointer;font-size:12px;transition:transform 0.1s,box-shadow 0.1s">NORMAL</button>
      <button id="diff-hard" style="flex:1;padding:10px 6px;border-radius:8px;border:2px solid #333;background:#1a1a2e;color:#ff4444;font-weight:bold;cursor:pointer;font-size:12px;transition:transform 0.1s,box-shadow 0.1s">HARD</button>
    </div>
    <p id="diff-label" style="color:#666;font-size:11px;text-align:center;margin-bottom:16px;min-height:16px"></p>
    <p style="color:#666;max-width:320px;text-align:center;font-size:14px;line-height:1.6">
      Draw the path enemies must follow.<br>
      Your towers will defend the base.
    </p>
    <button class="big-btn" id="overlay-start-btn">START GAME</button>
    <button class="secondary-btn" id="overlay-how-btn">HOW TO PLAY</button>
  </div>
  <div id="tooltip">Path not connected!</div>
  <div id="power-flash"></div>

  <script>
    // === CONSTANTS ===
    const COLS = 12;
    const ROWS = 16;
    const CELL_TYPES = { EMPTY: 0, BLOCKED: 1, SPAWN: 2, BASE: 3, TOWER: 4, PATH: 5 };
    const TERRAIN_TYPES = { NONE: 'NONE', MUD: 'MUD', ICE: 'ICE', HIGH_GROUND: 'HIGH_GROUND' };
    const TERRAIN_DATA = {
      NONE: { speedMult: 1, towerRangeMult: 1 },
      MUD: { speedMult: 0.6, towerRangeMult: 1, color: '#4b2e1f' },
      ICE: { speedMult: 1.3, towerRangeMult: 1, color: '#9edcff', blocksLock: true },
      HIGH_GROUND: { speedMult: 1, towerRangeMult: 1.2, color: '#7c6f5b' }
    };
    const SPAWN_POS = { col: 0, row: 7 };
    const BASE_POS = { col: 11, row: 7 };
    const STARTING_TILE_BUDGET = 20;  // wave 1 total tiles
    const TILE_ACCUM_WAVES = 7;     // add 7 tiles each wave 1-8 (→76)
    const TILE_WAVE9_BONUS = 4;      // special: +4 at wave 9 (→80)
    const TILE_ACCUM_ENDLESS = 2;    // add 2 tiles every 10 waves in endless
    const MAX_TILE_BUDGET = 110;
    const BASE_HP = 100;
    const STARTING_CURRENCY = 100;
    const DIFFICULTY = {
      EASY: {
        enemyHpScale: 0.8,
        enemySpeedScale: 0.9,
        startHp: 120,
        startCurrency: 150,
        spawnIntervalMult: 1.3,
        borderColor: '#44ff44',
        bgActive: '#1a2e1a',
      },
      NORMAL: {
        enemyHpScale: 1.0,
        enemySpeedScale: 1.0,
        startHp: 100,
        startCurrency: 100,
        spawnIntervalMult: 1.0,
        borderColor: '#4ade80',
        bgActive: '#1a2e1a',
      },
      HARD: {
        enemyHpScale: 1.2,
        enemySpeedScale: 1.15,
        startHp: 80,
        startCurrency: 80,
        spawnIntervalMult: 0.85,
        borderColor: '#ff4444',
        bgActive: '#2e1a1a',
      }
    };
    let currentDifficulty = DIFFICULTY.NORMAL;
    const WAVE_BONUS = 20;
    const BASE_WAVES = 10;
    const ENDLESS_START = 11;
    const HP_COST = 15;
    const HP_RESTORE = 10;
    const POWER_FREEZE_COST = 20;
    const POWER_FREEZE_DUR = 3;
    const POWER_NUKE_COST = 35;
    const POWER_NUKE_DAMAGE = 50;
    const POWER_BOOST_COST = 25;
    const POWER_BOOST_DUR = 5;
    const SPAWN_INTERVAL = 0.8;
    const WAVE_DELAY = 3;
    const PROJ_SPEED = 480;
    const ENEMY_POOL_SIZE = 256;
    const PROJECTILE_POOL_SIZE = 256;
    const PARTICLE_POOL_SIZE = 500;
    const HIT_NUMBER_POOL_SIZE = 256;
    const PARTICLE_SHAPE_CIRCLE = 0;
    const PARTICLE_SHAPE_SQUARE = 1;
    const ICE_BOMB_SPLASH_MULT = 1.5;
    const ICE_BOMB_SPLASH_RADIUS = 2;
    const ICE_BOMB_SLOW_MULT = 0.2;
    const ICE_BOMB_SLOW_DUR = 1.5;
    const ICE_BOMB_MERGE_TIME = 0.18;
    const TOWER_TYPES = {
      TURRET: { color: '#00ffff', range: 3, fireRate: 0.5, damage: 10, targeting: 'nearest' },
      CANNON: { color: '#ff8800', range: 2, fireRate: 2, damage: 40, targeting: 'first', ability: 'splash', splashRadius: 1.0, splashDamage: 0.4 },
      SNIPER: { color: '#ff4444', range: 6, fireRate: 3, damage: 80, targeting: 'strongest', ability: 'pierce' },
      FROST: { color: '#4488ff', range: 2.5, fireRate: 1, damage: 5, targeting: 'weakest', slow: 0.5, ability: 'aoeSlow', aoeRadius: 1.5 }
    };
    const ENEMY_TYPES = {
      SCOUT: { shape: 'small', color: '#44ff44', baseHP: 30, speed: 3, reward: 5, armor: 0 },
      SOLDIER: { shape: 'medium', color: '#ffff44', baseHP: 80, speed: 2, reward: 10, armor: 0 },
      TANK: { shape: 'large', color: '#888888', baseHP: 200, speed: 1, reward: 25, armor: 15 },
      SPEEDSTER: { shape: 'small', color: '#ff44ff', baseHP: 20, speed: 5, reward: 8, armor: 0 },
      ARMORED: { shape: 'large', color: '#aa6644', baseHP: 150, speed: 1.2, reward: 20, armor: 20 },
      BOSS: { shape: 'large', color: '#aa44ff', baseHP: 500, speed: 0.8, reward: 100, isBoss: true, armor: 25 },
      MEGABOSS: { shape: 'megaboss', color: '#ff0044', baseHP: 1500, speed: 0.6, reward: 300, isBoss: true, armor: 50 }
    };

    function createPool(size, factory) {
      const pool = Array.from({ length: size }, () => {
        const item = factory();
        item.active = false;
        return item;
      });
      pool.activeCount = 0;
      return pool;
    }

    function acquireFromPool(pool) {
      for (let i = 0; i < pool.length; i++) {
        const item = pool[i];
        if (!item.active) {
          item.active = true;
          pool.activeCount++;
          return item;
        }
      }
      return null;
    }

    function releaseToPool(pool, item, reset) {
      if (!item || !item.active) return;
      item.active = false;
      if (reset) reset(item);
      pool.activeCount = Math.max(0, pool.activeCount - 1);
    }

    function resetPool(pool, reset) {
      for (const item of pool) {
        item.active = false;
        if (reset) reset(item);
      }
      pool.activeCount = 0;
    }

    function resetEnemyObject(enemy) {
      enemy.dying = false;
      enemy.deathTimer = 0;
      enemy.hitFlashFrames = 0;
      enemy.slowTimer = 0;
      enemy.slowMult = 1;
      enemy.stunTimer = 0;
      enemy.spawnAnim = 0;
      enemy.trail.length = 0;
    }

    function resetProjectileObject(proj) {
      proj.target = null;
      proj.phase = null;
      proj.trail.length = 0;
    }

    function resetHitNumberObject(hit) {
      hit.text = '';
    }

    const WAVE_DEFINITIONS = [
      [{ type: 'SCOUT', count: 5 }],
      [{ type: 'SCOUT', count: 8 }, { type: 'SOLDIER', count: 2 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }],
      [{ type: 'SOLDIER', count: 10 }, { type: 'TANK', count: 2 }, { type: 'ARMORED', count: 1 }],
      [{ type: 'SOLDIER', count: 8 }, { type: 'TANK', count: 3 }, { type: 'SPEEDSTER', count: 1 }, { type: 'ARMORED', count: 1 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 2 }, { type: 'ARMORED', count: 1 }],
      [{ type: 'SOLDIER', count: 10 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 5 }, { type: 'ARMORED', count: 2 }],
      [{ type: 'SOLDIER', count: 15 }, { type: 'TANK', count: 8 }, { type: 'SPEEDSTER', count: 8 }, { type: 'ARMORED', count: 2 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 5 }, { type: 'ARMORED', count: 3 }, { type: 'BOSS', count: 3 }],
      [{ type: 'SOLDIER', count: 20 }, { type: 'TANK', count: 10 }, { type: 'SPEEDSTER', count: 10 }, { type: 'ARMORED', count: 5 }, { type: 'BOSS', count: 5 }]
    ];

    // === STATE ===
    const GameStates = { MENU: 'MENU', PLANNING: 'PLANNING', WAVE_ACTIVE: 'WAVE_ACTIVE', PAUSED: 'PAUSED', GAME_OVER: 'GAME_OVER', VICTORY: 'VICTORY' };
    let gameState = GameStates.MENU;
    let grid = [];
    let terrainGrid = [];
    let towers = [];
    let enemies = createPool(ENEMY_POOL_SIZE, function() { return { trail: [] }; });
    let projectiles = createPool(PROJECTILE_POOL_SIZE, function() { return { trail: [] }; });
    const enemySpatialBuckets = Array.from({ length: ROWS * COLS }, function() { return []; });
    const deathParticleActive = new Uint8Array(PARTICLE_POOL_SIZE);
    const deathParticleX = new Float32Array(PARTICLE_POOL_SIZE);
    const deathParticleY = new Float32Array(PARTICLE_POOL_SIZE);
    const deathParticleVX = new Float32Array(PARTICLE_POOL_SIZE);
    const deathParticleVY = new Float32Array(PARTICLE_POOL_SIZE);
    const deathParticleSize = new Float32Array(PARTICLE_POOL_SIZE);
    const deathParticleLife = new Float32Array(PARTICLE_POOL_SIZE);
    const deathParticleMaxLife = new Float32Array(PARTICLE_POOL_SIZE);
    const deathParticleShape = new Uint8Array(PARTICLE_POOL_SIZE);
    const deathParticleColor = new Array(PARTICLE_POOL_SIZE).fill('#ffffff');
    let deathParticleActiveCount = 0;
    let splashRings = [];  // {col, row, radius, life}
    let towerSynergies = [];
    let hitNumbers = createPool(HIT_NUMBER_POOL_SIZE, function() { return {}; });       // {x, y, text, color, life, vy}
    let goldPickups = [];    // {x, y, text, life, vy}
    let pathTiles = [];
    let tileBudget = STARTING_TILE_BUDGET;  // tiles remaining to spend
    let totalBudget = STARTING_TILE_BUDGET;  // current max budget (grows with waves)
    let currency = STARTING_CURRENCY;
    let baseHP = BASE_HP;
    let currentWave = 1;
    let waveEnemyQueue = [];
    let waveSpeedMult = 1.0;
    let spawnTimer = 0;
    let lastTime = 0;
    let pathInvalidFlash = 0;
    let selectedTower = null;
    let towerRangeTimer = 0;
    let screenShake = { x: 0, y: 0, duration: 0 };
    let tooltipTimer = 0;

    // Power-up state
    let powerFreezeTimer = 0;
    let powerBoostTimer = 0;
    let powerFreezeAvail = true;
    let powerNukeAvail = true;
    let powerBoostAvail = true;

    // Visual effect state
    let powerFlashText = '';
    let powerFlashTimer = 0;
    let previewTimer = 0;
    const WAVE_PREVIEW_DURATION = 2.0;

    // Boss warning effect state
    let bossWarningTimer = 0;
    let bossWarningFlash = 0;
    let megaBossWarning = false;

    // Storm effect state
    let stormActive = false;
    // Armored wave effect state
    let armoredWave = false;
    // High score state (persisted via localStorage)
    let bestWave = 0;
    let bestScore = 0;

    // Speed multiplier
    let speedMult = 1.0;  // game speed multiplier (0.5 = slow, 1 = normal, 2 = fast)

    // Input state
    let pointerDown = false;
    let pointerStart = null;
    let pointerLastCell = null;
    let longPressTimer = null;
    const LONG_PRESS_DELAY = 500;

    // DOM elements
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const lightCanvas = document.createElement('canvas');
    const lightCtx = lightCanvas.getContext('2d');
    const staticSceneCanvas = document.createElement('canvas');
    const staticSceneCtx = staticSceneCanvas.getContext('2d');
    const glowSpriteCache = new Map();
    let staticSceneReady = false;
    let bossWarningGradient = null;
    const waveText = document.getElementById('wave-text');
    const hpText = document.getElementById('hp-text');
    const currencyText = document.getElementById('currency-text');
    const budgetText = document.getElementById('budget-text');
    const budgetFill = document.getElementById('budget-fill');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const overlay = document.getElementById('overlay');
    const overlayStartBtn = document.getElementById('overlay-start-btn');
    const overlayHowBtn = document.getElementById('overlay-how-btn');
    const tooltip = document.getElementById('tooltip');

    let cellSize = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2.0);

    // === GRID ===
    function initGrid() {
      grid = [];
      terrainGrid = [];
      for (let row = 0; row < ROWS; row++) {
        grid[row] = [];
        terrainGrid[row] = [];
        for (let col = 0; col < COLS; col++) {
          grid[row][col] = CELL_TYPES.EMPTY;
          terrainGrid[row][col] = TERRAIN_TYPES.NONE;
        }
      }
      grid[SPAWN_POS.row][SPAWN_POS.col] = CELL_TYPES.SPAWN;
      grid[BASE_POS.row][BASE_POS.col] = CELL_TYPES.BASE;
      sprinkleTerrainPatches(TERRAIN_TYPES.MUD, 4, 4, 7);
      sprinkleTerrainPatches(TERRAIN_TYPES.ICE, 3, 3, 5);
      sprinkleTerrainPatches(TERRAIN_TYPES.HIGH_GROUND, 4, 2, 4);
    }

    function getCellAt(col, row) {
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return {
        type: grid[row][col],
        terrain: terrainGrid[row][col],
        col,
        row
      };
    }

    function getCellTypeAt(col, row) {
      const cell = getCellAt(col, row);
      return cell ? cell.type : null;
    }

    function getTerrainAt(col, row) {
      const cell = getCellAt(col, row);
      return cell ? cell.terrain : TERRAIN_TYPES.NONE;
    }

    function isTerrainSeedAllowed(col, row) {
      const cellType = getCellTypeAt(col, row);
      return cellType !== null && cellType !== CELL_TYPES.SPAWN && cellType !== CELL_TYPES.BASE;
    }

    function sprinkleTerrainPatches(terrainType, patchCount, minSize, maxSize) {
      const dirs = [
        { col: 1, row: 0 }, { col: -1, row: 0 }, { col: 0, row: 1 }, { col: 0, row: -1 },
        { col: 1, row: 1 }, { col: -1, row: 1 }, { col: 1, row: -1 }, { col: -1, row: -1 }
      ];

      for (let patch = 0; patch < patchCount; patch++) {
        let seed = null;
        for (let attempt = 0; attempt < 30 && !seed; attempt++) {
          const col = Math.floor(Math.random() * COLS);
          const row = Math.floor(Math.random() * ROWS);
          if (isTerrainSeedAllowed(col, row)) {
            seed = { col, row };
          }
        }
        if (!seed) continue;

        const targetSize = minSize + Math.floor(Math.random() * (maxSize - minSize + 1));
        let placed = 0;
        let current = seed;
        const visited = new Set();
        let steps = 0;

        while (placed < targetSize && steps < targetSize * 10) {
          steps++;
          const key = `${current.col},${current.row}`;
          if (isTerrainSeedAllowed(current.col, current.row) && !visited.has(key)) {
            visited.add(key);
            if (terrainGrid[current.row][current.col] === TERRAIN_TYPES.NONE) {
              terrainGrid[current.row][current.col] = terrainType;
              placed++;
            }
          }

          const dir = dirs[Math.floor(Math.random() * dirs.length)];
          const nextCol = Math.max(0, Math.min(COLS - 1, current.col + dir.col));
          const nextRow = Math.max(0, Math.min(ROWS - 1, current.row + dir.row));
          if (isTerrainSeedAllowed(nextCol, nextRow)) {
            current = { col: nextCol, row: nextRow };
          } else {
            current = seed;
          }
        }
      }
    }

    function isCellOccupied(col, row) {
      const cell = getCellAt(col, row);
      return cell && (cell.type === CELL_TYPES.BLOCKED || cell.type === CELL_TYPES.SPAWN || cell.type === CELL_TYPES.BASE || cell.type === CELL_TYPES.TOWER);
    }

    // === PATH ===
    function placePathTile(col, row, duringWave = false) {
      if (tileBudget <= 0) {
        showTooltip('No path budget!');
        return false;
      }
      const cell = getCellAt(col, row);
      if (!cell || cell.type !== CELL_TYPES.EMPTY) {
        return false;
      }
      if (isPathTile(col, row)) {
        return false;
      }
      // A: Connectivity enforcement — first tile must touch SPAWN, subsequent tiles must touch last tile
      if (pathTiles.length === 0) {
        // First tile must be adjacent to SPAWN
        if (!isAdjacent(col, row, SPAWN_POS.col, SPAWN_POS.row)) {
          showTooltip('Path must start near SPAWN!');
          return false;
        }
      } else {
        // Each new tile must be adjacent to the last placed tile (sequential drawing)
        const last = pathTiles[pathTiles.length - 1];
        if (!isAdjacent(col, row, last.col, last.row)) {
          showTooltip('Tile must connect to existing path!');
          return false;
        }
      }
      pathTiles.push({ col, row });
      tileBudget--;
      grid[row][col] = CELL_TYPES.PATH;
      playPlaceSound();
      flashTile(col, row, '#4a4a6a', 100);
      updateHUD();
      invalidateStaticScene();
      if (gameState === GameStates.PLANNING) setStartButton(true);
      return true;
    }

    function removePathTile(col, row) {
      const idx = pathTiles.findIndex(t => t.col === col && t.row === row);
      if (idx === -1) return false;
      pathTiles.splice(idx, 1);
      tileBudget++;
      grid[row][col] = CELL_TYPES.EMPTY;
      playRemoveSound();
      updateHUD();
      invalidateStaticScene();
      if (gameState === GameStates.PLANNING) setStartButton(pathTiles.length > 0);
      return true;
    }

    function isPathTile(col, row) {
      return pathTiles.some(t => t.col === col && t.row === row);
    }

    function isTower(col, row) {
      return towers.some(t => t.col === col && t.row === row);
    }

    function getTowerAt(col, row) {
      return towers.find(t => t.col === col && t.row === row);
    }

    function isAdjacent(c1, r1, c2, r2) {
      return (Math.abs(c1 - c2) === 1 && r1 === r2) || (Math.abs(r1 - r2) === 1 && c1 === c2);
    }

    // Validate path as a single connected chain: SPAWN -> tile0 -> tile1 -> ... -> last -> BASE
    function validatePath() {
      if (pathTiles.length === 0) return true; // empty path = straight line (valid)
      // First tile must be adjacent to SPAWN
      if (!isAdjacent(pathTiles[0].col, pathTiles[0].row, SPAWN_POS.col, SPAWN_POS.row)) return false;
      // Walk the chain: each tile must be adjacent to the previous one
      for (let i = 1; i < pathTiles.length; i++) {
        if (!isAdjacent(pathTiles[i].col, pathTiles[i].row, pathTiles[i-1].col, pathTiles[i-1].row)) return false;
      }
      // Last tile must be adjacent to BASE
      if (!isAdjacent(pathTiles[pathTiles.length-1].col, pathTiles[pathTiles.length-1].row, BASE_POS.col, BASE_POS.row)) return false;
      return true;
    }

    function findPathDirection(col, row) {
      const idx = pathTiles.findIndex(t => t.col === col && t.row === row);
      if (idx === -1) {
        // SPAWN or BASE itself
        if (col === SPAWN_POS.col && row === SPAWN_POS.row) {
          if (pathTiles.length > 0) {
            return getDirection(SPAWN_POS.col, SPAWN_POS.row, pathTiles[0].col, pathTiles[0].row);
          }
          return getDirection(col, row, BASE_POS.col, BASE_POS.row);
        }
        return null;
      }
      if (idx === pathTiles.length - 1) {
        return getDirection(col, row, BASE_POS.col, BASE_POS.row);
      }
      const next = pathTiles[idx + 1];
      return getDirection(col, row, next.col, next.row);
    }

    function getDirection(fromCol, fromRow, toCol, toRow) {
      const dCol = toCol - fromCol;
      const dRow = toRow - fromRow;
      if (Math.abs(dCol) > Math.abs(dRow)) {
        return dCol > 0 ? 'right' : 'left';
      } else {
        return dRow > 0 ? 'down' : 'up';
      }
    }

    // Walk pathTiles sequentially: respects the order the player drew tiles
    function getOrderedPath() {
      if (pathTiles.length === 0) return [];
      // Start from the first tile (must be adjacent to SPAWN per validatePath)
      return pathTiles.slice(); // return copy in draw-order
    }

    function getPathAnchorPoints(includeBase = false, allowDirect = false) {
      const ordered = getOrderedPath();
      if (ordered.length === 0) {
        if (!allowDirect) return [];
        return [
          { x: SPAWN_POS.col, y: SPAWN_POS.row },
          { x: BASE_POS.col, y: BASE_POS.row }
        ];
      }

      const anchors = [{ x: SPAWN_POS.col, y: SPAWN_POS.row }];
      for (const tile of ordered) {
        anchors.push({ x: tile.col, y: tile.row });
      }

      const last = ordered[ordered.length - 1];
      if (includeBase || isAdjacent(last.col, last.row, BASE_POS.col, BASE_POS.row)) {
        anchors.push({ x: BASE_POS.col, y: BASE_POS.row });
      }

      return anchors;
    }

    function getCatmullRomSegments(points) {
      if (points.length < 2) return [];
      const segments = [];

      for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[i - 1] || points[i];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2] || p2;

        segments.push({
          start: { x: p1.x, y: p1.y },
          cp1: {
            x: p1.x + (p2.x - p0.x) / 6,
            y: p1.y + (p2.y - p0.y) / 6
          },
          cp2: {
            x: p2.x - (p3.x - p1.x) / 6,
            y: p2.y - (p3.y - p1.y) / 6
          },
          end: { x: p2.x, y: p2.y }
        });
      }

      return segments;
    }

    function getBezierPoint(segment, t) {
      const mt = 1 - t;
      const mt2 = mt * mt;
      const t2 = t * t;
      const a = mt2 * mt;
      const b = 3 * mt2 * t;
      const c = 3 * mt * t2;
      const d = t * t2;

      return {
        x: a * segment.start.x + b * segment.cp1.x + c * segment.cp2.x + d * segment.end.x,
        y: a * segment.start.y + b * segment.cp1.y + c * segment.cp2.y + d * segment.end.y
      };
    }

    function buildSplineSamples(segments, resolution = 12) {
      if (!segments.length) return [];
      const samples = [{ x: segments[0].start.x, y: segments[0].start.y, distance: 0 }];
      let totalDistance = 0;
      let last = samples[0];

      for (const segment of segments) {
        for (let step = 1; step <= resolution; step++) {
          const point = getBezierPoint(segment, step / resolution);
          totalDistance += Math.hypot(point.x - last.x, point.y - last.y);
          samples.push({ x: point.x, y: point.y, distance: totalDistance });
          last = point;
        }
      }

      return samples;
    }

    function getPathSplineData(options) {
      const opts = options || {};
      const anchors = getPathAnchorPoints(!!opts.includeBase, !!opts.allowDirect);
      if (anchors.length < 2) {
        return { anchors, segments: [], samples: [], totalLength: 0 };
      }

      const segments = getCatmullRomSegments(anchors);
      const samples = buildSplineSamples(segments, opts.resolution || 12);
      const totalLength = samples.length ? samples[samples.length - 1].distance : 0;
      return { anchors, segments, samples, totalLength };
    }

    function getPointOnSpline(pathData, distance) {
      if (!pathData.samples.length) {
        const fallback = pathData.anchors[0] || { x: SPAWN_POS.col, y: SPAWN_POS.row };
        return { x: fallback.x, y: fallback.y };
      }

      if (distance <= 0) {
        return { x: pathData.samples[0].x, y: pathData.samples[0].y };
      }
      if (distance >= pathData.totalLength) {
        const end = pathData.samples[pathData.samples.length - 1];
        return { x: end.x, y: end.y };
      }

      for (let i = 1; i < pathData.samples.length; i++) {
        const prev = pathData.samples[i - 1];
        const next = pathData.samples[i];
        if (distance <= next.distance) {
          const span = Math.max(0.0001, next.distance - prev.distance);
          const t = (distance - prev.distance) / span;
          return {
            x: prev.x + (next.x - prev.x) * t,
            y: prev.y + (next.y - prev.y) * t
          };
        }
      }

      const last = pathData.samples[pathData.samples.length - 1];
      return { x: last.x, y: last.y };
    }

    // === TOWERS ===
    // Tower spots — candidate positions spread across the grid, avoiding SPAWN (0,7) and BASE (11,7)
    const TOWER_SPOTS = [
      { col: 3, row: 3 }, { col: 6, row: 5 }, { col: 9, row: 4 },
      { col: 2, row: 10 }, { col: 8, row: 11 }, { col: 5, row: 13 },
      { col: 10, row: 9 }, { col: 4, row: 2 }, { col: 7, row: 6 },
      { col: 1, row: 14 }, { col: 9, row: 14 }, { col: 3, row: 6 }
    ];

    function initTowers() {
      // Shuffle TOWER_SPOTS using Fisher-Yates
      const pool = TOWER_SPOTS.slice();
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = pool[i];
        pool[i] = pool[j];
        pool[j] = tmp;
      }
      const chosenSpots = pool.slice(0, 7);
      // Shuffle tower types independently
      const types = ['TURRET', 'TURRET', 'CANNON', 'SNIPER', 'FROST', 'CANNON', 'SNIPER'];
      for (let i = types.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = types[i];
        types[i] = types[j];
        types[j] = tmp;
      }
      towers = chosenSpots.map((spot, i) => ({ type: types[i], col: spot.col, row: spot.row }));
      for (const t of towers) {
        const typeData = TOWER_TYPES[t.type];
        t.color = typeData.color;
        t.range = typeData.range;
        t.fireRate = typeData.fireRate;
        t.damage = typeData.damage;
        t.cooldown = 0;
        t.slow = typeData.slow || 0;
        t.angle = 0;
        t.muzzleFlash = 0;
        t.recoil = 0;
        // Tower abilities
        t.ability = typeData.ability || null;
        t.splashRadius = typeData.splashRadius || 0;
        t.splashDamage = typeData.splashDamage || 0;
        t.aoeRadius = typeData.aoeRadius || 0;
        t.pierce = typeData.ability === 'pierce';
        t.targeting = typeData.targeting || 'nearest';
        t.highGroundBoost = isTowerNearTerrainType(t, TERRAIN_TYPES.HIGH_GROUND);
        grid[t.row][t.col] = CELL_TYPES.TOWER;
      }
    }

    function isTowerNearTerrainType(tower, terrainType) {
      const maxDistSq = 1.5 * 1.5;
      for (let row = tower.row - 1; row <= tower.row + 1; row++) {
        for (let col = tower.col - 1; col <= tower.col + 1; col++) {
          if (getTerrainAt(col, row) !== terrainType) continue;
          const dx = col - tower.col;
          const dy = row - tower.row;
          if (dx * dx + dy * dy <= maxDistSq) {
            return true;
          }
        }
      }
      return false;
    }

    function getTowerEffectiveRange(tower) {
      return tower.range * (tower.highGroundBoost ? TERRAIN_DATA[TERRAIN_TYPES.HIGH_GROUND].towerRangeMult : 1);
    }

    function getEnemyTerrain(enemy) {
      return getTerrainAt(Math.floor(enemy.x !== undefined ? enemy.x : enemy.col), Math.floor(enemy.y !== undefined ? enemy.y : enemy.row));
    }

    function canTowerLockEnemy(enemy) {
      const terrain = getEnemyTerrain(enemy);
      return !TERRAIN_DATA[terrain].blocksLock;
    }

    function getTowerCenter(tower) {
      return { col: tower.col + 0.5, row: tower.row + 0.5 };
    }

    function getTowerToEnemyDistanceSq(tower, enemy) {
      const dx = enemy.col - tower.col;
      const dy = enemy.row - tower.row;
      return dx * dx + dy * dy;
    }

    function clearEnemySpatialGrid() {
      for (const bucket of enemySpatialBuckets) bucket.length = 0;
    }

    function addEnemyToSpatialGrid(enemy) {
      const col = Math.max(0, Math.min(COLS - 1, Math.floor(enemy.col)));
      const row = Math.max(0, Math.min(ROWS - 1, Math.floor(enemy.row)));
      enemy.spatialCol = col;
      enemy.spatialRow = row;
      enemySpatialBuckets[row * COLS + col].push(enemy);
    }

    function getEnemiesNearPoint(centerCol, centerRow, range, predicate) {
      const rangeSq = range * range;
      const minCol = Math.max(0, Math.floor(centerCol + 0.5 - range));
      const maxCol = Math.min(COLS - 1, Math.floor(centerCol + 0.5 + range));
      const minRow = Math.max(0, Math.floor(centerRow + 0.5 - range));
      const maxRow = Math.min(ROWS - 1, Math.floor(centerRow + 0.5 + range));
      const inRange = [];

      for (let row = minRow; row <= maxRow; row++) {
        for (let col = minCol; col <= maxCol; col++) {
          const bucket = enemySpatialBuckets[row * COLS + col];
          for (let i = 0; i < bucket.length; i++) {
            const enemy = bucket[i];
            if (!enemy.active || enemy.dying) continue;
            if (predicate && !predicate(enemy)) continue;
            const dx = enemy.col - centerCol;
            const dy = enemy.row - centerRow;
            const distSq = dx * dx + dy * dy;
            if (distSq <= rangeSq) inRange.push(enemy);
          }
        }
      }

      return inRange;
    }

    function getEnemiesInRange(tower, rangeOverride) {
      const range = rangeOverride !== undefined ? rangeOverride : getTowerEffectiveRange(tower);
      return getEnemiesNearPoint(tower.col, tower.row, range, canTowerLockEnemy);
    }

    function compareTargetsForTower(tower, a, b) {
      const distDelta = getTowerToEnemyDistanceSq(tower, a) - getTowerToEnemyDistanceSq(tower, b);
      const mode = tower.targeting || 'nearest';
      switch (mode) {
        case 'first':
          return b.pathIndex - a.pathIndex || distDelta;
        case 'last':
          return a.pathIndex - b.pathIndex || distDelta;
        case 'weakest':
          return a.hp - b.hp || distDelta;
        case 'strongest':
          return b.hp - a.hp || distDelta;
        case 'nearest':
        default:
          return distDelta;
      }
    }

    function selectTargetForTower(tower, candidates) {
      const inRange = (candidates || getEnemiesInRange(tower)).filter(enemy => enemy.active && !enemy.dying && canTowerLockEnemy(enemy));
      if (!inRange.length) return null;
      return inRange.slice().sort((a, b) => compareTargetsForTower(tower, a, b))[0];
    }

    function getTargetRanks(tower, candidates) {
      const ordered = candidates.slice().sort((a, b) => compareTargetsForTower(tower, a, b));
      return new Map(ordered.map((enemy, index) => [enemy, index]));
    }

    function selectSynergyTarget(cannon, frost) {
      const frostRangeSq = Math.pow(getTowerEffectiveRange(frost), 2);
      const sharedEnemies = getEnemiesInRange(cannon).filter(enemy => getTowerToEnemyDistanceSq(frost, enemy) <= frostRangeSq);
      if (!sharedEnemies.length) return null;

      const cannonRanks = getTargetRanks(cannon, sharedEnemies);
      const frostRanks = getTargetRanks(frost, sharedEnemies);

      return sharedEnemies.slice().sort((a, b) => {
        const scoreA = cannonRanks.get(a) + frostRanks.get(a);
        const scoreB = cannonRanks.get(b) + frostRanks.get(b);
        if (scoreA !== scoreB) return scoreA - scoreB;
        return compareTargetsForTower(cannon, a, b) || compareTargetsForTower(frost, a, b);
      })[0];
    }

    function getTowerSynergies() {
      const overlapCandidates = [];
      const cannons = towers.filter(tower => tower.type === 'CANNON');
      const frosts = towers.filter(tower => tower.type === 'FROST');

      for (const cannon of cannons) {
        for (const frost of frosts) {
          const dx = frost.col - cannon.col;
          const dy = frost.row - cannon.row;
          const distanceSq = dx * dx + dy * dy;
          const overlapRange = getTowerEffectiveRange(cannon) + getTowerEffectiveRange(frost);
          if (distanceSq <= overlapRange * overlapRange) {
            overlapCandidates.push({ cannon, frost, distanceSq });
          }
        }
      }

      overlapCandidates.sort((a, b) => a.distanceSq - b.distanceSq);
      const paired = new Set();
      return overlapCandidates.filter(link => {
        if (paired.has(link.cannon) || paired.has(link.frost)) return false;
        paired.add(link.cannon);
        paired.add(link.frost);
        return true;
      });
    }

    function aimTowerAtTarget(tower, target) {
      if (!target) return;
      const towerPos = getTowerCenter(tower);
      tower.angle = Math.atan2(target.row + 0.5 - towerPos.row, target.col + 0.5 - towerPos.col);
    }

    function getEffectiveTowerStats(tower, boosted) {
      return {
        fireRate: boosted ? tower.fireRate * 0.5 : tower.fireRate,
        damage: boosted ? tower.damage * 2 : tower.damage
      };
    }

    function applySlow(enemy, duration, multiplier) {
      if (!enemy || enemy.dying) return;
      const hadSlow = (enemy.slowTimer || 0) > 0;
      enemy.slowTimer = Math.max(enemy.slowTimer || 0, duration);
      if (!hadSlow || enemy.slowMult === undefined) {
        enemy.slowMult = multiplier;
      } else {
        enemy.slowMult = Math.min(enemy.slowMult, multiplier);
      }
    }

    function triggerTowerFire(tower, fireRate) {
      tower.cooldown = fireRate;
      tower.muzzleFlash = 1.0;
      tower.recoil = 1.0;
    }

    function spawnProjectile(data) {
      const proj = acquireFromPool(projectiles);
      if (!proj) return null;
      resetProjectileObject(proj);
      Object.assign(proj, data);
      return proj;
    }

    function despawnProjectile(proj) {
      releaseToPool(projectiles, proj, resetProjectileObject);
    }

    function spawnDeathParticle(data) {
      for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
        if (deathParticleActive[i]) continue;
        deathParticleActive[i] = 1;
        deathParticleX[i] = data.x;
        deathParticleY[i] = data.y;
        deathParticleVX[i] = data.vx;
        deathParticleVY[i] = data.vy;
        deathParticleSize[i] = data.size;
        deathParticleLife[i] = data.life;
        deathParticleMaxLife[i] = data.maxLife || data.life || 1;
        deathParticleColor[i] = data.color || '#ffffff';
        deathParticleShape[i] = data.shape === 'square' ? PARTICLE_SHAPE_SQUARE : PARTICLE_SHAPE_CIRCLE;
        deathParticleActiveCount++;
        return i;
      }
      return -1;
    }

    function despawnDeathParticle(index) {
      if (!deathParticleActive[index]) return;
      deathParticleActive[index] = 0;
      deathParticleLife[index] = 0;
      deathParticleShape[index] = PARTICLE_SHAPE_CIRCLE;
      deathParticleActiveCount = Math.max(0, deathParticleActiveCount - 1);
    }

    function resetDeathParticles() {
      deathParticleActive.fill(0);
      deathParticleLife.fill(0);
      deathParticleShape.fill(PARTICLE_SHAPE_CIRCLE);
      deathParticleActiveCount = 0;
    }

    function spawnHitNumber(data) {
      const hit = acquireFromPool(hitNumbers);
      if (!hit) return null;
      resetHitNumberObject(hit);
      Object.assign(hit, data);
      return hit;
    }

    function despawnHitNumber(hit) {
      releaseToPool(hitNumbers, hit, resetHitNumberObject);
    }

    function applyFrostAura(tower) {
      if (tower.type !== 'FROST' || !tower.aoeRadius) return;
      for (const enemy of getEnemiesNearPoint(tower.col, tower.row, tower.aoeRadius)) {
        applySlow(enemy, 1.0, tower.slow || 0.5);
      }
    }

    function fireTowerProjectile(tower, targetEnemy, boosted) {
      const stats = getEffectiveTowerStats(tower, boosted);
      triggerTowerFire(tower, stats.fireRate);
      applyFrostAura(tower);

      spawnProjectile({
        col: tower.col + 0.5,
        row: tower.row + 0.5,
        target: targetEnemy,
        damage: stats.damage,
        color: tower.color,
        slow: tower.slow,
        slowDuration: tower.slow ? 1.0 : 0,
        trail: [],
        boosted: boosted,
        towerType: tower.type,
        pierce: tower.type === 'SNIPER' ? true : false,
        splashRadius: tower.type === 'CANNON' ? tower.splashRadius : 0,
        splashDamage: tower.type === 'CANNON' ? Math.round(stats.damage * tower.splashDamage) : 0,
        splashColor: tower.type === 'CANNON' ? tower.color : null
      });
      playShootSound();
    }

    function fireSynergyProjectile(cannon, frost, targetEnemy, boosted) {
      const cannonStats = getEffectiveTowerStats(cannon, boosted);
      const frostStats = getEffectiveTowerStats(frost, boosted);
      triggerTowerFire(cannon, cannonStats.fireRate);
      triggerTowerFire(frost, frostStats.fireRate);
      applyFrostAura(frost);

      const cannonPos = getTowerCenter(cannon);
      const frostPos = getTowerCenter(frost);
      const targetCol = targetEnemy.col + 0.5;
      const targetRow = targetEnemy.row + 0.5;
      const towerMidCol = (cannonPos.col + frostPos.col) / 2;
      const towerMidRow = (cannonPos.row + frostPos.row) / 2;
      const mergeCol = (towerMidCol + targetCol) / 2;
      const mergeRow = (towerMidRow + targetRow) / 2;

      spawnProjectile({
        type: 'ICE_BOMB',
        phase: 'merge',
        mergeTimer: ICE_BOMB_MERGE_TIME,
        mergeDuration: ICE_BOMB_MERGE_TIME,
        mergePoint: { col: mergeCol, row: mergeRow },
        sourceA: { col: cannonPos.col, row: cannonPos.row, color: cannon.color },
        sourceB: { col: frostPos.col, row: frostPos.row, color: frost.color },
        col: mergeCol,
        row: mergeRow,
        target: targetEnemy,
        damage: cannonStats.damage + frostStats.damage,
        color: '#a8ecff',
        slow: ICE_BOMB_SLOW_MULT,
        slowDuration: ICE_BOMB_SLOW_DUR,
        trail: [],
        boosted: boosted,
        towerType: 'ICE_BOMB',
        pierce: false,
        splashRadius: ICE_BOMB_SPLASH_RADIUS,
        splashDamage: Math.round(cannonStats.damage * ICE_BOMB_SPLASH_MULT),
        splashColor: '#a8ecff'
      });
      playShootSound();
    }

    function updateTowers(dt) {
      const boosted = powerBoostTimer > 0;
      towerSynergies = getTowerSynergies();
      const syncedTargets = new Map();

      for (const link of towerSynergies) {
        link.target = selectSynergyTarget(link.cannon, link.frost);
        if (link.target) {
          syncedTargets.set(link.cannon, link.target);
          syncedTargets.set(link.frost, link.target);
        }
      }

      for (const tower of towers) {
        tower.cooldown = Math.max(0, tower.cooldown - dt);
        if (tower.recoil > 0) tower.recoil = Math.max(0, tower.recoil - dt * 10);
        if (tower.muzzleFlash > 0) tower.muzzleFlash = Math.max(0, tower.muzzleFlash - dt * 20);
        tower.currentTarget = syncedTargets.get(tower) || selectTargetForTower(tower);
        if (tower.currentTarget) {
          aimTowerAtTarget(tower, tower.currentTarget);
        }
      }

      const synergyShots = new Set();
      for (const link of towerSynergies) {
        if (!link.target) continue;
        if (link.cannon.cooldown > 0 || link.frost.cooldown > 0) continue;
        fireSynergyProjectile(link.cannon, link.frost, link.target, boosted);
        synergyShots.add(link.cannon);
        synergyShots.add(link.frost);
      }

      for (const tower of towers) {
        if (synergyShots.has(tower) || tower.cooldown > 0) continue;
        if (!tower.currentTarget || !tower.currentTarget.active || tower.currentTarget.dying) continue;
        fireTowerProjectile(tower, tower.currentTarget, boosted);
      }
    }

    // === ENEMIES ===
    function spawnEnemy(type) {
      const typeData = ENEMY_TYPES[type];
      const isBossType = type === 'BOSS' || type === 'MEGABOSS';
      const hpScale = isBossType
        ? (1 + (currentWave - 10) * 0.25) * currentDifficulty.enemyHpScale
        : (1 + (currentWave - 1) * 0.15) * currentDifficulty.enemyHpScale;
      const speed = typeData.speed * waveSpeedMult * currentDifficulty.enemySpeedScale * (stormActive ? 1.2 : 1);
      const enemy = acquireFromPool(enemies);
      if (!enemy) return;
      resetEnemyObject(enemy);
      Object.assign(enemy, {
        type,
        x: SPAWN_POS.col,
        y: SPAWN_POS.row,
        col: SPAWN_POS.col,
        row: SPAWN_POS.row,
        prevCol: SPAWN_POS.col,
        prevRow: SPAWN_POS.row,
        angle: 0,
        hp: typeData.baseHP * hpScale,
        maxHP: typeData.baseHP * hpScale,
        speed: speed,
        reward: typeData.reward,
        color: typeData.color,
        shape: typeData.shape,
        isBoss: typeData.isBoss || false,
        armor: (typeData.armor || 0) + (armoredWave ? 10 : 0),
        pathIndex: 0,
        slowTimer: 0,
        slowMult: 1,
        stunTimer: 0,
        hitFlashFrames: 0,
        deathTimer: 0,
        dying: false,
        spawnAnim: 1.0,
        bossRotation: 0
      });
      playSpawnSound();
      if (type === 'BOSS' || type === 'MEGABOSS') {
        bossWarningTimer = 1.5;
        bossWarningFlash = 1.0;
        megaBossWarning = type === 'MEGABOSS';
        screenShake.duration = type === 'MEGABOSS' ? 0.5 : 0.3;
        playTone(type === 'MEGABOSS' ? 60 : 80, 0.5, 'sawtooth', type === 'MEGABOSS' ? 0.5 : 0.3);
        playTone(60, 0.8, 'sawtooth', 0.2);
      }
    }

    function updateEnemies(dt) {
      const pathData = getPathSplineData({ includeBase: true, allowDirect: true, resolution: 14 });
      clearEnemySpatialGrid();

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        if (!enemy.active) continue;

        if (enemy.dying) {
          enemy.deathTimer += dt;
          if (enemy.deathTimer >= 0.15) {
            releaseToPool(enemies, enemy, resetEnemyObject);
          }
          continue;
        }

        if (enemy.slowTimer > 0) {
          enemy.slowTimer -= dt;
          if (enemy.slowTimer <= 0) {
            enemy.slowTimer = 0;
            enemy.slowMult = 1;
          }
        }
        if (enemy.stunTimer > 0) enemy.stunTimer -= dt;
        if (enemy.spawnAnim > 0) {
          enemy.spawnAnim -= dt * 3;
          if (enemy.spawnAnim < 0) enemy.spawnAnim = 0;
        }

        const pathLength = pathData.totalLength;
        if (previewTimer <= 0) {
          enemy.terrainType = getEnemyTerrain(enemy);
          const terrainSpeedMult = TERRAIN_DATA[enemy.terrainType].speedMult || 1;
          const speedMod = (enemy.slowTimer > 0 ? (enemy.slowMult || 1) : 1) * terrainSpeedMult * (powerFreezeTimer > 0 ? 0 : 1) * (enemy.stunTimer > 0 ? 0 : 1);
          const moveSpeed = enemy.speed * speedMod * dt;

          if (moveSpeed > 0 && pathLength > 0) {
            enemy.pathIndex = Math.min(pathLength, Math.max(0, enemy.pathIndex + moveSpeed));
            const currentPoint = getPointOnSpline(pathData, enemy.pathIndex);
            const lookAhead = getPointOnSpline(pathData, Math.min(pathLength, enemy.pathIndex + 0.08));
            enemy.angle = Math.atan2(lookAhead.y - currentPoint.y, lookAhead.x - currentPoint.x);
            enemy.prevCol = enemy.col;
            enemy.prevRow = enemy.row;
            enemy.x = currentPoint.x;
            enemy.y = currentPoint.y;
            enemy.col = enemy.x;
            enemy.row = enemy.y;

            enemy.trail.unshift({ col: enemy.col, row: enemy.row, angle: enemy.angle });
            const maxTrail = enemy.type === 'SPEEDSTER' ? 3 : enemy.type === 'SCOUT' ? 2 : enemy.type === 'SOLDIER' ? 1 : 0;
            if (enemy.trail.length > maxTrail) enemy.trail.pop();
          }
        }

        const baseDx = enemy.col - BASE_POS.col;
        const baseDy = enemy.row - BASE_POS.row;
        if (pathLength > 0 && enemy.pathIndex >= pathLength - 0.05 && baseDx * baseDx + baseDy * baseDy < 0.04) {
          const damage = Math.ceil(enemy.maxHP * 0.1);
          baseHP -= damage;
          screenShake.duration = 0.2;
          playBaseDamageSound();
          releaseToPool(enemies, enemy, resetEnemyObject);
          if (baseHP <= 0) {
            baseHP = 0;
            gameState = GameStates.GAME_OVER;
            // Save records before showing overlay
            const finalScore = currency + (currentWave - 1) * 100;
            const wavesDone = currentWave - 1;
            if (wavesDone > bestWave) {
              bestWave = wavesDone;
              localStorage.setItem('vibe-bestWave', bestWave.toString());
            }
            if (finalScore > bestScore) {
              bestScore = finalScore;
              localStorage.setItem('vibe-bestScore', bestScore.toString());
            }
            showOverlay('GAME_OVER');
          }
          continue;
        }

        // Boss rotation independent of movement
        if (enemy.isBoss) {
          enemy.bossRotation += dt * 1.5;
        }
        addEnemyToSpatialGrid(enemy);
      }
    }

    function killEnemy(enemy) {
      if (!enemy || !enemy.active || enemy.dying) return;
      enemy.dying = true;
      enemy.deathTimer = 0;
      currency += enemy.reward;
      playDeathSound();
      vibrate();
      if (enemy.isBoss) screenShake.duration = enemy.type === 'MEGABOSS' ? 0.6 : 0.4;
      updateHUD();
      // Gold pickup floating text
      goldPickups.push({
        x: (enemy.col + 0.5) * cellSize,
        y: (enemy.row + 0.5) * cellSize,
        text: `+${enemy.reward}💰`,
        life: 1.0,
        vy: -cellSize * 1.5
      });
      // Spawn death particles at enemy position
      const cx = (enemy.col + 0.5) * cellSize;
      const cy = (enemy.row + 0.5) * cellSize;
      const particleCount = enemy.shape === 'large' ? 12 : 8;
      for (let i = 0; i < particleCount; i++) {
        const angle = (i / particleCount) * Math.PI * 2 + Math.random() * 0.5;
        const speed = 50 + Math.random() * 80;
        spawnDeathParticle({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          color: enemy.color,
          size: enemy.shape === 'large' ? 4 + Math.random() * 4 : 3 + Math.random() * 3,
          life: 1.0,
          maxLife: 0.5 + Math.random() * 0.3
        });
      }
    }

    // === PROJECTILES ===
    function updateProjectiles(dt) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const proj = projectiles[i];
        if (!proj.active) continue;
        const target = proj.target;

        if (!target || !target.active || target.dying) {
          despawnProjectile(proj);
          continue;
        }

        if (proj.phase === 'merge') {
          proj.mergeTimer -= dt;
          if (proj.mergeTimer <= 0) {
            proj.phase = 'travel';
            proj.col = proj.mergePoint.col;
            proj.row = proj.mergePoint.row;
          }
          continue;
        }

        proj.trail.unshift({ col: proj.col, row: proj.row });
        if (proj.trail.length > 3) proj.trail.pop();

        const dx = (target.col + 0.5) - proj.col;
        const dy = (target.row + 0.5) - proj.row;
        const distSq = dx * dx + dy * dy;

        if (distSq < 0.09) {
          // Armor reduction (pierce bypasses armor)
          const armorPierced = proj.pierce;
          const targetArmor = armorPierced ? 0 : (target.armor || 0);
          const damageDealt = Math.max(1, proj.damage - targetArmor);
          target.hp -= damageDealt;

          if (proj.slow > 0 && !armorPierced) {
            applySlow(target, proj.slowDuration || 1, proj.slow);
          }

          if (proj.towerType === 'CANNON' || proj.towerType === 'SNIPER') {
            target.stunTimer = 0.15;
            target.pathIndex = Math.max(0, target.pathIndex - 0.2);
            target.hitFlashFrames = 3;
            // Spawn debris particles
            const particleCount = 5 + Math.floor(Math.random() * 4);
            const cx = (target.col + 0.5) * cellSize;
            const cy = (target.row + 0.5) * cellSize;
            const hitAngle = Math.atan2(dy, dx) + Math.PI;
            for (let j = 0; j < particleCount; j++) {
              const spread = (Math.random() - 0.5) * Math.PI * 0.8;
              const speed = 220 + Math.random() * 180;
              spawnDeathParticle({
                x: cx, y: cy,
                vx: Math.cos(hitAngle + spread) * speed,
                vy: Math.sin(hitAngle + spread) * speed,
                color: '#ffffff',
                size: 2 + Math.random() * 1.5,
                shape: 'square',
                life: 1.0,
                maxLife: 0.12 + Math.random() * 0.08
              });
            }
          }

          // Splash damage for cannon
          if (proj.splashRadius > 0) {
            for (const enemy of enemies) {
              if (!enemy.active) continue;
              if (enemy === target || enemy.dying) continue;
              const sdx = enemy.col - target.col;
              const sdy = enemy.row - target.row;
              if (sdx * sdx + sdy * sdy <= proj.splashRadius * proj.splashRadius) {
                const splashArmor = armorPierced ? 0 : (enemy.armor || 0);
                const splashDmg = Math.max(1, proj.splashDamage - splashArmor);
                enemy.hp -= splashDmg;
                if (proj.slow > 0) {
                  applySlow(enemy, proj.slowDuration || 1, proj.slow);
                }
                // Splash hit number
                const sx = (enemy.col + 0.5) * cellSize;
                const sy = (enemy.row + 0.5) * cellSize;
                spawnHitNumber({
                  x: sx + (Math.random() - 0.5) * 8,
                  y: sy - 5,
                  text: '-' + splashDmg,
                  color: proj.splashColor || '#ff8800',
                  life: 0.5,
                  vy: -30,
                  scale: 0.9
                });
                if (enemy.hp <= 0) killEnemy(enemy);
              }
            }
            // Splash ring effect
            splashRings.push({
              col: target.col,
              row: target.row,
              radius: proj.splashRadius,
              life: 0.25,
              color: proj.splashColor || '#ff8800'
            });
          }

          // Floating damage number
          const hx = (target.col + 0.5) * cellSize;
          const hy = (target.row + 0.5) * cellSize;
          const isBoost = proj.boosted;
          const isPierce = proj.pierce;
          spawnHitNumber({
            x: hx + (Math.random() - 0.5) * 10,
            y: hy - 5,
            text: '-' + Math.round(damageDealt),
            color: isBoost ? '#ffd700' : (proj.towerType === 'ICE_BOMB' ? '#a8ecff' : (isPierce ? '#ff4444' : '#ffffff')),
            life: 0.6,
            vy: -40,
            scale: isBoost ? 1.3 : 1.0
          });
          if (target.hp <= 0) {
            killEnemy(target);
          }
          despawnProjectile(proj);
        } else {
          const dist = Math.sqrt(distSq);
          const speed = (PROJ_SPEED * dt) / cellSize;
          proj.col += (dx / dist) * speed;
          proj.row += (dy / dist) * speed;
        }
      }
    }

    // === DEATH PARTICLES ===
    function updateDeathParticles(dt) {
      for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
        if (!deathParticleActive[i]) continue;
        deathParticleX[i] += deathParticleVX[i] * dt;
        deathParticleY[i] += deathParticleVY[i] * dt;
        deathParticleVY[i] += 80 * dt;
        deathParticleVX[i] *= 0.96;
        deathParticleVY[i] *= 0.96;
        deathParticleLife[i] -= dt;
        if (deathParticleLife[i] <= 0) despawnDeathParticle(i);
      }
    }

    function updateSplashRings(dt) {
      for (let i = splashRings.length - 1; i >= 0; i--) {
        splashRings[i].life -= dt;
        if (splashRings[i].life <= 0) {
          splashRings.splice(i, 1);
        }
      }
    }

    function drawDeathParticles() {
      for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
        if (!deathParticleActive[i]) continue;
        const alpha = deathParticleLife[i] / Math.max(deathParticleMaxLife[i], 0.0001);
        const size = deathParticleSize[i] * alpha;
        if (size <= 0) continue;
        ctx.globalAlpha = alpha;
        drawGlowSprite(ctx, deathParticleX[i], deathParticleY[i], Math.max(5, size * 2.8), deathParticleColor[i], 0.2);
        ctx.fillStyle = deathParticleColor[i];
        if (deathParticleShape[i] === PARTICLE_SHAPE_SQUARE) {
          ctx.fillRect(deathParticleX[i] - size / 2, deathParticleY[i] - size / 2, size, size);
        } else {
          ctx.beginPath();
          ctx.arc(deathParticleX[i], deathParticleY[i], size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

    function drawSplashRings() {
      for (const ring of splashRings) {
        const cx = (ring.col + 0.5) * cellSize;
        const cy = (ring.row + 0.5) * cellSize;
        const r = ring.radius * cellSize;
        const alpha = ring.life / 0.25;
        ctx.globalAlpha = alpha * 0.8;
        drawGlowSprite(ctx, cx, cy, r * 1.08, ring.color || '#ff8800', 0.18 * alpha);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = ring.color || '#ff8800';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    // === HIT NUMBERS ===
    function updateHitNumbers(dt) {
      for (let i = hitNumbers.length - 1; i >= 0; i--) {
        const h = hitNumbers[i];
        if (!h.active) continue;
        h.y += h.vy * dt;
        h.vy += 20 * dt; // slight acceleration downward
        h.life -= dt;
        if (h.life <= 0) {
          despawnHitNumber(h);
        }
      }
    }
    function drawHitNumbers() {
      for (const h of hitNumbers) {
        if (!h.active) continue;
        const alpha = Math.min(h.life * 2, 1);
        const size = Math.round(cellSize * 0.28 * h.scale);
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${size}px -apple-system, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#000';
        ctx.fillText(h.text, h.x + 1, h.y + 1);
        drawGlowSprite(ctx, h.x, h.y, size * 0.95, h.color, 0.14);
        ctx.fillStyle = h.color;
        ctx.fillText(h.text, h.x, h.y);
      }
      ctx.globalAlpha = 1;
    }
    function updateGoldPickups(dt) {
      for (let i = goldPickups.length - 1; i >= 0; i--) {
        const g = goldPickups[i];
        g.y += g.vy * dt;
        g.life -= dt;
        if (g.life <= 0) goldPickups.splice(i, 1);
      }
    }
    function drawGoldPickups() {
      for (const g of goldPickups) {
        const alpha = Math.min(g.life * 2, 1);
        const size = Math.round(cellSize * 0.35);
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${size}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        drawGlowSprite(ctx, g.x, g.y, size * 1.05, '#ffd700', 0.18);
        ctx.fillStyle = '#ffd700';
        ctx.fillText(g.text, g.x, g.y);
        ctx.globalAlpha = 1;
      }
    }
    // === WAVE SYSTEM ===
    function generateWave(n) {
      // Scale from wave 10 baseline, escalating difficulty
      const scale = 1 + (n - 10) * 0.2;  // 20% harder each endless wave
      const speedMult = 1 + (n - 10) * 0.03;  // 3% faster per wave

      // Base: wave 10 composition scaled up
      let soldiers = Math.floor(20 * scale);
      let tanks = Math.floor(10 * scale);
      let speedsters = Math.floor(10 * scale);
      let bosses = Math.floor(5 * scale);
      let scouts = n >= 15 ? Math.floor(10 * scale) : 0;

      // Every 5th endless wave gets a MEGA BOSS (15, 20, 25, ...)
      const isMegaWave = n % 5 === 0;

      // Build queue
      const queue = [];
      // MEGA BOSS spawns first as the opener
      if (isMegaWave) queue.push('MEGABOSS');
      for (let i = 0; i < scouts; i++) queue.push('SCOUT');
      for (let i = 0; i < soldiers; i++) queue.push('SOLDIER');
      for (let i = 0; i < tanks; i++) queue.push('TANK');
      for (let i = 0; i < speedsters; i++) queue.push('SPEEDSTER');
      for (let i = 0; i < bosses; i++) queue.push('BOSS');

      // Shuffle the queue so enemies don't clump by type (keep MEGA BOSS first)
      const megaFirst = queue.shift();
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
      if (isMegaWave) queue.unshift(megaFirst);

      return queue;
    }

    function buildWaveQueue() {
      waveEnemyQueue = [];
      if (currentWave <= BASE_WAVES) {
        const waveDef = WAVE_DEFINITIONS[currentWave - 1];
        for (const group of waveDef) {
          for (let i = 0; i < group.count; i++) {
            waveEnemyQueue.push(group.type);
          }
        }
      } else {
        waveEnemyQueue = generateWave(currentWave);
      }
    }

    function startWave() {
      if (!validatePath()) {
        pathInvalidFlash = 0.5;
        showTooltip('Path not connected!');
        return;
      }
      // Reset power-ups for this wave
      powerFreezeAvail = true;
      powerNukeAvail = true;
      powerBoostAvail = true;
      powerFreezeTimer = 0;
      powerBoostTimer = 0;
      // Storm: 15% chance each endless wave (11+)
      stormActive = currentWave > BASE_WAVES && Math.random() < 0.15;
      // Armored wave: (wave-10)% chance starting wave 11 (wave 11=1%, wave 20=10%, wave 110=~100%)
      armoredWave = currentWave > BASE_WAVES && Math.random() < (currentWave - 10) / 100;
      buildWaveQueue();
      spawnTimer = 0;
      previewTimer = WAVE_PREVIEW_DURATION;
      gameState = GameStates.WAVE_ACTIVE;
      selectedTower = null;
      towerRangeTimer = 0;
      rebuildStaticScene();
      updateUpgradeButton();
      setStartButton(false);
      updatePowerButtons();
    }

    function updateWave(dt) {
      if (gameState !== GameStates.WAVE_ACTIVE) return;

      // Wave preview — skip spawning for the first 2 seconds
      if (previewTimer > 0) {
        previewTimer -= dt;
        // Keep power-up timers ticking during preview
        if (powerFreezeTimer > 0) powerFreezeTimer -= dt;
        if (powerBoostTimer > 0) powerBoostTimer -= dt;
        if (powerFlashTimer > 0) powerFlashTimer -= dt;
        updatePowerButtons();
        return;
      }

      if (powerFreezeTimer <= 0) {
        const effectiveInterval = SPAWN_INTERVAL * currentDifficulty.spawnIntervalMult / (stormActive ? 1.2 : 1);
        spawnTimer += dt;
        if (spawnTimer >= effectiveInterval && waveEnemyQueue.length > 0) {
          spawnTimer = 0;
          spawnEnemy(waveEnemyQueue.shift());
        }
      }

      if (waveEnemyQueue.length === 0 && enemies.activeCount === 0) {
        currentWave++;
        stormActive = false;  // reset storm at wave end
        armoredWave = false;  // reset armored wave at wave end
        if (currentWave > BASE_WAVES) {
          // Endless mode — keep going, path persists
          waveSpeedMult = 1 + (currentWave - 10) * 0.03;  // update speed scaling
          currency += WAVE_BONUS;
          gameState = GameStates.PLANNING;
          invalidateStaticScene();
          setStartButton(pathTiles.length > 0);
          updateHUD();
          updateBuyHpButton();
          updatePowerButtons();
          playWaveCompleteSound();
        } else {
          resetPathBudget();
          currency += WAVE_BONUS;
          gameState = GameStates.PLANNING;
          invalidateStaticScene();
          setStartButton(pathTiles.length > 0);
          updateHUD();
          updateBuyHpButton();
          updatePowerButtons();
          playWaveCompleteSound();
        }
      }
    }

    // === AUDIO ===
    let audioCtx = null;
    let muted = localStorage.getItem('vibe-muted') === '1';

    function vibrate(ms = 50) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }
    function playTone(freq, duration, type = 'square', vol = 0.1) {
      if (muted) return;
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = type;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start();
        osc.stop(ctx.currentTime + duration);
      } catch (e) {}
    }
    function playPlaceSound() { playTone(440, 0.08, 'square', 0.08); }
    function playRemoveSound() { playTone(330, 0.08, 'square', 0.08); }
    function playShootSound() { playTone(880, 0.05, 'sine', 0.05); }
    function playSpawnSound() { playTone(220, 0.1, 'triangle', 0.08); }
    function playDeathSound() { playTone(150, 0.15, 'sawtooth', 0.1); }
    function playBaseDamageSound() { playTone(80, 0.3, 'sawtooth', 0.15); }
    function playWaveCompleteSound() {
      playTone(440, 0.1, 'sine', 0.1);
      setTimeout(() => playTone(554, 0.1, 'sine', 0.1), 100);
      setTimeout(() => playTone(659, 0.2, 'sine', 0.1), 200);
    }

    // === FLASH EFFECTS ===
    let flashTiles = [];
    function flashTile(col, row, color, duration) {
      flashTiles.push({ col, row, color, duration, elapsed: 0 });

    // === INPUT ===
    // === INPUT (Pointer Events — unified touch/mouse, avoids iOS Safari dual-fire bug) ===
    let activeTouchId = null; // Track unique pointer to avoid iOS Safari mouse-emulation bugs

    function screenToCell(screenX, screenY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (screenX - rect.left) * scaleX;
      const y = (screenY - rect.top) * scaleY;
      const col = Math.floor(x / cellSize);
      const row = Math.floor(y / cellSize);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return { col, row };
    }

    function handlePointerDown(e) {
      if (gameState !== GameStates.PLANNING && gameState !== GameStates.WAVE_ACTIVE) {
        return;
      }
      e.preventDefault();

      // Reject if this is a mouse event emulated after touch (iOS Safari fix)
      if (e.pointerType === 'mouse' && activeTouchId === null) {
        // Could be real mouse or emulated — accept it
      }
      if (e.pointerType === 'touch') {
        activeTouchId = e.pointerId;
      }

      const cell = screenToCell(e.clientX, e.clientY);

      if (!cell) { return; }

      pointerDown = true;
      pointerStart = cell;
      pointerLastCell = cell;

      longPressTimer = setTimeout(() => {
        if (pointerDown && pointerStart && pointerStart.col === cell.col && pointerStart.row === cell.row) {
          if (isPathTile(cell.col, cell.row)) {
            removePathTile(cell.col, cell.row);
          } else if (getCellTypeAt(cell.col, cell.row) === CELL_TYPES.TOWER) {
            const tower = getTowerAt(cell.col, cell.row);
            if (tower) {
              const modes = ['nearest', 'first', 'last', 'weakest', 'strongest'];
              const idx = modes.indexOf(tower.targeting || 'nearest');
              tower.targeting = modes[(idx + 1) % modes.length];
              showTooltip('\u2699 ' + tower.targeting.toUpperCase());
            }
            selectedTower = tower;
            towerRangeTimer = 999;
            if (tower) tower.upgradeFlash = 1.0;
            updateUpgradeButton();
          }
        }
        pointerDown = false;
        pointerStart = null;
      }, LONG_PRESS_DELAY);
    }

    function handlePointerMove(e) {
      if (!pointerDown || (gameState !== GameStates.PLANNING && gameState !== GameStates.WAVE_ACTIVE)) {
        return;
      }
      // Only handle the active pointer id (ignores other fingers)
      if (e.pointerType === 'touch' && e.pointerId !== activeTouchId) {
        return;
      }
      e.preventDefault();

      const cell = screenToCell(e.clientX, e.clientY);
      if (!cell) return;

      const lastCell = pointerLastCell;
      // Place tile when entering a NEW cell (handles both initial cell and subsequent moves)
      if (!lastCell || cell.col !== lastCell.col || cell.row !== lastCell.row) {
        if (isCellEmpty(cell.col, cell.row) && !isPathTile(cell.col, cell.row)) {
          placePathTile(cell.col, cell.row, true); // duringWave = true for drag
        }
        pointerLastCell = cell;
      }
    }

    function handlePointerUp(e) {
      // Allow pointer up during WAVE_ACTIVE for rerouting
      const inWave = gameState === GameStates.WAVE_ACTIVE;
      e.preventDefault();
      clearTimeout(longPressTimer);

      const cell = pointerStart;
      if (!cell) { pointerDown = false; pointerStart = null; pointerLastCell = null; activeTouchId = null; return; }

      const moved = pointerLastCell && (
        Math.abs(pointerLastCell.col - pointerStart.col) > 1 ||
        Math.abs(pointerLastCell.row - pointerStart.row) > 1
      );

      if (!moved) {
        const now = Date.now();

        if (isPathTile(cell.col, cell.row)) {
          removePathTile(cell.col, cell.row, inWave);
        } else if (getCellTypeAt(cell.col, cell.row) === CELL_TYPES.EMPTY) {
          placePathTile(cell.col, cell.row, inWave);
        } else if (getCellTypeAt(cell.col, cell.row) === CELL_TYPES.TOWER) {
          const tower = getTowerAt(cell.col, cell.row);
          // Toggle: tap same tower again to deselect
          if (selectedTower === tower) {
            selectedTower = null;
            towerRangeTimer = 0;
            updateUpgradeButton();
          } else {
            selectedTower = tower;
            towerRangeTimer = 999;
            tower.upgradeFlash = 1.0;
            updateUpgradeButton();
          }
        }

      }

      pointerDown = false;
      pointerStart = null;
      activeTouchId = null;
    }

    function handlePointerCancel(e) {

      clearTimeout(longPressTimer);
      pointerDown = false;
      pointerStart = null;
      pointerLastCell = null;
      activeTouchId = null;
    }

    function isCellEmpty(col, row) {
      return getCellTypeAt(col, row) === CELL_TYPES.EMPTY;
    }


    function setupInput() {
      // Use Pointer Events API — unified touch/mouse handling, avoids iOS Safari
      // dual-fire bug where touchend is followed by spurious mousedown/mouseup
      canvas.addEventListener('pointerdown', handlePointerDown, { passive: false });
      canvas.addEventListener('pointermove', handlePointerMove, { passive: false });
      canvas.addEventListener('pointerup', handlePointerUp, { passive: false });
      canvas.addEventListener('pointercancel', handlePointerCancel, { passive: false });
      // Prevent mouse emulated events on iOS after touch
      canvas.addEventListener('mousedown', e => e.preventDefault(), { passive: false });
      // Prevent context menu and text selection
      canvas.addEventListener('contextmenu', e => e.preventDefault());
      // Canvas click: only handles upgrade button area — tower taps handled by handlePointerUp
      canvas.addEventListener('click', (e) => {
        // No-op: all canvas interactions (tower tap, path) handled by handlePointerUp/handlePointerMove
      });

      // Fallback: direct touch events on canvas-wrapper (iOS Safari sometimes doesn't fire pointer events on canvas)
      const canvasWrapper = document.getElementById('canvas-wrapper');
      if (canvasWrapper) {
        canvasWrapper.addEventListener('touchstart', (e) => {
          // Forward to canvas
          const touch = e.touches[0];
          const rect = canvas.getBoundingClientRect();
          const syntheticEvent = {
            clientX: touch.clientX,
            clientY: touch.clientY,
            pointerId: touch.identifier,
            pointerType: 'touch',
            touches: e.touches,
            preventDefault: () => { e.preventDefault(); }
          };
          handlePointerDown(syntheticEvent);
        }, { passive: false });

        canvasWrapper.addEventListener('touchmove', (e) => {
          const touch = e.touches[0];
          const syntheticEvent = {
            clientX: touch.clientX,
            clientY: touch.clientY,
            pointerId: touch.identifier,
            pointerType: 'touch',
            pointerId: activeTouchId,
            touches: e.touches,
            preventDefault: () => { e.preventDefault(); }
          };
          handlePointerMove(syntheticEvent);
        }, { passive: false });

        canvasWrapper.addEventListener('touchend', (e) => {
          const touch = e.changedTouches[0];
          const syntheticEvent = {
            pointerId: touch.identifier,
            pointerType: 'touch',
            changedTouches: e.changedTouches,
            preventDefault: () => { e.preventDefault(); }
          };
          handlePointerUp(syntheticEvent);
        }, { passive: false });

        canvasWrapper.addEventListener('touchcancel', (e) => {
          handlePointerCancel({});
        }, { passive: false });
      }
    }
