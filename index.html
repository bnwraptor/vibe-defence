        document.getElementById('overlay-restart-btn').addEventListener('click', restartGame);
      }
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    function startGame() {
      restartGame();
      gameState = GameStates.PLANNING;
      setStartButton(pathTiles.length > 0);
      updateBuyHpButton();
      updatePowerButtons();
    }

    function clearPath() {
      // Remove all path tiles and restore budget
      for (const tile of pathTiles) {
        grid[tile.row][tile.col] = CELL_TYPES.EMPTY;
        tileBudget++;
      }
      pathTiles = [];
      updateHUD();
      if (gameState === GameStates.PLANNING) setStartButton(false);
      playRemoveSound();
      invalidateStaticScene();

    }

    function resetPathBudget() {
      // Tile budget progression (after each wave completes):
      // Wave 1 start: 20 | Wave 1 complete: +7 → 27 | Wave 2: +7 → 34
      // Wave 3: 41 | Wave 4: 48 | Wave 5: 55 | Wave 6: 62 | Wave 7: 69 | Wave 8: 76
      // Wave 9 complete: +4 → 80 | Wave 10: +7 → 87 (cap 80 still applies)
      // Endless 11+: +2/wave from 80 → 110 cap at wave 27
      if (tileBudget >= MAX_TILE_BUDGET) { updateHUD(); return; }
      let newTotal = totalBudget;
      if (currentWave > BASE_WAVES) {
        // Endless: +2 per wave from base of 80
        newTotal = Math.min(80 + (currentWave - BASE_WAVES) * TILE_ACCUM_ENDLESS, MAX_TILE_BUDGET);
      } else if (currentWave === BASE_WAVES) {
        // Wave 10 complete: +7 → 80 (base waves cap at 80 until endless)
        newTotal = Math.min(totalBudget + TILE_ACCUM_WAVES, 80);
      } else if (currentWave === BASE_WAVES - 1) {
        // Wave 9 complete: +4 → 80
        newTotal = Math.min(totalBudget + TILE_WAVE9_BONUS, MAX_TILE_BUDGET);
      } else {
        // Waves 1-8: +7 per completed wave
        newTotal = Math.min(totalBudget + TILE_ACCUM_WAVES, MAX_TILE_BUDGET);
      }
      // tileBudget gets the net gain so player's remaining tiles also grow
      tileBudget += (newTotal - totalBudget);
      totalBudget = newTotal;
      updateHUD();
    }

    function buyHP() {
      if (gameState !== GameStates.PLANNING) return;
      if (currency < HP_COST) {
        showTooltip('Not enough currency!');
        return;
      }
      if (baseHP >= BASE_HP) {
        showTooltip('HP already full!');
        return;
      }
      currency -= HP_COST;
      baseHP = Math.min(baseHP + HP_RESTORE, BASE_HP);
      updateHUD();
      updateBuyHpButton();
      playPlaceSound();
      vibrate();
    }

    function updateBuyHpButton() {
      const btn = document.getElementById('buy-hp-btn');
      if (!btn) return;
      const canAfford = currency >= HP_COST;
      const hpNotFull = baseHP < BASE_HP;
      const inPlanning = gameState === GameStates.PLANNING;
      btn.disabled = !canAfford || !hpNotFull || !inPlanning;
    }

    // === POWER-UPS ===
    let powerFlashColor = '#ffffff';
    function activateFreeze() {
      if (gameState !== GameStates.WAVE_ACTIVE) return;
      if (!powerFreezeAvail) return;
      if (currency < POWER_FREEZE_COST) { showTooltip('Not enough currency!'); return; }
      currency -= POWER_FREEZE_COST;
      powerFreezeAvail = false;
      powerFreezeTimer = POWER_FREEZE_DUR;
      powerFlashText = 'FROZEN!';
      powerFlashTimer = 1.0;
      powerFlashColor = '#88aaff';
      updateHUD();
      updatePowerButtons();
      playTone(200, 0.3, 'sine', 0.15);
      vibrate();
    }

    function activateNuke() {
      if (gameState !== GameStates.WAVE_ACTIVE) return;
      if (!powerNukeAvail) return;
      if (currency < POWER_NUKE_COST) { showTooltip('Not enough currency!'); return; }
      currency -= POWER_NUKE_COST;
      powerNukeAvail = false;
      // Damage all enemies on screen
      for (const enemy of enemies) {
        if (!enemy.active || enemy.dying) continue;
        enemy.hp -= POWER_NUKE_DAMAGE;
        if (enemy.hp <= 0) killEnemy(enemy);
      }
      powerFlashText = '💥 NUKE!';
      powerFlashTimer = 1.0;
      powerFlashColor = '#ff8800';
      screenShake.duration = 0.3;
      updateHUD();
      updatePowerButtons();
      playTone(100, 0.5, 'sawtooth', 0.2);
      vibrate();
    }

    function activateBoost() {
      if (gameState !== GameStates.WAVE_ACTIVE) return;
      if (!powerBoostAvail) return;
      if (currency < POWER_BOOST_COST) { showTooltip('Not enough currency!'); return; }
      currency -= POWER_BOOST_COST;
      powerBoostAvail = false;
      powerBoostTimer = POWER_BOOST_DUR;
      powerFlashText = '⚡ BOOST!';
      powerFlashTimer = 1.0;
      powerFlashColor = '#ffd700';
      updateHUD();
      updatePowerButtons();
      playTone(880, 0.2, 'sine', 0.1);
      vibrate();
    }

    function updatePowerButtons() {
      const inWave = gameState === GameStates.WAVE_ACTIVE;
      const freezeBtn = document.getElementById('freeze-btn');
      const nukeBtn = document.getElementById('nuke-btn');
      const boostBtn = document.getElementById('boost-btn');
      if (freezeBtn) {
        freezeBtn.classList.toggle('active', powerFreezeAvail && currency >= POWER_FREEZE_COST && inWave);
        freezeBtn.disabled = !powerFreezeAvail || currency < POWER_FREEZE_COST || !inWave;
        const fc = document.getElementById('freeze-cost');
        if (fc) fc.style.opacity = (powerFreezeAvail && currency >= POWER_FREEZE_COST && inWave) ? '1' : '0.3';
      }
      if (nukeBtn) {
        nukeBtn.classList.toggle('active', powerNukeAvail && currency >= POWER_NUKE_COST && inWave);
        nukeBtn.disabled = !powerNukeAvail || currency < POWER_NUKE_COST || !inWave;
        const nc = document.getElementById('nuke-cost');
        if (nc) nc.style.opacity = (powerNukeAvail && currency >= POWER_NUKE_COST && inWave) ? '1' : '0.3';
      }
      if (boostBtn) {
        boostBtn.classList.toggle('active', powerBoostAvail && currency >= POWER_BOOST_COST && inWave);
        boostBtn.disabled = !powerBoostAvail || currency < POWER_BOOST_COST || !inWave;
        const bc = document.getElementById('boost-cost');
        if (bc) bc.style.opacity = (powerBoostAvail && currency >= POWER_BOOST_COST && inWave) ? '1' : '0.3';
      }
    }

    function restartGame() {
      clearPath();
      tileBudget = STARTING_TILE_BUDGET;
      totalBudget = STARTING_TILE_BUDGET;
      currency = currentDifficulty.startCurrency;
      baseHP = currentDifficulty.startHp;
      currentWave = 1;
      waveSpeedMult = 1.0;
      resetPool(enemies, resetEnemyObject);
      resetPool(projectiles, resetProjectileObject);
      resetDeathParticles();
      resetPool(hitNumbers, resetHitNumberObject);
      splashRings = [];
      towerSynergies = [];
      waveEnemyQueue = [];
      powerFreezeAvail = true;
      powerNukeAvail = true;
      powerBoostAvail = true;
      powerFreezeTimer = 0;
      powerBoostTimer = 0;
      initGrid();
      initTowers();
      invalidateStaticScene();
      selectedTower = null;
      updateUpgradeButton();
      hideOverlay();
      updateHUD();
      gameState = GameStates.PLANNING;
      setStartButton(false);
      updateBuyHpButton();
      updatePowerButtons();
    }

    function resumeGame() {
      hideOverlay();
      gameState = GameStates.WAVE_ACTIVE;
    }

    // === RENDERING ===
    function resizeCanvas() {
      const wrapper = document.getElementById('canvas-wrapper');
      const maxW = wrapper.clientWidth;
      const maxH = wrapper.clientHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2.0);
      // Compute cellSize in physical pixels so canvas internals match DPR scaling
      cellSize = Math.floor(Math.min((maxW * dpr) / COLS, (maxH * dpr) / ROWS));
      // Canvas renders at full physical pixel resolution
      canvas.width = COLS * cellSize;
      canvas.height = ROWS * cellSize;
      lightCanvas.width = canvas.width;
      lightCanvas.height = canvas.height;
      staticSceneCanvas.width = canvas.width;
      staticSceneCanvas.height = canvas.height;
      // CSS size is smaller (CSS pixels = physical / dpr)
      canvas.style.width = `${COLS * cellSize / dpr}px`;
      canvas.style.height = `${ROWS * cellSize / dpr}px`;
      staticSceneReady = false;
      bossWarningGradient = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, canvas.width * 0.3,
        canvas.width / 2, canvas.height / 2, canvas.width * 0.8
      );
      bossWarningGradient.addColorStop(0, 'rgba(0,0,0,0)');
      bossWarningGradient.addColorStop(1, '#b40000');
      if (gameState === GameStates.WAVE_ACTIVE && validatePath()) {
        rebuildStaticScene();
      }
    }

    function invalidateStaticScene() {
      staticSceneReady = false;
    }

    function getGlowSprite(color, radius) {
      const cachedRadius = Math.max(2, Math.round(radius));
      const key = `${color}:${cachedRadius}`;
      if (glowSpriteCache.has(key)) return glowSpriteCache.get(key);

      const sprite = document.createElement('canvas');
      const size = cachedRadius * 2;
      sprite.width = size;
      sprite.height = size;
      const spriteCtx = sprite.getContext('2d');
      const gradient = spriteCtx.createRadialGradient(cachedRadius, cachedRadius, 0, cachedRadius, cachedRadius, cachedRadius);
      gradient.addColorStop(0, color);
      gradient.addColorStop(0.35, color);
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      spriteCtx.fillStyle = gradient;
      spriteCtx.beginPath();
      spriteCtx.arc(cachedRadius, cachedRadius, cachedRadius, 0, Math.PI * 2);
      spriteCtx.fill();
      glowSpriteCache.set(key, sprite);
      return sprite;
    }

    function drawGlowSprite(targetCtx, x, y, radius, color, alpha) {
      const sprite = getGlowSprite(color, radius);
      const prevComposite = targetCtx.globalCompositeOperation;
      const prevAlpha = targetCtx.globalAlpha;
      targetCtx.globalCompositeOperation = 'lighter';
      targetCtx.globalAlpha = prevAlpha * (alpha === undefined ? 1 : alpha);
      targetCtx.drawImage(sprite, x - sprite.width / 2, y - sprite.height / 2);
      targetCtx.globalAlpha = prevAlpha;
      targetCtx.globalCompositeOperation = prevComposite;
    }

    function drawGlowSamples(targetCtx, samples, color, radius, alpha, spacing) {
      if (!samples || samples.length === 0) return;
      const step = spacing || Math.max(4, radius * 0.65);
      let lastStamp = -Infinity;
      for (const sample of samples) {
        const distance = sample.distance || 0;
        if (distance - lastStamp < step) continue;
        lastStamp = distance;
        drawGlowSprite(targetCtx, (sample.x + 0.5) * cellSize, (sample.y + 0.5) * cellSize, radius, color, alpha);
      }
    }

    function drawGlowLine(targetCtx, x1, y1, x2, y2, color, radius, alpha, stamps) {
      const count = stamps || Math.max(3, Math.ceil(Math.hypot(x2 - x1, y2 - y1) / Math.max(8, radius * 0.75)));
      for (let i = 0; i <= count; i++) {
        const t = count === 0 ? 0 : i / count;
        drawGlowSprite(targetCtx, x1 + (x2 - x1) * t, y1 + (y2 - y1) * t, radius, color, alpha);
      }
    }

    function buildLightMap() {
      lightCtx.save();
      lightCtx.setTransform(1, 0, 0, 1, 0, 0);
      lightCtx.clearRect(0, 0, lightCanvas.width, lightCanvas.height);
      lightCtx.fillStyle = '#000000';
      lightCtx.fillRect(0, 0, lightCanvas.width, lightCanvas.height);
      lightCtx.globalCompositeOperation = 'lighter';

      for (const tower of towers) {
        const cx = tower.col * cellSize + cellSize / 2;
        const cy = tower.row * cellSize + cellSize / 2;
        const radius = cellSize * (tower.type === 'SNIPER' ? 2.8 : tower.type === 'CANNON' ? 2.4 : tower.type === 'FROST' ? 2.6 : 2.2);
        const alpha = powerBoostTimer > 0 ? 0.92 : 0.72;
        drawGlowSprite(lightCtx, cx, cy, radius, '#ffffff', alpha);
      }

      for (const proj of projectiles) {
        if (!proj.active) continue;
        if (proj.phase === 'merge') {
          const progress = 1 - Math.max(0, proj.mergeTimer) / proj.mergeDuration;
          const eased = 1 - Math.pow(1 - progress, 2);
          const orbAX = (proj.sourceA.col + (proj.mergePoint.col - proj.sourceA.col) * eased) * cellSize;
          const orbAY = (proj.sourceA.row + (proj.mergePoint.row - proj.sourceA.row) * eased) * cellSize;
          const orbBX = (proj.sourceB.col + (proj.mergePoint.col - proj.sourceB.col) * eased) * cellSize;
          const orbBY = (proj.sourceB.row + (proj.mergePoint.row - proj.sourceB.row) * eased) * cellSize;
          drawGlowSprite(lightCtx, orbAX, orbAY, cellSize * 0.7, '#ffffff', 0.8);
          drawGlowSprite(lightCtx, orbBX, orbBY, cellSize * 0.7, '#ffffff', 0.8);
          drawGlowSprite(lightCtx, proj.mergePoint.col * cellSize, proj.mergePoint.row * cellSize, cellSize * (0.8 + eased * 0.7), '#ffffff', 0.95);
          continue;
        }

        drawGlowSprite(lightCtx, proj.col * cellSize, proj.row * cellSize, proj.towerType === 'ICE_BOMB' ? cellSize * 1.1 : cellSize * 0.75, '#ffffff', proj.towerType === 'ICE_BOMB' ? 0.95 : 0.78);
      }

      for (const ring of splashRings) {
        const cx = (ring.col + 0.5) * cellSize;
        const cy = (ring.row + 0.5) * cellSize;
        const life = Math.max(0, ring.life / 0.25);
        drawGlowSprite(lightCtx, cx, cy, Math.max(cellSize * 1.5, ring.radius * cellSize * 1.6), '#ffffff', 0.8 * life);
      }

      for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
        if (!deathParticleActive[i]) continue;
        drawGlowSprite(lightCtx, deathParticleX[i], deathParticleY[i], Math.max(6, deathParticleSize[i] * 4), '#ffffff', 0.18);
      }

      const markerSize = cellSize * 0.7;
      const spawnCx = (SPAWN_POS.col + 0.5) * cellSize;
      const spawnCy = (SPAWN_POS.row + 0.5) * cellSize;
      const baseCx = (BASE_POS.col + 0.5) * cellSize;
      const baseCy = (BASE_POS.row + 0.5) * cellSize;
      drawGlowSprite(lightCtx, spawnCx, spawnCy, markerSize * 1.15, '#ffffff', 0.55);
      drawGlowSprite(lightCtx, baseCx, baseCy, markerSize * 1.15, '#ffffff', 0.55);

      lightCtx.globalCompositeOperation = 'source-over';
      lightCtx.restore();
    }

    function render() {
      ctx.save();

      if (screenShake.duration > 0) {
        screenShake.x = (Math.random() - 0.5) * 4;
        screenShake.y = (Math.random() - 0.5) * 4;
        ctx.translate(screenShake.x, screenShake.y);
      }

      if (gameState === GameStates.WAVE_ACTIVE && staticSceneReady) {
        ctx.drawImage(staticSceneCanvas, 0, 0);
        drawSynergyTethers();
        drawTowerDynamics();
      } else {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        drawPath();
        drawPathFlow();
        drawSynergyTethers();
        drawTowers();
        drawSpawnAndBase();
      }

      drawEnemies();
      drawProjectiles();
      drawDeathParticles();
      drawSplashRings();
      drawHitNumbers();
      drawGoldPickups();

      if (flashTiles.length > 0) {
        for (let i = flashTiles.length - 1; i >= 0; i--) {
          const ft = flashTiles[i];
          ft.elapsed += 1 / 60;
          if (ft.elapsed >= ft.duration / 1000) {
            flashTiles.splice(i, 1);
          } else {
            ctx.fillStyle = ft.color;
            ctx.fillRect(ft.col * cellSize + 1, ft.row * cellSize + 1, cellSize - 2, cellSize - 2);
          }
        }
      }

      // Wave preview overlay
      if (gameState === GameStates.WAVE_ACTIVE && previewTimer > 0) {
        drawWavePreview();
      }

      // Power-up visual effects
      if (bossWarningFlash > 0) {
        ctx.globalAlpha = bossWarningFlash * 0.6;
        ctx.fillStyle = bossWarningGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;

        // Warning text
        if (bossWarningTimer > 0.5) {
          ctx.save();
          // Scale font to fit canvas width
          const maxWidth = canvas.width * 0.85;
          let fontSize = canvas.width * 0.07;
          ctx.font = `bold ${fontSize}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = megaBossWarning ? '#ff0044' : '#ff0000';
          drawGlowSprite(ctx, canvas.width/2, canvas.height/2, canvas.width * 0.15, megaBossWarning ? '#ff0044' : '#ff0000', 0.18);
          // Scale down until text fits
          const warningText = megaBossWarning ? '⚠ MEGA BOSS INCOMING ⚠' : '⚠ BOSS INCOMING ⚠';
          while (ctx.measureText(warningText).width > maxWidth && fontSize > 16) {
            fontSize -= 2;
            ctx.font = `bold ${fontSize}px sans-serif`;
          }
          ctx.fillText(warningText, canvas.width/2, canvas.height/2);
          ctx.restore();
        }
      }

      if (powerFreezeTimer > 0) {
        ctx.fillStyle = 'rgba(68,136,255,0.12)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      if (powerBoostTimer > 0) {
        // Pulsing glow on towers
        const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
        ctx.globalAlpha = pulse * 0.2;
        ctx.fillStyle = '#ffd700';
        for (const tower of towers) {
          const cx = tower.col * cellSize + cellSize / 2;
          const cy = tower.row * cellSize + cellSize / 2;
          ctx.beginPath();
          ctx.arc(cx, cy, cellSize * 0.8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      if (powerFlashTimer > 0) {
        const el = document.getElementById('power-flash');
        if (el) {
          el.textContent = powerFlashText;
          el.style.color = powerFlashColor;
          el.style.opacity = Math.min(powerFlashTimer * 2, 1).toString();
        }
      } else {
        const el = document.getElementById('power-flash');
        if (el) el.style.opacity = '0';
      }

      buildLightMap();
      ctx.globalCompositeOperation = 'multiply';
      ctx.drawImage(lightCanvas, 0, 0);
      ctx.globalCompositeOperation = 'source-over';

      ctx.restore();
    }

    function drawGrid(targetCtx = ctx) {
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const terrain = getTerrainAt(col, row);
          const x = col * cellSize;
          const y = row * cellSize;

          if (terrain === TERRAIN_TYPES.MUD) {
            targetCtx.fillStyle = '#3d2618';
            targetCtx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
            targetCtx.fillStyle = 'rgba(94,62,40,0.45)';
            targetCtx.beginPath();
            targetCtx.ellipse(x + cellSize * 0.4, y + cellSize * 0.58, cellSize * 0.2, cellSize * 0.12, -0.2, 0, Math.PI * 2);
            targetCtx.fill();
            targetCtx.beginPath();
            targetCtx.ellipse(x + cellSize * 0.72, y + cellSize * 0.38, cellSize * 0.14, cellSize * 0.08, 0.4, 0, Math.PI * 2);
            targetCtx.fill();
          } else if (terrain === TERRAIN_TYPES.ICE) {
            targetCtx.fillStyle = '#8ecff5';
            targetCtx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
            targetCtx.strokeStyle = 'rgba(235,248,255,0.55)';
            targetCtx.lineWidth = 1.5;
            targetCtx.beginPath();
            targetCtx.moveTo(x + cellSize * 0.18, y + cellSize * 0.8);
            targetCtx.lineTo(x + cellSize * 0.8, y + cellSize * 0.2);
            targetCtx.moveTo(x + cellSize * 0.3, y + cellSize * 0.22);
            targetCtx.lineTo(x + cellSize * 0.76, y + cellSize * 0.48);
            targetCtx.stroke();
          } else if (terrain === TERRAIN_TYPES.HIGH_GROUND) {
            targetCtx.fillStyle = '#665946';
            targetCtx.fillRect(x + 2, y + 4, cellSize - 4, cellSize - 6);
            targetCtx.fillStyle = '#8b7d66';
            targetCtx.fillRect(x + 3, y + 2, cellSize - 6, cellSize - 8);
            targetCtx.strokeStyle = 'rgba(255,234,196,0.35)';
            targetCtx.lineWidth = 1.5;
            targetCtx.strokeRect(x + 4, y + 3, cellSize - 8, cellSize - 10);
          }
        }
      }

      targetCtx.strokeStyle = '#1a1a2e';
      targetCtx.lineWidth = 1;
      for (let row = 0; row <= ROWS; row++) {
        targetCtx.beginPath();
        targetCtx.moveTo(0, row * cellSize);
        targetCtx.lineTo(targetCtx.canvas.width, row * cellSize);
        targetCtx.stroke();
      }
      for (let col = 0; col <= COLS; col++) {
        targetCtx.beginPath();
        targetCtx.moveTo(col * cellSize, 0);
        targetCtx.lineTo(col * cellSize, targetCtx.canvas.height);
        targetCtx.stroke();
      }
    }

    function drawPath(targetCtx = ctx) {
      const pathData = getPathSplineData({ includeBase: validatePath(), allowDirect: false, resolution: 14 });
      if (pathData.segments.length === 0) return;

      let glowColor = '#4a4a6a';
      let coreColor = '#a7b3ff';
      if (pathInvalidFlash > 0 && !validatePath()) {
        glowColor = '#ff2222';
        coreColor = '#ff8888';
      } else if (validatePath() && gameState === GameStates.WAVE_ACTIVE) {
        glowColor = '#4a4a6a';
        coreColor = '#4ade80';
      }

      targetCtx.beginPath();
      targetCtx.moveTo((pathData.segments[0].start.x + 0.5) * cellSize, (pathData.segments[0].start.y + 0.5) * cellSize);
      for (const segment of pathData.segments) {
        targetCtx.bezierCurveTo(
          (segment.cp1.x + 0.5) * cellSize,
          (segment.cp1.y + 0.5) * cellSize,
          (segment.cp2.x + 0.5) * cellSize,
          (segment.cp2.y + 0.5) * cellSize,
          (segment.end.x + 0.5) * cellSize,
          (segment.end.y + 0.5) * cellSize
        );
      }

      drawGlowSamples(targetCtx, pathData.samples, '#4a4a6a', cellSize * 0.28, 0.35, cellSize * 0.24);
      targetCtx.strokeStyle = glowColor;
      targetCtx.lineWidth = cellSize * 0.4;
      targetCtx.lineJoin = 'round';
      targetCtx.lineCap = 'round';
      targetCtx.stroke();

      targetCtx.strokeStyle = coreColor;
      targetCtx.lineWidth = cellSize * 0.14;
      targetCtx.stroke();

      for (const anchor of pathData.anchors) {
        targetCtx.beginPath();
        targetCtx.arc((anchor.x + 0.5) * cellSize, (anchor.y + 0.5) * cellSize, cellSize * 0.06, 0, Math.PI * 2);
        targetCtx.fillStyle = coreColor;
        targetCtx.globalAlpha = 0.45;
        targetCtx.fill();
      }
      targetCtx.globalAlpha = 1;
    }

    // Static path flow: dashed line + arrows, no animation
    function drawPathFlow() {
      if (gameState !== GameStates.PLANNING) return;
      if (!validatePath()) return;
      const pathData = getPathSplineData({ includeBase: true, allowDirect: false, resolution: 14 });
      if (pathData.samples.length === 0 || pathData.totalLength <= 0) return;

      const now = Date.now();
      const cycle = 5000;
      const t = (now % cycle) / cycle;
      const dot = getPointOnSpline(pathData, pathData.totalLength * t);
      const pulse = Math.sin(t * Math.PI * 2) * 0.3 + 0.7;

      ctx.save();
      drawGlowSprite(ctx, (dot.x + 0.5) * cellSize, (dot.y + 0.5) * cellSize, cellSize * 0.3 * pulse, '#4ade80', 0.45);
      ctx.beginPath();
      ctx.arc((dot.x + 0.5) * cellSize, (dot.y + 0.5) * cellSize, cellSize * 0.12 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = '#4ade80';
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = 'rgba(74,222,128,0.12)';
      ctx.lineWidth = cellSize * 0.06;
      ctx.setLineDash([cellSize * 0.2, cellSize * 0.2]);
      ctx.beginPath();
      ctx.moveTo((pathData.samples[0].x + 0.5) * cellSize, (pathData.samples[0].y + 0.5) * cellSize);
      for (let i = 1; i < pathData.samples.length; i++) {
        ctx.lineTo((pathData.samples[i].x + 0.5) * cellSize, (pathData.samples[i].y + 0.5) * cellSize);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // Draws a small tower preview on a named canvas element (for HOW TO PLAY screen)
    function drawTowerPreview(canvasId, type, color) {
      const c = document.getElementById(canvasId);
      if (!c) return;
      const ctx = c.getContext('2d');
      const w = c.width;
      const h = c.height;
      const cx = w / 2;
      const cy = h / 2;
      const baseSize = Math.min(w, h) * 0.75;
      ctx.clearRect(0, 0, w, h);

      ctx.save();
      drawGlowSprite(ctx, cx, cy, baseSize * 0.46, color, 0.35);

      if (type === 'TURRET') {
        ctx.fillStyle = '#1a2a3a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.1, cy - baseSize * 0.1, baseSize * 0.65, baseSize * 0.2);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = '#0a1520';
        ctx.fill();
      } else if (type === 'CANNON') {
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.strokeRect(cx - baseSize / 2 + 2, cy - baseSize / 2 + 2, baseSize - 4, baseSize - 4);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.05, cy - baseSize * 0.18, baseSize * 0.5, baseSize * 0.36);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = '#1a0a00';
        ctx.fill();
      } else if (type === 'SNIPER') {
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize, baseSize);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize / 2, cy - baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx + baseSize / 2 - baseSize * 0.15, cy - baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx - baseSize / 2, cy + baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        ctx.fillRect(cx + baseSize / 2 - baseSize * 0.15, cy + baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        ctx.fillStyle = color;
        ctx.fillRect(cx - baseSize * 0.05, cy - baseSize * 0.07, baseSize * 0.9, baseSize * 0.14);
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy - baseSize * 0.28, baseSize * 0.1, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, baseSize * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = '#200a0a';
        ctx.fill();
      } else if (type === 'FROST') {
        ctx.translate(cx, cy);
        ctx.rotate(Math.PI / 6);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.48;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0a1a3a';
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.28;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * baseSize * 0.45, Math.sin(a) * baseSize * 0.45);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(0, 0, baseSize * 0.1, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }
      ctx.restore();
    }

    function drawTowerLevelIndicator(targetCtx, tower, baseSize) {
      const lvl = tower.level || 1;
      if (lvl < 2) return;
      const labelY = -baseSize / 2 - 6;
      targetCtx.textAlign = 'center';
      targetCtx.textBaseline = 'middle';
      if (lvl <= 3) {
        const starR = cellSize * 0.12;
        const isGold = lvl >= 3;
        const numStars = lvl;
        const totalW = numStars * starR * 2.2;
        const startX = -totalW / 2 + starR;
        for (let i = 0; i < numStars; i++) {
          const sx = startX + i * starR * 2.2;
          const sy = labelY;
          targetCtx.beginPath();
          for (let j = 0; j < 10; j++) {
            const angle = (j * Math.PI / 5) - Math.PI / 2;
            const r = j % 2 === 0 ? starR : starR * 0.4;
            const px = sx + Math.cos(angle) * r;
            const py = sy + Math.sin(angle) * r;
            if (j === 0) targetCtx.moveTo(px, py);
            else targetCtx.lineTo(px, py);
          }
          targetCtx.closePath();
          targetCtx.fillStyle = isGold ? '#ffd700' : '#c0c0c0';
          if (isGold) drawGlowSprite(targetCtx, sx, sy, starR * 1.5, '#ffd700', 0.35);
          targetCtx.fill();
          targetCtx.strokeStyle = isGold ? '#b8860b' : '#888888';
          targetCtx.lineWidth = 1;
          targetCtx.stroke();
        }
      } else {
        targetCtx.font = `bold ${cellSize * 0.22}px sans-serif`;
        targetCtx.fillStyle = '#ffd700';
        drawGlowSprite(targetCtx, 0, labelY, cellSize * 0.3, '#ffd700', 0.3);
        targetCtx.fillText('Lv' + lvl, 0, labelY);
      }
    }

    function drawTowerStaticBody(targetCtx, tower, baseSize) {
      drawTowerLevelIndicator(targetCtx, tower, baseSize);

      if (tower.type === 'TURRET') {
        targetCtx.fillStyle = '#1a2a3a';
        targetCtx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);
        targetCtx.beginPath();
        targetCtx.arc(0, 0, baseSize * 0.28, 0, Math.PI * 2);
        targetCtx.fillStyle = tower.color;
        targetCtx.fill();
        targetCtx.beginPath();
        targetCtx.arc(0, 0, baseSize * 0.15, 0, Math.PI * 2);
        targetCtx.fillStyle = '#0a1520';
        targetCtx.fill();
      } else if (tower.type === 'CANNON') {
        targetCtx.fillStyle = '#2a1a0a';
        targetCtx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);
        targetCtx.strokeStyle = tower.color;
        targetCtx.lineWidth = 3;
        targetCtx.strokeRect(-baseSize / 2 + 2, -baseSize / 2 + 2, baseSize - 4, baseSize - 4);
        targetCtx.beginPath();
        targetCtx.arc(0, 0, baseSize * 0.3, 0, Math.PI * 2);
        targetCtx.fillStyle = tower.color;
        targetCtx.fill();
        targetCtx.beginPath();
        targetCtx.arc(0, 0, baseSize * 0.18, 0, Math.PI * 2);
        targetCtx.fillStyle = '#1a0a00';
        targetCtx.fill();
      } else if (tower.type === 'SNIPER') {
        targetCtx.fillStyle = '#1a0a0a';
        targetCtx.fillRect(-baseSize / 2, -baseSize / 2, baseSize, baseSize);
        targetCtx.fillStyle = tower.color;
        targetCtx.fillRect(-baseSize / 2, -baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        targetCtx.fillRect(baseSize / 2 - baseSize * 0.15, -baseSize / 2, baseSize * 0.15, baseSize * 0.15);
        targetCtx.fillRect(-baseSize / 2, baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        targetCtx.fillRect(baseSize / 2 - baseSize * 0.15, baseSize / 2 - baseSize * 0.15, baseSize * 0.15, baseSize * 0.15);
        targetCtx.beginPath();
        targetCtx.arc(0, 0, baseSize * 0.22, 0, Math.PI * 2);
        targetCtx.fillStyle = tower.color;
        targetCtx.fill();
        targetCtx.beginPath();
        targetCtx.arc(0, 0, baseSize * 0.12, 0, Math.PI * 2);
        targetCtx.fillStyle = '#200a0a';
        targetCtx.fill();
      }
    }

    function drawTowerDynamicBody(targetCtx, tower, baseSize, boosted, frozen) {
      if (tower.type !== 'FROST') {
        drawGlowSprite(targetCtx, 0, 0, boosted ? baseSize * 0.95 : baseSize * 0.7, tower.color, boosted ? 0.48 : 0.3);
      }

      if (tower.type === 'TURRET') {
        targetCtx.rotate(tower.angle);
        const recoilOffset = tower.recoil * 3;
        targetCtx.fillStyle = tower.color;
        targetCtx.fillRect(-baseSize * 0.1, -baseSize * 0.1, baseSize * 0.65 - recoilOffset, baseSize * 0.2);

        if (tower.muzzleFlash > 0) {
          targetCtx.globalAlpha = tower.muzzleFlash;
          drawGlowSprite(targetCtx, baseSize * 0.65 - recoilOffset, 0, baseSize * 0.3, '#ffffff', 0.55);
          targetCtx.beginPath();
          targetCtx.arc(baseSize * 0.65 - recoilOffset, 0, baseSize * 0.2, 0, Math.PI * 2);
          targetCtx.fillStyle = '#ffffff';
          targetCtx.fill();
          targetCtx.globalAlpha = 1;
        }
      } else if (tower.type === 'CANNON') {
        targetCtx.rotate(tower.angle);
        const recoilOffset = tower.recoil * 4;
        targetCtx.fillStyle = tower.color;
        targetCtx.fillRect(-baseSize * 0.05, -baseSize * 0.18, baseSize * 0.5 - recoilOffset, baseSize * 0.36);

        if (tower.muzzleFlash > 0) {
          targetCtx.globalAlpha = tower.muzzleFlash * 0.9;
          drawGlowSprite(targetCtx, baseSize * 0.5 - recoilOffset, 0, baseSize * 0.35, '#ff8800', 0.5);
          targetCtx.beginPath();
          targetCtx.arc(baseSize * 0.5 - recoilOffset, 0, baseSize * 0.25, 0, Math.PI * 2);
          targetCtx.fillStyle = '#ffcc44';
          targetCtx.fill();
          targetCtx.globalAlpha = 1;
        }
      } else if (tower.type === 'SNIPER') {
        targetCtx.rotate(tower.angle);
        const recoilOffset = tower.recoil * 2;
        targetCtx.fillStyle = tower.color;
        targetCtx.fillRect(-baseSize * 0.05, -baseSize * 0.07, baseSize * 0.9 - recoilOffset, baseSize * 0.14);

        targetCtx.beginPath();
        targetCtx.arc(0, -baseSize * 0.28, baseSize * 0.1, 0, Math.PI * 2);
        targetCtx.strokeStyle = tower.color;
        targetCtx.lineWidth = 2;
        targetCtx.stroke();
        targetCtx.beginPath();
        targetCtx.arc(-baseSize * 0.03, -baseSize * 0.28, baseSize * 0.03, 0, Math.PI * 2);
        targetCtx.fillStyle = 'rgba(255,255,255,0.6)';
        targetCtx.fill();

        if (tower.muzzleFlash > 0) {
          targetCtx.globalAlpha = tower.muzzleFlash;
          drawGlowSprite(targetCtx, baseSize * 0.9 - recoilOffset, 0, baseSize * 0.22, '#ffffff', 0.45);
          targetCtx.beginPath();
          targetCtx.arc(baseSize * 0.9 - recoilOffset, 0, baseSize * 0.12, 0, Math.PI * 2);
          targetCtx.fillStyle = '#ffffff';
          targetCtx.fill();
          targetCtx.globalAlpha = 1;
        }
      } else if (tower.type === 'FROST') {
        targetCtx.rotate(tower.angle + Math.PI / 6);
        const pulse = Math.sin(Date.now() / 400) * 0.15 + 0.85;
        targetCtx.globalAlpha = frozen ? 0.3 : 0.6 * pulse;
        targetCtx.fillStyle = tower.color;
        drawGlowSprite(targetCtx, 0, 0, boosted ? baseSize * 0.9 : baseSize * 0.72, tower.color, frozen ? 0.16 : 0.42 * pulse);
        targetCtx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.48;
          if (i === 0) targetCtx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else targetCtx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        targetCtx.closePath();
        targetCtx.fill();
        targetCtx.globalAlpha = 1;

        targetCtx.fillStyle = '#0a1a3a';
        targetCtx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const r = baseSize * 0.28;
          if (i === 0) targetCtx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else targetCtx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        targetCtx.closePath();
        targetCtx.fill();

        targetCtx.strokeStyle = tower.color;
        targetCtx.lineWidth = 1.5;
        targetCtx.globalAlpha = 0.5;
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          targetCtx.beginPath();
          targetCtx.moveTo(0, 0);
          targetCtx.lineTo(Math.cos(a) * baseSize * 0.45, Math.sin(a) * baseSize * 0.45);
          targetCtx.stroke();
        }
        targetCtx.globalAlpha = 1;

        targetCtx.beginPath();
        targetCtx.arc(0, 0, baseSize * 0.1, 0, Math.PI * 2);
        targetCtx.fillStyle = tower.color;
        drawGlowSprite(targetCtx, 0, 0, baseSize * 0.22, tower.color, 0.38);
        targetCtx.fill();

        if (tower.muzzleFlash > 0) {
          targetCtx.globalAlpha = tower.muzzleFlash * 0.8;
          drawGlowSprite(targetCtx, baseSize * 0.45, 0, baseSize * 0.28, '#aaeeff', 0.5);
          targetCtx.beginPath();
          targetCtx.arc(baseSize * 0.45, 0, baseSize * 0.18, 0, Math.PI * 2);
          targetCtx.fillStyle = '#aaeeff';
          targetCtx.fill();
          targetCtx.globalAlpha = 1;
        }
      }
    }

    function drawStaticTowers(targetCtx) {
      for (const tower of towers) {
        const cx = tower.col * cellSize + cellSize / 2;
        const cy = tower.row * cellSize + cellSize / 2;
        const baseSize = cellSize * 0.7;
        targetCtx.save();
        targetCtx.translate(cx, cy);
        drawTowerStaticBody(targetCtx, tower, baseSize);
        targetCtx.restore();
      }
    }

    function drawTowerDynamics(targetCtx = ctx) {
      for (const tower of towers) {
        const cx = tower.col * cellSize + cellSize / 2;
        const cy = tower.row * cellSize + cellSize / 2;
        const baseSize = cellSize * 0.7;
        const boosted = powerBoostTimer > 0;
        const frozen = powerFreezeTimer > 0;
        targetCtx.save();
        targetCtx.translate(cx, cy);
        drawTowerDynamicBody(targetCtx, tower, baseSize, boosted, frozen);
        targetCtx.restore();
      }
    }

    function rebuildStaticScene() {
      staticSceneCtx.setTransform(1, 0, 0, 1, 0, 0);
      staticSceneCtx.clearRect(0, 0, staticSceneCanvas.width, staticSceneCanvas.height);
      staticSceneCtx.fillStyle = '#0a0a0f';
      staticSceneCtx.fillRect(0, 0, staticSceneCanvas.width, staticSceneCanvas.height);
      drawGrid(staticSceneCtx);
      drawPath(staticSceneCtx);
      drawStaticTowers(staticSceneCtx);
      drawSpawnAndBase(staticSceneCtx);
      staticSceneReady = true;
    }

    function drawTowers() {
      for (const tower of towers) {
        const cx = tower.col * cellSize + cellSize / 2;
        const cy = tower.row * cellSize + cellSize / 2;
        const baseSize = cellSize * 0.7;
        const boosted = powerBoostTimer > 0;
        const frozen = powerFreezeTimer > 0;
        const effectiveRange = getTowerEffectiveRange(tower);

        // Range indicator when tower is selected (tap in PLANNING)
        if (selectedTower === tower) {
          ctx.beginPath();
          ctx.arc(cx, cy, effectiveRange * cellSize, 0, Math.PI * 2);
          ctx.strokeStyle = tower.color + '66';
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = tower.color + '11';
          ctx.fill();
        }

        ctx.save();
        ctx.translate(cx, cy);
        drawTowerStaticBody(ctx, tower, baseSize);
        drawTowerDynamicBody(ctx, tower, baseSize, boosted, frozen);

        ctx.restore();
      }
    }

    function getWorldOffset() {
      return {
        x: screenShake.duration > 0 ? screenShake.x : 0,
        y: screenShake.duration > 0 ? screenShake.y : 0
      };
    }

    function resetWorldTransform() {
      const offset = getWorldOffset();
      ctx.setTransform(1, 0, 0, 1, offset.x, offset.y);
    }

    function setEntityTransform(x, y, angle, scale) {
      const offset = getWorldOffset();
      const rotation = angle || 0;
      const appliedScale = scale === undefined ? 1 : scale;
      const cos = Math.cos(rotation) * appliedScale;
      const sin = Math.sin(rotation) * appliedScale;
      ctx.setTransform(cos, sin, -sin, cos, offset.x + x, offset.y + y);
    }

    function getEnemyRadius(enemy) {
      if (enemy.isBoss) return cellSize * 0.55;
      if (enemy.shape === 'large') return cellSize * 0.46;
      if (enemy.shape === 'medium') return cellSize * 0.36;
      return cellSize * 0.32;
    }

    function getEnemyTrailOpacity(enemy, index) {
      if (enemy.type === 'SCOUT') return [0.35, 0.15][index] || 0;
      if (enemy.type === 'SOLDIER') return [0.3][index] || 0;
      if (enemy.type === 'SPEEDSTER') return [0.5, 0.25, 0.1][index] || 0;
      if (enemy.isBoss) return [0.3, 0.15][index] || 0;
      return 0;
    }

    function getBatch(map, key, create) {
      if (!map.has(key)) map.set(key, create());
      return map.get(key);
    }

    function drawEnemies() {
      const deathFlashes = [];
      const frostAuraBatches = new Map();
      const frostShards = [];
      const trailBatches = new Map();
      const bodyBatches = new Map();
      const hitFlashes = [];
      const hpBars = [];

      for (const enemy of enemies) {
        if (!enemy.active) continue;

        const radius = getEnemyRadius(enemy);
        const cx = (enemy.col + 0.5) * cellSize;
        const cy = (enemy.row + 0.5) * cellSize;
        const angle = enemy.angle || 0;
        const spawnScale = enemy.spawnAnim !== undefined ? Math.max(0.01, 1 - enemy.spawnAnim) : 1;

        if (enemy.dying) {
          deathFlashes.push({ cx, cy, radius, deathTimer: enemy.deathTimer });
          continue;
        }

        if (enemy.slowTimer > 0) {
          const frostColor = enemy.slowMult <= ICE_BOMB_SLOW_MULT ? '#a8ecff' : '#4488ff';
          const frostAlpha = enemy.slowMult <= ICE_BOMB_SLOW_MULT ? 0.45 : 0.3;
          getBatch(frostAuraBatches, frostColor, function() {
            return [];
          }).push({ cx, cy, radius: radius * 1.3, alpha: frostAlpha });
          frostShards.push({ cx, cy, radius, angle });
        }

        const trail = enemy.trail || [];
        for (let t = 0; t < trail.length; t++) {
          const opacity = getEnemyTrailOpacity(enemy, t);
          if (opacity <= 0) continue;
          const tp = trail[t];
          const key = `${enemy.type}|${enemy.color}|${opacity.toFixed(2)}`;
          getBatch(trailBatches, key, function() {
            return { type: enemy.type, color: enemy.color, alpha: opacity, items: [] };
          }).items.push({
            cx: (tp.col + 0.5) * cellSize,
            cy: (tp.row + 0.5) * cellSize,
            angle: tp.angle || 0,
            radius: radius * 0.9,
            bossRotation: enemy.bossRotation
          });
        }

        const bodyKey = `${enemy.type}|${enemy.color}`;
        getBatch(bodyBatches, bodyKey, function() {
          return { type: enemy.type, color: enemy.color, items: [] };
        }).items.push({ cx, cy, angle, radius, spawnScale, bossRotation: enemy.bossRotation });

        if (enemy.hitFlashFrames > 0) {
          hitFlashes.push({ enemy, cx, cy, angle, radius, spawnScale, bossRotation: enemy.bossRotation });
        }

        hpBars.push({
          cx,
          cy,
          radius,
          hpPct: enemy.hp / enemy.maxHP
        });
      }

      ctx.fillStyle = '#ffffff';
      for (const flash of deathFlashes) {
        const scale = 1 + (flash.deathTimer / 0.15) * 1.5;
        ctx.globalAlpha = 1 - flash.deathTimer / 0.15;
        drawGlowSprite(ctx, flash.cx, flash.cy, flash.radius * scale * 1.45, '#ffffff', 0.55);
        ctx.beginPath();
        ctx.arc(flash.cx, flash.cy, flash.radius * scale, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      for (const [color, items] of frostAuraBatches) {
        ctx.fillStyle = color;
        for (const aura of items) {
          ctx.globalAlpha = aura.alpha;
          drawGlowSprite(ctx, aura.cx, aura.cy, aura.radius, color, aura.alpha * 0.8);
          ctx.beginPath();
          ctx.arc(aura.cx, aura.cy, aura.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      ctx.strokeStyle = '#88ccff';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6;
      for (const shard of frostShards) {
        setEntityTransform(shard.cx, shard.cy, shard.angle, 1);
        const shardCount = 6;
        const innerR = shard.radius * 0.9;
        const outerR = shard.radius * 1.4;
        for (let s = 0; s < shardCount; s++) {
          const a = (s / shardCount) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * innerR, Math.sin(a) * innerR);
          ctx.lineTo(Math.cos(a) * outerR, Math.sin(a) * outerR);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(Math.cos(a - 0.3) * outerR, Math.sin(a - 0.3) * outerR);
          ctx.lineTo(Math.cos(a) * outerR * 1.15, Math.sin(a) * outerR * 1.15);
          ctx.lineTo(Math.cos(a + 0.3) * outerR, Math.sin(a + 0.3) * outerR);
          ctx.stroke();
        }
      }
      resetWorldTransform();
      ctx.globalAlpha = 1;

      for (const batch of trailBatches.values()) {
        ctx.globalAlpha = batch.alpha;
        for (const item of batch.items) {
          setEntityTransform(item.cx, item.cy, item.angle, 1);
          drawEnemyShape(batch.type, item.radius, batch.color, true, item.bossRotation);
        }
      }
      resetWorldTransform();
      ctx.globalAlpha = 1;

      const bossGlowPulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
      for (const batch of bodyBatches.values()) {
        for (const item of batch.items) {
          const glowColor = batch.type === 'MEGABOSS' ? '#ff0044' : batch.type === 'BOSS' ? '#aa44ff' : batch.color;
          const glowRadius = batch.type === 'MEGABOSS' ? item.radius * 2.0 : batch.type === 'BOSS' ? item.radius * 1.55 : item.radius * 1.1;
          const glowAlpha = batch.type === 'MEGABOSS' || batch.type === 'BOSS'
            ? 0.32 + bossGlowPulse * 0.12
            : 0.18;
          drawGlowSprite(ctx, item.cx, item.cy, glowRadius, glowColor, glowAlpha);
        }

        for (const item of batch.items) {
          setEntityTransform(item.cx, item.cy, item.angle, item.spawnScale < 1 ? item.spawnScale : 1);
          drawEnemyShape(batch.type, item.radius, batch.color, false, item.bossRotation);
        }
      }
      resetWorldTransform();

      const prevComposite = ctx.globalCompositeOperation;
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 1;
      for (const flash of hitFlashes) {
        setEntityTransform(flash.cx, flash.cy, flash.angle, flash.spawnScale < 1 ? flash.spawnScale : 1);
        drawGlowSprite(ctx, 0, 0, flash.radius * 1.35, '#ffffff', 0.45);
        drawEnemyShape(flash.enemy.type, flash.radius * 1.02, '#ffffff', false, flash.bossRotation);
        flash.enemy.hitFlashFrames--;
      }
      ctx.globalCompositeOperation = prevComposite;
      resetWorldTransform();

      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#1a1a1a';
      for (const bar of hpBars) {
        const barW = bar.radius * 2.2;
        const barX = bar.cx - barW / 2;
        const barY = bar.cy - bar.radius - 10;
        ctx.fillRect(barX, barY, barW, 2);
      }

      for (const color of ['#44ff44', '#ffff44', '#ff4444']) {
        ctx.fillStyle = color;
        for (const bar of hpBars) {
          const targetColor = bar.hpPct > 0.5 ? '#44ff44' : bar.hpPct > 0.25 ? '#ffff44' : '#ff4444';
          if (targetColor !== color) continue;
          const barW = bar.radius * 2.2;
          const barX = bar.cx - barW / 2;
          const barY = bar.cy - bar.radius - 10;
          ctx.fillRect(barX, barY, barW * bar.hpPct, 2);
        }
      }

      ctx.globalAlpha = 1;
      resetWorldTransform();
    }

    // Helper function to draw enemy shapes (assumes ctx is already translated and rotated)
    function drawEnemyShape(type, radius, color, isTrail, bossRotation) {
      const bodyColor = color;
      const innerColor = lightenColor(color, 0.3);
      const darkColor = darkenColor(color, 0.3);

      if (type === 'SCOUT') {
        // Pointed arrow/dart shape pointing right (in movement direction)
        ctx.beginPath();
        // Arrow pointing right: tip at front, wings at back
        ctx.moveTo(radius * 1.1, 0); // Tip
        ctx.lineTo(radius * 0.2, -radius * 0.5); // Top wing
        ctx.lineTo(radius * 0.4, 0); // Back indent
        ctx.lineTo(radius * 0.2, radius * 0.5); // Bottom wing
        ctx.closePath();
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Inner highlight
        if (!isTrail) {
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          ctx.moveTo(radius * 0.8, 0);
          ctx.lineTo(radius * 0.3, -radius * 0.25);
          ctx.lineTo(radius * 0.4, 0);
          ctx.lineTo(radius * 0.3, radius * 0.25);
          ctx.closePath();
          ctx.fill();
        }

      } else if (type === 'SOLDIER') {
        // Diamond/rhombus shape
        ctx.beginPath();
        ctx.moveTo(radius * 1.0, 0); // Right point
        ctx.lineTo(0, -radius * 0.7); // Top
        ctx.lineTo(-radius * 0.8, 0); // Left point
        ctx.lineTo(0, radius * 0.7); // Bottom
        ctx.closePath();
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Inner diamond highlight
        if (!isTrail) {
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          ctx.moveTo(radius * 0.5, 0);
          ctx.lineTo(0, -radius * 0.35);
          ctx.lineTo(-radius * 0.4, 0);
          ctx.lineTo(0, radius * 0.35);
          ctx.closePath();
          ctx.fill();

          // Dark center
          ctx.fillStyle = darkColor;
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.2, 0, Math.PI * 2);
          ctx.fill();
        }

      } else if (type === 'TANK') {
        // Chunky rounded hexagon / armored square
        const size = radius * 0.9;
        ctx.beginPath();
        // Rounded square shape
        const corner = size * 0.3;
        ctx.moveTo(-size + corner, -size);
        ctx.lineTo(size - corner, -size);
        ctx.quadraticCurveTo(size, -size, size, -size + corner);
        ctx.lineTo(size, size - corner);
        ctx.quadraticCurveTo(size, size, size - corner, size);
        ctx.lineTo(-size + corner, size);
        ctx.quadraticCurveTo(-size, size, -size, size - corner);
        ctx.lineTo(-size, -size + corner);
        ctx.quadraticCurveTo(-size, -size, -size + corner, -size);
        ctx.closePath();
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Thick armored border
        ctx.strokeStyle = '#bbbbbb';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Inner darker plating
        if (!isTrail) {
          ctx.fillStyle = darkColor;
          const innerSize = size * 0.55;
          ctx.beginPath();
          ctx.moveTo(-innerSize + corner * 0.5, -innerSize);
          ctx.lineTo(innerSize - corner * 0.5, -innerSize);
          ctx.quadraticCurveTo(innerSize, -innerSize, innerSize, -innerSize + corner * 0.5);
          ctx.lineTo(innerSize, innerSize - corner * 0.5);
          ctx.quadraticCurveTo(innerSize, innerSize, innerSize - corner * 0.5, innerSize);
          ctx.lineTo(-innerSize + corner * 0.5, innerSize);
          ctx.quadraticCurveTo(-innerSize, innerSize, -innerSize, innerSize - corner * 0.5);
          ctx.lineTo(-innerSize, -innerSize + corner * 0.5);
          ctx.quadraticCurveTo(-innerSize, -innerSize, -innerSize + corner * 0.5, -innerSize);
          ctx.closePath();
          ctx.fill();

          // Armored rivets / bolts
          ctx.fillStyle = '#cccccc';
          const rivetR = radius * 0.08;
          const rivetDist = size * 0.65;
          ctx.beginPath();
          ctx.arc(-rivetDist, -rivetDist, rivetR, 0, Math.PI * 2);
          ctx.arc(rivetDist, -rivetDist, rivetR, 0, Math.PI * 2);
          ctx.arc(-rivetDist, rivetDist, rivetR, 0, Math.PI * 2);
          ctx.arc(rivetDist, rivetDist, rivetR, 0, Math.PI * 2);
          ctx.fill();
        }

      } else if (type === 'SPEEDSTER') {
        // Elongated ellipse / oval pointing forward
        ctx.beginPath();
        ctx.ellipse(0, 0, radius * 1.3, radius * 0.55, 0, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // Inner highlight stripe
        if (!isTrail) {
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          ctx.ellipse(radius * 0.15, 0, radius * 0.7, radius * 0.25, 0, 0, Math.PI * 2);
          ctx.fill();

          // Motion lines
          ctx.strokeStyle = innerColor;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.5;
          for (let m = 0; m < 3; m++) {
            const offset = (m - 1) * radius * 0.25;
            ctx.beginPath();
            ctx.moveTo(-radius * 1.1, offset);
            ctx.lineTo(-radius * 0.6, offset);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }

      } else if (type === 'ARMORED') {
        // Hexagonal plate shape with shield emblem
        ctx.beginPath();
        const sides = 6;
        for (let i = 0; i < sides; i++) {
          const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
          const px = Math.cos(a) * radius * 0.95;
          const py = Math.sin(a) * radius * 0.95;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = bodyColor;
        ctx.fill();
        // Dark armored plating lines
        ctx.strokeStyle = darkColor;
        ctx.lineWidth = 2;
        ctx.stroke();
        // Shield emblem in center
        if (!isTrail) {
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.35, 0, Math.PI * 2);
          ctx.fillStyle = darkColor;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = lightenColor(bodyColor, 0.3);
          ctx.fill();
        }

      } else if (type === 'BOSS') {
        // Large circle with crown/spike accents
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();

        if (!isTrail) {
          // Crown spikes around the edge
          const spikeCount = 8;
          ctx.fillStyle = lightenColor(bodyColor, 0.4);
          for (let s = 0; s < spikeCount; s++) {
            const a = (bossRotation || 0) + (s / spikeCount) * Math.PI * 2;
            const innerX = Math.cos(a) * radius * 0.7;
            const innerY = Math.sin(a) * radius * 0.7;
            const tipX = Math.cos(a) * radius * 1.15;
            const tipY = Math.sin(a) * radius * 1.15;
            const sideX = -Math.sin(a) * radius * 0.15;
            const sideY = Math.cos(a) * radius * 0.15;
            ctx.beginPath();
            ctx.moveTo(innerX, innerY);
            ctx.lineTo(tipX - sideX, tipY - sideY);
            ctx.lineTo(tipX + sideX, tipY + sideY);
            ctx.closePath();
            ctx.fill();
          }

          // Rotating inner star/triangle pattern
          ctx.fillStyle = innerColor;
          ctx.beginPath();
          for (let s = 0; s < 3; s++) {
            const a = (bossRotation || 0) * 0.7 + (s / 3) * Math.PI * 2 - Math.PI / 2;
            const r = radius * 0.55;
            if (s === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();

          // Pulsing white ring
          const pulse = Math.sin(Date.now() / 150) * 0.3 + 0.7;
          ctx.globalAlpha = pulse * 0.6;
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2.5;
          drawGlowSprite(ctx, 0, 0, radius * 1.25, '#ffffff', pulse * 0.22);
          ctx.beginPath();
          ctx.arc(0, 0, radius * 1.05, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;

          // Dark core
          ctx.fillStyle = darkenColor(bodyColor, 0.4);
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.35, 0, Math.PI * 2);
          ctx.fill();

          // Glowing core center
          ctx.fillStyle = lightenColor(bodyColor, 0.5);
          drawGlowSprite(ctx, 0, 0, radius * 0.35, '#ffffff', 0.3);
          ctx.beginPath();
          ctx.arc(0, 0, radius * 0.15, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (type === 'MEGABOSS') {
        // Larger, darker red mega boss with double crown spikes and dark aura
        const megaRadius = radius * 1.2;
        drawGlowSprite(ctx, 0, 0, megaRadius * 1.45, '#ff0044', 0.42);
        ctx.beginPath();
        ctx.arc(0, 0, megaRadius, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();

        if (!isTrail) {
          // Dark aura ring
          const spikeCount = 12;
          ctx.fillStyle = darkenColor(bodyColor, 0.3);
          for (let s = 0; s < spikeCount; s++) {
            const a = (bossRotation || 0) + (s / spikeCount) * Math.PI * 2;
            const innerX = Math.cos(a) * megaRadius * 0.7;
            const innerY = Math.sin(a) * megaRadius * 0.7;
            const tipX = Math.cos(a) * megaRadius * 1.3;
            const tipY = Math.sin(a) * megaRadius * 1.3;
            const sideX = -Math.sin(a) * megaRadius * 0.12;
            const sideY = Math.cos(a) * megaRadius * 0.12;
            ctx.beginPath();
            ctx.moveTo(innerX, innerY);
            ctx.lineTo(tipX - sideX, tipY - sideY);
            ctx.lineTo(tipX + sideX, tipY + sideY);
            ctx.closePath();
            ctx.fill();
          }

          // Inner skull-like pattern
          const skullRotation = (bossRotation || 0) * 0.5;
          ctx.rotate(skullRotation);
          ctx.fillStyle = darkenColor(bodyColor, 0.5);
          ctx.beginPath();
          ctx.arc(0, 0, megaRadius * 0.6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ff4444';
          ctx.beginPath();
          ctx.arc(-megaRadius * 0.2, -megaRadius * 0.1, megaRadius * 0.15, 0, Math.PI * 2);
          ctx.arc(megaRadius * 0.2, -megaRadius * 0.1, megaRadius * 0.15, 0, Math.PI * 2);
          ctx.fill();
          // Jaw
          ctx.fillStyle = darkenColor(bodyColor, 0.5);
          ctx.beginPath();
          ctx.arc(0, megaRadius * 0.25, megaRadius * 0.3, 0, Math.PI);
          ctx.fill();
          ctx.rotate(-skullRotation);

          // Pulsing danger ring
          const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
          ctx.globalAlpha = pulse;
          ctx.strokeStyle = '#ff0044';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, megaRadius * 1.35, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }

    // Color utility functions
    function lightenColor(hex, amount) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.min(255, (num >> 16) + Math.round(255 * amount));
      const g = Math.min(255, ((num >> 8) & 0x00FF) + Math.round(255 * amount));
      const b = Math.min(255, (num & 0x0000FF) + Math.round(255 * amount));
      return `rgb(${r},${g},${b})`;
    }

    function darkenColor(hex, amount) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.max(0, (num >> 16) - Math.round(255 * amount));
      const g = Math.max(0, ((num >> 8) & 0x00FF) - Math.round(255 * amount));
      const b = Math.max(0, (num & 0x0000FF) - Math.round(255 * amount));
      return `rgb(${r},${g},${b})`;
    }

    function drawSynergyTethers() {
      if (gameState !== GameStates.WAVE_ACTIVE || towerSynergies.length === 0) return;
      const pulse = Math.sin(Date.now() / 220) * 0.2 + 0.55;

      for (const link of towerSynergies) {
        const cannonPos = getTowerCenter(link.cannon);
        const frostPos = getTowerCenter(link.frost);
        const startX = cannonPos.col * cellSize;
        const startY = cannonPos.row * cellSize;
        const endX = frostPos.col * cellSize;
        const endY = frostPos.row * cellSize;

        drawGlowLine(ctx, startX, startY, endX, endY, '#a8ecff', 8, 0.16 * pulse, 10);
        ctx.globalAlpha = 0.18 * pulse;
        ctx.strokeStyle = '#d8f6ff';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        ctx.globalAlpha = 0.45 * pulse;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }

    function drawProjectiles() {
      const mergeBeams = [];
      const mergeOrbBatches = new Map();
      const mergeCoreBursts = [];
      const trailBatches = new Map();
      const projectileBatches = new Map();
      const iceBombHalos = [];

      for (const proj of projectiles) {
        if (!proj.active) continue;
        if (proj.phase === 'merge') {
          const progress = 1 - Math.max(0, proj.mergeTimer) / proj.mergeDuration;
          const eased = 1 - Math.pow(1 - progress, 2);
          const orbACol = proj.sourceA.col + (proj.mergePoint.col - proj.sourceA.col) * eased;
          const orbARow = proj.sourceA.row + (proj.mergePoint.row - proj.sourceA.row) * eased;
          const orbBCol = proj.sourceB.col + (proj.mergePoint.col - proj.sourceB.col) * eased;
          const orbBRow = proj.sourceB.row + (proj.mergePoint.row - proj.sourceB.row) * eased;
          const mergeX = proj.mergePoint.col * cellSize;
          const mergeY = proj.mergePoint.row * cellSize;
          mergeBeams.push({
            ax: orbACol * cellSize,
            ay: orbARow * cellSize,
            bx: orbBCol * cellSize,
            by: orbBRow * cellSize,
            mx: mergeX,
            my: mergeY
          });
          getBatch(mergeOrbBatches, proj.sourceA.color, function() {
            return [];
          }).push({ x: orbACol * cellSize, y: orbARow * cellSize, radius: 4 });
          getBatch(mergeOrbBatches, proj.sourceB.color, function() {
            return [];
          }).push({ x: orbBCol * cellSize, y: orbBRow * cellSize, radius: 4 });
          mergeCoreBursts.push({
            x: mergeX,
            y: mergeY,
            radius: 5 + eased * 4,
            glowRadius: 12 + eased * 6,
            alpha: 0.25 + eased * 0.5
          });
          continue;
        }

        const px = proj.col * cellSize;
        const py = proj.row * cellSize;
        for (let i = 0; i < proj.trail.length; i++) {
          const t = proj.trail[i];
          const alpha = 0.3 - i * 0.1;
          if (alpha <= 0) continue;
          const trailKey = `${proj.color}|${alpha.toFixed(2)}`;
          getBatch(trailBatches, trailKey, function() {
            return { color: proj.color, alpha, items: [] };
          }).items.push({ x: t.col * cellSize, y: t.row * cellSize, radius: 3 });
        }

        const projectileKey = `${proj.color}|${proj.towerType}`;
        getBatch(projectileBatches, projectileKey, function() {
          return {
            color: proj.color,
            towerType: proj.towerType,
            bodyRadius: proj.towerType === 'ICE_BOMB' ? 7 : 5,
            glowRadius: proj.towerType === 'ICE_BOMB' ? 15 : 10,
            glowAlpha: proj.towerType === 'ICE_BOMB' ? 0.55 : 0.35,
            items: []
          };
        }).items.push({ x: px, y: py });

        if (proj.towerType === 'ICE_BOMB') {
          iceBombHalos.push({ x: px, y: py, radius: 11 });
        }
      }

      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#d8f6ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (const beam of mergeBeams) {
        ctx.moveTo(beam.ax, beam.ay);
        ctx.lineTo(beam.mx, beam.my);
        ctx.moveTo(beam.bx, beam.by);
        ctx.lineTo(beam.mx, beam.my);
      }
      ctx.stroke();

      ctx.globalAlpha = 0.9;
      for (const [color, items] of mergeOrbBatches) {
        ctx.fillStyle = color;
        for (const orb of items) {
          drawGlowSprite(ctx, orb.x, orb.y, 10, color, 0.42);
        }
        ctx.beginPath();
        for (const orb of items) {
          ctx.moveTo(orb.x + orb.radius, orb.y);
          ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
        }
        ctx.fill();
      }

      for (const burst of mergeCoreBursts) {
        ctx.globalAlpha = burst.alpha;
        ctx.fillStyle = '#a8ecff';
        drawGlowSprite(ctx, burst.x, burst.y, burst.glowRadius, '#a8ecff', 0.5);
        ctx.beginPath();
        ctx.arc(burst.x, burst.y, burst.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const batch of trailBatches.values()) {
        ctx.globalAlpha = batch.alpha;
        ctx.fillStyle = batch.color;
        ctx.beginPath();
        for (const item of batch.items) {
          ctx.moveTo(item.x + item.radius, item.y);
          ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
        }
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      for (const batch of projectileBatches.values()) {
        ctx.fillStyle = batch.color;
        for (const item of batch.items) {
          drawGlowSprite(ctx, item.x, item.y, batch.glowRadius, batch.color, batch.glowAlpha);
        }
        ctx.beginPath();
        for (const item of batch.items) {
          ctx.moveTo(item.x + batch.bodyRadius, item.y);
          ctx.arc(item.x, item.y, batch.bodyRadius, 0, Math.PI * 2);
        }
        ctx.fill();
      }

      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      for (const halo of iceBombHalos) {
        ctx.moveTo(halo.x + halo.radius, halo.y);
        ctx.arc(halo.x, halo.y, halo.radius, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawSpawnAndBase(targetCtx = ctx) {
      const spawnCx = (SPAWN_POS.col + 0.5) * cellSize;
      const spawnCy = (SPAWN_POS.row + 0.5) * cellSize;
      const baseCx = (BASE_POS.col + 0.5) * cellSize;
      const baseCy = (BASE_POS.row + 0.5) * cellSize;
      const size = cellSize * 0.7;

      const spawnPulse = Math.sin(Date.now() / 300) * 0.15 + 1;
      drawGlowSprite(targetCtx, spawnCx, spawnCy, size * 0.95 * spawnPulse, '#44ff44', 0.45);
      targetCtx.fillStyle = '#44ff44';
      targetCtx.fillRect(spawnCx - size * spawnPulse / 2, spawnCy - size * spawnPulse / 2, size * spawnPulse, size * spawnPulse);
      targetCtx.fillStyle = '#0a0a0f';
      targetCtx.font = `bold ${cellSize * 0.35}px sans-serif`;
      targetCtx.textAlign = 'center';
      targetCtx.textBaseline = 'middle';
      targetCtx.fillText('A', spawnCx, spawnCy);

      const basePulse = Math.sin(Date.now() / 300) * 0.15 + 1;
      drawGlowSprite(targetCtx, baseCx, baseCy, size * 0.95 * basePulse, '#ff4444', 0.45);
      targetCtx.fillStyle = '#ff4444';
      targetCtx.fillRect(baseCx - size * basePulse / 2, baseCy - size * basePulse / 2, size * basePulse, size * basePulse);
      targetCtx.fillStyle = '#0a0a0f';
      targetCtx.fillText('B', baseCx, baseCy);
    }

    function getWavePreviewLines() {
      if (currentWave <= BASE_WAVES) {
        const def = WAVE_DEFINITIONS[currentWave - 1];
        const counts = {};
        for (const g of def) {
          counts[g.type] = (counts[g.type] || 0) + g.count;
        }
        return Object.entries(counts).map(([type, count]) => {
          const label = type.charAt(0) + type.slice(1).toLowerCase();
          const color = ENEMY_TYPES[type].color;
          return { text: `${count} ${label}`, color };
        });
      } else {
        return [{ text: 'ENDLESS — SURVIVE!', color: '#aa44ff' }];
      }
    }

    function drawWavePreview() {
      // Dark overlay
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const lines = getWavePreviewLines();
      const centerX = canvas.width / 2;
      const availableH = canvas.height * 0.85;
      const waveLabelH = canvas.width * 0.1;
      const lineH = canvas.width * 0.05 * 1.8;
      const totalContentH = waveLabelH + lines.length * lineH;
      const startY = (canvas.height - totalContentH) / 2;

      // Wave label — scale to fit canvas width
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      drawGlowSprite(ctx, centerX, startY, canvas.width * 0.12, '#4ade80', 0.18);
      const waveLabel = (currentWave <= BASE_WAVES ? `WAVE ${currentWave}` : `WAVE ${currentWave} ∞`) + (stormActive ? ' — ⚡ STORM' : '') + (armoredWave ? ' — 🛡️ ARMORED' : '');
      const maxWaveW = canvas.width * 0.85;
      let waveFontSize = canvas.width * 0.1;
      ctx.font = `bold ${waveFontSize}px -apple-system, sans-serif`;
      while (ctx.measureText(waveLabel).width > maxWaveW && waveFontSize > 10) {
        waveFontSize -= 2;
        ctx.font = `bold ${waveFontSize}px -apple-system, sans-serif`;
      }
      ctx.fillText(waveLabel, centerX, startY);

      // Enemy count lines — scale font to fit
      const maxLineW = canvas.width * 0.85;
      let lineFontSize = canvas.width * 0.05;
      ctx.font = `bold ${lineFontSize}px -apple-system, sans-serif`;
      const sampleLine = lines[0] ? lines[0].text : 'SCOUT x5';
      while (ctx.measureText(sampleLine).width > maxLineW && lineFontSize > 8) {
        lineFontSize -= 1;
        ctx.font = `bold ${lineFontSize}px -apple-system, sans-serif`;
      }
      lines.forEach((line, i) => {
        const y = startY + (i + 1) * lineFontSize * 1.8;
        const textWidth = ctx.measureText(line.text).width;

        // Color dot indicator
        drawGlowSprite(ctx, centerX - textWidth / 2 - lineFontSize * 1.2, y, lineFontSize * 0.95, line.color, 0.28);
        ctx.fillStyle = line.color;
        ctx.beginPath();
        ctx.arc(centerX - textWidth / 2 - lineFontSize * 1.2, y, lineFontSize * 0.6, 0, Math.PI * 2);
        ctx.fill();

        // Enemy label
        ctx.fillStyle = '#ffffff';
        ctx.fillText(line.text, centerX, y);
      });

      // Countdown progress bar
      const barWidth = canvas.width * 0.5;
      const barHeight = 6;
      const barX = (canvas.width - barWidth) / 2;
      const barY = canvas.height / 2 + (lines.length + 1.5) * lineFontSize * 1.8;
      const progress = previewTimer / WAVE_PREVIEW_DURATION;

      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(barX, barY, barWidth, barHeight);
      drawGlowLine(ctx, barX, barY + barHeight / 2, barX + barWidth * progress, barY + barHeight / 2, '#4ade80', 6, 0.22, 14);
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(barX, barY, barWidth * progress, barHeight);
    }

    // === GAME LOOP ===
    function gameLoop(timestamp) {
      const realDt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      // Apply speed multiplier only to game logic
      const dt = realDt * speedMult;

      // Always render regardless of state
      // Game logic updates only when WAVE_ACTIVE (not when PAUSED, PLANNING, MENU, etc.)
      if (gameState === GameStates.PAUSED) {
        // Frozen - no updates, just keep rendering
      } else if (gameState === GameStates.WAVE_ACTIVE) {
        updateWave(dt);
        updateEnemies(dt);
        updateTowers(dt);
        updateProjectiles(dt);
        updateHUD();
      }

      if (pathInvalidFlash > 0) {
        pathInvalidFlash -= realDt;
      }

      if (screenShake.duration > 0) {
        screenShake.duration -= realDt;
      }

      // Boss warning effect timers
      if (bossWarningTimer > 0) bossWarningTimer -= realDt;
      if (bossWarningFlash > 0) bossWarningFlash -= realDt * 3;
      // Tower range indicator auto-hide after 2s
      if (towerRangeTimer > 0) {
        towerRangeTimer -= realDt;
        if (towerRangeTimer <= 0) { selectedTower = null; }
      }
      // Refresh upgrade button every frame
      try { updateUpgradeButton(); } catch(e) {}

      // Death particles update (always run, even when paused)
      updateDeathParticles(realDt);
      updateSplashRings(realDt);
      updateHitNumbers(realDt);
      updateGoldPickups(realDt);

      // Power-up timers (use realDt so button availability shows in real time)
      if (powerFreezeTimer > 0) powerFreezeTimer -= realDt;
      if (powerBoostTimer > 0) powerBoostTimer -= realDt;
      if (powerFlashTimer > 0) powerFlashTimer -= realDt;
      updatePowerButtons();

      render();
      requestAnimationFrame(gameLoop);
    }

    // === INIT ===
    // Upgrade button — global function (declared outside init so all event handlers can call it)
    function updateUpgradeButton() {
      const btn = document.getElementById('upgrade-btn');
      const lbl = document.getElementById('upgrade-label');
      const costSpan = document.getElementById('upgrade-cost');
      if (!btn || !lbl || !costSpan) return;

      if (!selectedTower) {
        btn.style.opacity = '0.3';
        btn.style.pointerEvents = 'auto';
        lbl.textContent = '?';
        costSpan.textContent = '—';
        return;
      }

      const lvl = selectedTower.level || 1;
      const nextLvl = lvl + 1;
      const cost = Math.round(30 * Math.pow(1.2, lvl - 1));
      if (currency >= cost) {
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      } else {
        btn.style.opacity = '0.5';
        btn.style.pointerEvents = 'auto';
      }
      lbl.textContent = '\u2191' + nextLvl;
      costSpan.textContent = cost + '\u26a1';
    }

    function init() {
      // Load high scores from localStorage
      bestWave = parseInt(localStorage.getItem('vibe-bestWave') || '0');
      bestScore = parseInt(localStorage.getItem('vibe-bestScore') || '0');

      resizeCanvas();
      initGrid();
      initTowers();
      updateHUD();

      window.addEventListener('resize', resizeCanvas);

      setupInput();

      updateMuteButton();

      startBtn.addEventListener('click', () => {
        if (gameState === GameStates.PLANNING) {
          vibrate();
          startWave();
        }
      });

      document.getElementById('upgrade-btn').addEventListener('click', () => {
        if (gameState !== GameStates.PLANNING) return;
        if (!selectedTower) return;
        const tower = selectedTower;
        const lvl = tower.level || 1;
        const cost = Math.round(30 * Math.pow(1.2, lvl - 1));
        if (currency < cost) return;
        currency -= cost;
        tower.level = lvl + 1;
        // Stats: damage ×1.10^(level-1), fire rate /1.06^(level-1), range ×1.05^(level-1)
        tower.damage = Math.round(TOWER_TYPES[tower.type].damage * Math.pow(1.10, tower.level - 1));
        tower.range = Math.min(TOWER_TYPES[tower.type].range * 1.8, +(TOWER_TYPES[tower.type].range * Math.pow(1.05, tower.level - 1)).toFixed(1));
        tower.fireRate = Math.max(0.15, +(TOWER_TYPES[tower.type].fireRate / Math.pow(1.06, tower.level - 1)).toFixed(2));
        tower.upgradeFlash = 1.0;
        try { navigator.vibrate && navigator.vibrate(30); } catch(e) {}
        showTooltip('\u2191 Lv' + tower.level + '!');
        updateHUD();
        updateUpgradeButton();
      });
      document.getElementById('upgrade-btn').addEventListener('touchend', (e) => { e.preventDefault(); document.getElementById('upgrade-btn').click(); });

      document.getElementById('clear-btn').addEventListener('click', () => {
        if (gameState === GameStates.PLANNING || gameState === GameStates.MENU) {
          clearPath();
        }
      });

      document.getElementById('buy-hp-btn').addEventListener('click', () => {
        buyHP();
      });

      document.getElementById('freeze-btn').addEventListener('click', activateFreeze);
      document.getElementById('freeze-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateFreeze(); });
      document.getElementById('nuke-btn').addEventListener('click', activateNuke);
      document.getElementById('nuke-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateNuke(); });
      document.getElementById('boost-btn').addEventListener('click', activateBoost);
      document.getElementById('boost-btn').addEventListener('touchend', (e) => { e.preventDefault(); activateBoost(); });

      document.getElementById('mute-btn').addEventListener('click', () => {
        muted = !muted;
        localStorage.setItem('vibe-muted', muted ? '1' : '0');
        updateMuteButton();
      });

      pauseBtn.addEventListener('click', () => {
        // Pause currently disabled
      });
      pauseBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        // Pause currently disabled
      });

      // Speed toggle button
      const speedBtn = document.getElementById('speed-btn');
      function cycleSpeed() {
        const speeds = [1.0, 1.5, 2.0, 3.0, 5.0];
        const labels = ['1\u00d7', '1.5\u00d7', '2\u00d7', '3\u00d7', '5\u00d7'];
        const idx = speeds.indexOf(speedMult);
        speedMult = speeds[(idx + 1) % speeds.length];
        speedBtn.textContent = labels[(idx + 1) % labels.length];
        speedBtn.classList.toggle('fast', speedMult !== 1.0);
        localStorage.setItem('vibe-speed', speedMult);
      }
      speedBtn.addEventListener('click', cycleSpeed);
      speedBtn.addEventListener('touchend', (e) => { e.preventDefault(); cycleSpeed(); });
      // Restore saved speed
      const savedSpeed = parseFloat(localStorage.getItem('vibe-speed') || '1');
      if (savedSpeed !== 1.0) {
        speedMult = savedSpeed;
        const speeds = [1.0, 1.5, 2.0, 3.0, 5.0];
        const labels = ['1\u00d7', '1.5\u00d7', '2\u00d7', '3\u00d7', '5\u00d7'];
        const idx = speeds.indexOf(speedMult);
        speedBtn.textContent = labels[idx];
        speedBtn.classList.add('fast');
      }

      showOverlay('MENU');
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
</html>
