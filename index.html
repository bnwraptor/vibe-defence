<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vibe Defence — Path Architect</title>
  <script async src="https://jam.pieter.com/2026/widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      align-items: center;
      justify-content: center;
    }
    #hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    #hud-top .hp-display { color: #ff4444; }
    #hud-top .wave-display { color: #aaa; }
    #hud-top .currency-display { color: #ffd700; margin-right: 6px; }
    #canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      position: relative;
    }
    #game {
      display: block;
    }
    #hud-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 500px;
      padding: 8px 12px 16px;
      flex-shrink: 0;
    }
    #budget-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #aaa;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    #bottom-controls {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      width: 100%;
    }
    #budget-track {
      flex: 1;
      height: 8px;
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
    }
    #budget-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a4a6a, #6a6a8a);
      border-radius: 4px;
      transition: width 0.15s ease;
    }
    #start-btn {
      background: rgba(45,106,79,0.3);
      border: 2px solid #2d6a4f;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      opacity: 0.3;
      pointer-events: none;
    }
    #upgrade-btn {
      background: rgba(255,215,0,0.2);
      border: 2px solid #ffd700;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      opacity: 0.3;
      pointer-events: none;
    }
    #start-btn::before {
      content: '';
      width: 0; height: 0;
      border-style: solid;
      border-width: 5px 0 5px 9px;
      border-color: transparent transparent transparent #4ade80;
      flex-shrink: 0;
    }
    #start-btn:active { transform: scale(0.95); }
    #start-btn:disabled { opacity: 0.3; }
    #start-btn.active {
      opacity: 1;
      pointer-events: auto;
      animation: btnPulse 1s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(64,145,108,0.5); }
      50% { box-shadow: 0 0 0 6px rgba(64,145,108,0); }
    }
    #buy-hp-btn:disabled { opacity: 0.35; cursor: default; }
    #freeze-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(68,136,255,0.4) !important; }
    #nuke-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(255,136,0,0.4) !important; }
    #boost-btn.active { opacity: 1 !important; pointer-events: auto !important; background: rgba(255,215,0,0.4) !important; }
    #power-flash {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: clamp(32px, 10vw, 64px); font-weight: 900; z-index: 30;
      pointer-events: none; opacity: 0; transition: opacity 0.1s;
      text-shadow: 0 0 20px currentColor;
    }
    #power-flash.visible { opacity: 1; }
    #pause-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 16px;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #mute-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 14px;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      color: #fff;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: clamp(28px, 8vw, 48px);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #overlay h2 {
      font-size: clamp(18px, 5vw, 28px);
      margin-bottom: 24px;
      color: #aaa;
    }
    #overlay .score-line {
      font-size: 16px;
      color: #888;
      margin-bottom: 8px;
    }
    #overlay .big-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
    }
    #overlay .secondary-btn {
      margin-top: 12px;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }
    #overlay .how-text {
      color: #aaa;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    #tooltip {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,60,60,0.9);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 15;
    }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud-top">
      <button id="mute-btn">🔊</button>
      <span class="wave-display" id="wave-text">WAVE 1/10</span>
      <span class="hp-display" id="hp-text">HP: ██████░░░░</span>
      <span class="currency-display" id="currency-text">💰 100</span>
      <button id="pause-btn">⏸</button>
    </div>
    <div id="canvas-wrapper">
      <canvas id="game"></canvas>
    </div>
    <div id="hud-bottom">
      <div id="budget-bar">
        <span>PATH</span>
        <div id="budget-track"><div id="budget-fill" style="width:0%"></div></div>
        <span id="budget-text">0/20</span>
        <button id="clear-btn" style="background:#333;border:none;color:#aaa;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:4px">CLEAR</button>
        <button id="buy-hp-btn" style="background:#441111;border:none;color:#ff6666;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:4px">+HP 15💰</button>
      </div>
      <div id="bottom-controls">
        <div id="power-btn-bar" style="display:flex;flex-direction:row;align-items:center;gap:8px">
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <button id="freeze-btn" style="background:rgba(68,136,255,0.2);border:2px solid #4488ff;color:#88aaff;font-size:13px;width:38px;height:38px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">❄</button>
            <span id="freeze-cost" style="font-size:8px;color:#88aaff;font-weight:700">20💰</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <button id="nuke-btn" style="background:rgba(255,136,0,0.2);border:2px solid #ff8800;color:#ff8800;font-size:13px;width:38px;height:38px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">💥</button>
            <span id="nuke-cost" style="font-size:8px;color:#ff8800;font-weight:700">35💰</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <button id="boost-btn" style="background:rgba(255,215,0,0.2);border:2px solid #ffd700;color:#ffd700;font-size:13px;width:38px;height:38px;border-radius:50%;cursor:pointer;font-weight:bold;opacity:0.3;pointer-events:none;line-height:1">⚡</button>
            <span id="boost-cost" style="font-size:8px;color:#ffd700;font-weight:700">25💰</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:row;align-items:center;gap:8px">
          <button id="upgrade-btn">
            <span style="font-size:12px;color:#ffd700">LV</span>
          </button>
          <button id="start-btn"></button>
        </div>
      </div>
    </div>
  <div id="overlay">
    <h1>Vibe Defence</h1>
    <h2>Path Architect</h2>
    <p style="color:#666;max-width:320px;text-align:center;font-size:14px;line-height:1.6">
      Draw the path enemies must follow.<br>
      Your towers will defend the base.
    </p>
    <button class="big-btn" id="overlay-start-btn">START GAME</button>
    <button class="secondary-btn" id="overlay-how-btn">HOW TO PLAY</button>
  </div>
  <div id="tooltip">Path not connected!</div>
  <div id="power-flash"></div>

  <script>
    // === CONSTANTS ===
    const COLS = 12;
    const ROWS = 16;
    const CELL_TYPES = { EMPTY: 0, BLOCKED: 1, SPAWN: 2, BASE: 3, TOWER: 4, PATH: 5 };
    const SPAWN_POS = { col: 0, row: 7 };
    const BASE_POS = { col: 11, row: 7 };
    const STARTING_TILE_BUDGET = 20;  // wave 1 total tiles
    const TILE_ACCUM_WAVES = 7;     // add 7 tiles each wave 1-8 (→76)
    const TILE_WAVE9_BONUS = 4;      // special: +4 at wave 9 (→80)
    const TILE_ACCUM_ENDLESS = 2;    // add 2 tiles every 10 waves in endless
    const MAX_TILE_BUDGET = 110;
    const BASE_HP = 100;
    const STARTING_CURRENCY = 100;
    const DIFFICULTY = {
      EASY: {
        enemyHpScale: 0.8,
        enemySpeedScale: 0.9,
        startHp: 120,
        startCurrency: 150,
        spawnIntervalMult: 1.3,
      },
      NORMAL: {
        enemyHpScale: 1.0,
        enemySpeedScale: 1.0,
        startHp: 100,
        startCurrency: 100,
        spawnIntervalMult: 1.0,
      },
      HARD: {
        enemyHpScale: 1.2,
        enemySpeedScale: 1.15,
        startHp: 80,
        startCurrency: 80,
        spawnIntervalMult: 0.85,
      }
    };
    let currentDifficulty = DIFFICULTY.NORMAL;
    const WAVE_BONUS = 20;
    const BASE_WAVES = 10;
    const ENDLESS_START = 11;
    const HP_COST = 15;
    const HP_RESTORE = 10;
    const POWER_FREEZE_COST = 20;
    const POWER_FREEZE_DUR = 3;
    const POWER_NUKE_COST = 35;
    const POWER_NUKE_DAMAGE = 50;
    const POWER_BOOST_COST = 25;
    const REROUTE_COST = 5;
    const POWER_BOOST_DUR = 5;
    const SPAWN_INTERVAL = 0.8;
    const WAVE_DELAY = 3;
    const PROJ_SPEED = 400;
    const TOWER_TYPES = {
      TURRET: { color: '#00ffff', range: 3, fireRate: 0.5, damage: 10 },
      CANNON: { color: '#ff8800', range: 2, fireRate: 2, damage: 40 },
      SNIPER: { color: '#ff4444', range: 6, fireRate: 3, damage: 80 },
      FROST: { color: '#4488ff', range: 2.5, fireRate: 1, damage: 5, slow: 0.5 }
    };
    const ENEMY_TYPES = {
      SCOUT: { shape: 'small', color: '#44ff44', baseHP: 30, speed: 3, reward: 5 },
      SOLDIER: { shape: 'medium', color: '#ffff44', baseHP: 80, speed: 2, reward: 10 },
      TANK: { shape: 'large', color: '#888888', baseHP: 200, speed: 1, reward: 25 },
      SPEEDSTER: { shape: 'small', color: '#ff44ff', baseHP: 20, speed: 5, reward: 8 },
      BOSS: { shape: 'large', color: '#aa44ff', baseHP: 500, speed: 0.8, reward: 100, isBoss: true }
    };
    const WAVE_DEFINITIONS = [
      [{ type: 'SCOUT', count: 5 }],
      [{ type: 'SCOUT', count: 8 }, { type: 'SOLDIER', count: 2 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }],
      [{ type: 'SOLDIER', count: 10 }, { type: 'TANK', count: 2 }],
      [{ type: 'SOLDIER', count: 8 }, { type: 'TANK', count: 3 }, { type: 'SPEEDSTER', count: 1 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 2 }],
      [{ type: 'SOLDIER', count: 10 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 5 }],
      [{ type: 'SOLDIER', count: 15 }, { type: 'TANK', count: 8 }, { type: 'SPEEDSTER', count: 8 }],
      [{ type: 'SCOUT', count: 5 }, { type: 'SOLDIER', count: 5 }, { type: 'TANK', count: 5 }, { type: 'SPEEDSTER', count: 5 }, { type: 'BOSS', count: 3 }],
      [{ type: 'SOLDIER', count: 20 }, { type: 'TANK', count: 10 }, { type: 'SPEEDSTER', count: 10 }, { type: 'BOSS', count: 5 }]
    ];

    // === STATE ===
    const GameStates = { MENU: 'MENU', PLANNING: 'PLANNING', WAVE_ACTIVE: 'WAVE_ACTIVE', PAUSED: 'PAUSED', GAME_OVER: 'GAME_OVER', VICTORY: 'VICTORY' };
    let gameState = GameStates.MENU;
    let grid = [];
    let towers = [];
    let enemies = [];
    let projectiles = [];
    let deathParticles = [];  // {x, y, vx, vy, color, size, life, maxLife}
    let hitNumbers = [];       // {x, y, text, color, life, vy}
    let pathTiles = [];
    let tileBudget = STARTING_TILE_BUDGET;  // total tiles available (accumulates)
    let currency = STARTING_CURRENCY;
    let baseHP = BASE_HP;
    let currentWave = 1;
    let waveEnemyQueue = [];
    let waveSpeedMult = 1.0;
    let spawnTimer = 0;
    let lastTime = 0;
    let pathInvalidFlash = 0;
    let selectedTower = null;
    let towerRangeTimer = 0;
    let screenShake = { x: 0, y: 0, duration: 0 };
    let tooltipTimer = 0;
    let previewTimer = 0;
    const WAVE_PREVIEW_DURATION = 2.0;

    // Boss warning effect state
    let bossWarningTimer = 0;
    let bossWarningFlash = 0;

    // High score state (persisted via localStorage)
    let bestWave = 0;
    let bestScore = 0;

    // Power-up state
    let powerFreezeTimer = 0;
    let powerBoostTimer = 0;
    let powerFreezeAvail = true;
    let powerNukeAvail = true;
    let powerBoostAvail = true;
    let powerFlashText = '';
    let powerFlashTimer = 0;

    // Input state
    let pointerDown = false;
    let pointerStart = null;
    let pointerLastCell = null;
    let longPressTimer = null;
    let lastTapCell = null;
    let lastTapTime = 0;
    const DOUBLE_TAP_DELAY = 300;
    const LONG_PRESS_DELAY = 500;

    // DOM elements
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const waveText = document.getElementById('wave-text');
    const hpText = document.getElementById('hp-text');
    const currencyText = document.getElementById('currency-text');
    const budgetText = document.getElementById('budget-text');
    const budgetFill = document.getElementById('budget-fill');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const overlay = document.getElementById('overlay');
    const overlayStartBtn = document.getElementById('overlay-start-btn');
    const overlayHowBtn = document.getElementById('overlay-how-btn');
    const tooltip = document.getElementById('tooltip');

    let cellSize = 0;
    let dpr = window.devicePixelRatio || 1;

    // === GRID ===
    function initGrid() {
      grid = [];
      for (let row = 0; row < ROWS; row++) {
        grid[row] = [];
        for (let col = 0; col < COLS; col++) {
          grid[row][col] = CELL_TYPES.EMPTY;
        }
      }
      grid[SPAWN_POS.row][SPAWN_POS.col] = CELL_TYPES.SPAWN;
      grid[BASE_POS.row][BASE_POS.col] = CELL_TYPES.BASE;
    }

    function getCellAt(col, row) {
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return grid[row][col];
    }

    function isCellOccupied(col, row) {
      const cell = getCellAt(col, row);
      return cell === CELL_TYPES.BLOCKED || cell === CELL_TYPES.SPAWN || cell === CELL_TYPES.BASE || cell === CELL_TYPES.TOWER;
    }

    // === PATH ===
    function placePathTile(col, row, duringWave = false) {
      if (tileBudget <= 0) {
        showTooltip('No path budget!');
        return false;
      }
      const cell = getCellAt(col, row);
      if (cell !== CELL_TYPES.EMPTY) {
        return false;
      }
      if (isPathTile(col, row)) {
        return false;
      }
      if (duringWave) {
        if (currency < REROUTE_COST) {
          showTooltip('Need 5💰 to reroute!');
          return false;
        }
        currency -= REROUTE_COST;
        showTooltip('REROUTE 5💰');
      }
      pathTiles.push({ col, row });
      tileBudget--;
      grid[row][col] = CELL_TYPES.PATH;
      playPlaceSound();
      if (duringWave) vibrate();
      flashTile(col, row, '#4a4a6a', 100);
      updateHUD();
      if (gameState === GameStates.PLANNING) setStartButton(true);
      return true;
    }

    function removePathTile(col, row, duringWave = false) {
      const idx = pathTiles.findIndex(t => t.col === col && t.row === row);
      if (idx === -1) return false;
      if (duringWave) {
        currency += REROUTE_COST;
      }
      pathTiles.splice(idx, 1);
      tileBudget++;
      grid[row][col] = CELL_TYPES.EMPTY;
      playRemoveSound();
      updateHUD();
      if (gameState === GameStates.PLANNING) setStartButton(pathTiles.length > 0);
      return true;
    }

    function isPathTile(col, row) {
      return pathTiles.some(t => t.col === col && t.row === row);
    }

    function isTower(col, row) {
      return towers.some(t => t.col === col && t.row === row);
    }

    function getTowerAt(col, row) {
      return towers.find(t => t.col === col && t.row === row);
    }

    function validatePath() {
      // No path drawn = enemies go straight from SPAWN to BASE (still valid)
      if (pathTiles.length === 0) return true;
      const visited = new Set();
      const queue = [{ col: SPAWN_POS.col, row: SPAWN_POS.row }];
      visited.add(`${SPAWN_POS.col},${SPAWN_POS.row}`);

      while (queue.length > 0) {
        const current = queue.shift();
        if (current.col === BASE_POS.col && current.row === BASE_POS.row) {
          return true;
        }

        const neighbors = [
          { col: current.col + 1, row: current.row },
          { col: current.col - 1, row: current.row },
          { col: current.col, row: current.row + 1 },
          { col: current.col, row: current.row - 1 }
        ];

        for (const n of neighbors) {
          const key = `${n.col},${n.row}`;
          if (visited.has(key)) continue;
          if (n.col < 0 || n.col >= COLS || n.row < 0 || n.row >= ROWS) continue;
          const cell = grid[n.row][n.col];
          if (cell === CELL_TYPES.PATH || cell === CELL_TYPES.BASE) {
            visited.add(key);
            queue.push(n);
          }
        }
      }
      return false;
    }

    function findPathDirection(col, row) {
      const idx = pathTiles.findIndex(t => t.col === col && t.row === row);
      if (idx === -1) {
        if (col === SPAWN_POS.col && row === SPAWN_POS.row) {
          if (pathTiles.length > 0) {
            return getDirection(SPAWN_POS.col, SPAWN_POS.row, pathTiles[0].col, pathTiles[0].row);
          }
          return getDirection(col, row, BASE_POS.col, BASE_POS.row);
        }
        return null;
      }

      if (idx === pathTiles.length - 1) {
        return getDirection(col, row, BASE_POS.col, BASE_POS.row);
      }

      const next = pathTiles[idx + 1];
      return getDirection(col, row, next.col, next.row);
    }

    function getDirection(fromCol, fromRow, toCol, toRow) {
      const dCol = toCol - fromCol;
      const dRow = toRow - fromRow;
      if (Math.abs(dCol) > Math.abs(dRow)) {
        return dCol > 0 ? 'right' : 'left';
      } else {
        return dRow > 0 ? 'down' : 'up';
      }
    }

    function getOrderedPath() {
      const ordered = [];
      let current = { col: SPAWN_POS.col, row: SPAWN_POS.row };
      const visited = new Set();
      visited.add(`${current.col},${current.row}`);

      for (let i = 0; i < pathTiles.length + 1; i++) {
        if (current.col === BASE_POS.col && current.row === BASE_POS.row) break;

        const neighbors = [
          { col: current.col + 1, row: current.row },
          { col: current.col - 1, row: current.row },
          { col: current.col, row: current.row + 1 },
          { col: current.col, row: current.row - 1 }
        ];

        let found = false;
        for (const n of neighbors) {
          const key = `${n.col},${n.row}`;
          if (visited.has(key)) continue;
          if (n.col < 0 || n.col >= COLS || n.row < 0 || n.row >= ROWS) continue;
          const cell = grid[n.row][n.col];
          if (cell === CELL_TYPES.PATH || cell === CELL_TYPES.BASE) {
            visited.add(key);
            ordered.push({ col: n.col, row: n.row });
            current = n;
            found = true;
            break;
          }
        }
        if (!found) break;
      }
      return ordered;
    }

    // === TOWERS ===
    function initTowers() {
      towers = [
        { type: 'TURRET', col: 3, row: 3 },
        { type: 'TURRET', col: 6, row: 5 },
        { type: 'CANNON', col: 9, row: 4 },
        { type: 'SNIPER', col: 2, row: 10 },
        { type: 'FROST', col: 8, row: 11 },
        { type: 'CANNON', col: 5, row: 13 },
        { type: 'SNIPER', col: 10, row: 9 }
      ];
      for (const t of towers) {
        const typeData = TOWER_TYPES[t.type];
        t.color = typeData.color;
        t.range = typeData.range;
        t.fireRate = typeData.fireRate;
        t.damage = typeData.damage;
        t.cooldown = 0;
        t.slow = typeData.slow || 0;
        t.angle = 0;
        t.muzzleFlash = 0;
        t.recoil = 0;
        grid[t.row][t.col] = CELL_TYPES.TOWER;
      }
    }

    function updateTowers(dt) {
      for (const tower of towers) {
        tower.cooldown = Math.max(0, tower.cooldown - dt);

        // Always track angle toward nearest enemy (for visual rotation)
        const towerX = tower.col + 0.5;
        const towerY = tower.row + 0.5;
        let nearestEnemy = null;
        let nearestDist = Infinity;
        for (const enemy of enemies) {
          const dist = Math.hypot(enemy.col + 0.5 - towerX, enemy.row + 0.5 - towerY);
          if (dist <= tower.range && dist < nearestDist) {
            nearestDist = dist;
            nearestEnemy = enemy;
          }
        }
        if (nearestEnemy) {
          tower.angle = Math.atan2(nearestEnemy.row + 0.5 - towerY, nearestEnemy.col + 0.5 - towerX);
        }

        // Decay recoil and muzzle flash
        if (tower.recoil > 0) tower.recoil = Math.max(0, tower.recoil - dt * 10);
        if (tower.muzzleFlash > 0) tower.muzzleFlash = Math.max(0, tower.muzzleFlash - dt * 20);

        if (tower.cooldown > 0) continue;

        // Boost: faster fire rate and double damage
        const boosted = powerBoostTimer > 0;
        const effectiveFireRate = boosted ? tower.fireRate * 0.5 : tower.fireRate;
        const effectiveDamage = boosted ? tower.damage * 2 : tower.damage;

        if (nearestEnemy) {
          tower.cooldown = effectiveFireRate;
          tower.muzzleFlash = 1.0;
          tower.recoil = 1.0;
          projectiles.push({
            col: tower.col + 0.5,
            row: tower.row + 0.5,
            target: nearestEnemy,
            damage: effectiveDamage,
            color: tower.color,
            slow: tower.slow,
            trail: [],
            boosted: boosted
          });
          playShootSound();
        }
      }
    }

    // === ENEMIES ===
    function spawnEnemy(type) {
      const typeData = ENEMY_TYPES[type];
      const hpScale = (1 + (currentWave - 1) * 0.15) * currentDifficulty.enemyHpScale;
      const speed = typeData.speed * waveSpeedMult * currentDifficulty.enemySpeedScale;
      enemies.push({
        type,
        col: SPAWN_POS.col,
        row: SPAWN_POS.row,
        prevCol: SPAWN_POS.col,
        prevRow: SPAWN_POS.row,
        angle: 0,
        hp: typeData.baseHP * hpScale,
        maxHP: typeData.baseHP * hpScale,
        speed: speed,
        reward: typeData.reward,
        color: typeData.color,
        shape: typeData.shape,
        isBoss: typeData.isBoss || false,
        pathIndex: 0,
        slowTimer: 0,
        deathTimer: 0,
        dying: false,
        // Trail positions for speed effect
        trail: [],
        // Boss rotation timer
        bossRotation: 0
      });
      playSpawnSound();
      if (type === 'BOSS') {
        bossWarningTimer = 1.5;
        bossWarningFlash = 1.0;
        screenShake.duration = 0.3;
        playTone(80, 0.5, 'sawtooth', 0.3);
        playTone(60, 0.8, 'sawtooth', 0.2);
      }
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];

        if (enemy.dying) {
          enemy.deathTimer += dt;
          if (enemy.deathTimer >= 0.15) {
            enemies.splice(i, 1);
          }
          continue;
        }

        // Skip movement during wave preview
        if (previewTimer > 0) continue;

        if (enemy.slowTimer > 0) {
          enemy.slowTimer -= dt;
        }

        const speedMod = (enemy.slowTimer > 0 ? 0.5 : 1) * (powerFreezeTimer > 0 ? 0 : 1);
        const moveSpeed = enemy.speed * speedMod * dt;

        let targetCol, targetRow;
        const orderedPath = getOrderedPath();

        if (orderedPath.length > 0) {
          const pathIdx = Math.floor(enemy.pathIndex);
          if (pathIdx < orderedPath.length) {
            targetCol = orderedPath[pathIdx].col;
            targetRow = orderedPath[pathIdx].row;
          } else {
            targetCol = BASE_POS.col;
            targetRow = BASE_POS.row;
          }
        } else {
          targetCol = BASE_POS.col;
          targetRow = BASE_POS.row;
        }

        const dx = targetCol - enemy.col;
        const dy = targetRow - enemy.row;
        const dist = Math.hypot(dx, dy);

        if (dist < 0.1) {
          enemy.pathIndex++;
          enemy.prevCol = enemy.col;
          enemy.prevRow = enemy.row;
          if (Math.hypot(enemy.col - BASE_POS.col, enemy.row - BASE_POS.row) < 0.2) {
            const damage = Math.ceil(enemy.maxHP * 0.1);
            baseHP -= damage;
            screenShake.duration = 0.2;
            playBaseDamageSound();
            enemies.splice(i, 1);
            if (baseHP <= 0) {
              baseHP = 0;
              gameState = GameStates.GAME_OVER;
              // Save records before showing overlay
              const finalScore = currency + (currentWave - 1) * 100;
              const wavesDone = currentWave - 1;
              if (wavesDone > bestWave) {
                bestWave = wavesDone;
                localStorage.setItem('vibe-bestWave', bestWave.toString());
              }
              if (finalScore > bestScore) {
                bestScore = finalScore;
                localStorage.setItem('vibe-bestScore', bestScore.toString());
              }
              showOverlay('GAME_OVER');
            }
            continue;
          }
        } else {
          // Track angle for facing direction
          enemy.angle = Math.atan2(dy, dx);
          enemy.prevCol = enemy.col;
          enemy.prevRow = enemy.row;
          enemy.col += (dx / dist) * moveSpeed;
          enemy.row += (dy / dist) * moveSpeed;

          // Update trail for speed effect
          enemy.trail.unshift({ col: enemy.col, row: enemy.row, angle: enemy.angle });
          const maxTrail = enemy.type === 'SPEEDSTER' ? 3 : enemy.type === 'SCOUT' ? 2 : enemy.type === 'SOLDIER' ? 1 : 0;
          if (enemy.trail.length > maxTrail) enemy.trail.pop();
        }

        // Boss rotation independent of movement
        if (enemy.isBoss) {
          enemy.bossRotation += dt * 1.5;
        }
      }
    }

    function killEnemy(enemy) {
      enemy.dying = true;
      enemy.deathTimer = 0;
      currency += enemy.reward;
      playDeathSound();
      vibrate();
      updateHUD();
      // Spawn death particles at enemy position
      const cx = (enemy.col + 0.5) * cellSize;
      const cy = (enemy.row + 0.5) * cellSize;
      const particleCount = enemy.shape === 'large' ? 12 : 8;
      for (let i = 0; i < particleCount; i++) {
        const angle = (i / particleCount) * Math.PI * 2 + Math.random() * 0.5;
        const speed = 50 + Math.random() * 80;
        deathParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          color: enemy.color,
          size: enemy.shape === 'large' ? 4 + Math.random() * 4 : 3 + Math.random() * 3,
          life: 1.0,
          maxLife: 0.5 + Math.random() * 0.3
        });
      }
    }

    // === PROJECTILES ===
    function updateProjectiles(dt) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const proj = projectiles[i];
        const target = proj.target;

        if (!enemies.includes(target) || target.dying) {
          projectiles.splice(i, 1);
          continue;
        }

        proj.trail.unshift({ col: proj.col, row: proj.row });
        if (proj.trail.length > 3) proj.trail.pop();

        const dx = (target.col + 0.5) - proj.col;
        const dy = (target.row + 0.5) - proj.row;
        const dist = Math.hypot(dx, dy);

        if (dist < 0.2) {
          target.hp -= proj.damage;
          if (proj.slow > 0) {
            target.slowTimer = 1;
          }
          // Floating damage number
          const hx = (target.col + 0.5) * cellSize;
          const hy = (target.row + 0.5) * cellSize;
          const isBoost = proj.boosted;
          hitNumbers.push({
            x: hx + (Math.random() - 0.5) * 10,
            y: hy - 5,
            text: '-' + Math.round(proj.damage),
            color: isBoost ? '#ffd700' : '#ffffff',
            life: 0.6,
            vy: -40,
            scale: isBoost ? 1.3 : 1.0
          });
          if (target.hp <= 0) {
            killEnemy(target);
          }
          projectiles.splice(i, 1);
        } else {
          const speed = PROJ_SPEED * dt / cellSize;
          proj.col += (dx / dist) * speed;
          proj.row += (dy / dist) * speed;
        }
      }
    }

    // === DEATH PARTICLES ===
    function updateDeathParticles(dt) {
      for (let i = deathParticles.length - 1; i >= 0; i--) {
        const p = deathParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        // Gravity
        p.vy += 80 * dt;
        // Slow down
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life -= dt;
        if (p.life <= 0) {
          deathParticles.splice(i, 1);
        }
      }
    }

    function drawDeathParticles() {
      for (const p of deathParticles) {
        const alpha = p.life / (p.maxLife || 1);
        const size = p.size * alpha;
        if (size <= 0) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    // === HIT NUMBERS ===
    function updateHitNumbers(dt) {
      for (let i = hitNumbers.length - 1; i >= 0; i--) {
        const h = hitNumbers[i];
        h.y += h.vy * dt;
        h.vy += 20 * dt; // slight acceleration downward
        h.life -= dt;
        if (h.life <= 0) {
          hitNumbers.splice(i, 1);
        }
      }
    }
    function drawHitNumbers() {
      for (const h of hitNumbers) {
        const alpha = Math.min(h.life * 2, 1);
        const size = Math.round(cellSize * 0.28 * h.scale);
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${size}px -apple-system, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#000';
        ctx.fillText(h.text, h.x + 1, h.y + 1);
        ctx.fillStyle = h.color;
        ctx.shadowColor = h.color;
        ctx.shadowBlur = 4;
        ctx.fillText(h.text, h.x, h.y);
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
    }
    // === WAVE SYSTEM ===
    function generateWave(n) {
      // Scale from wave 10 baseline, escalating difficulty
      const scale = 1 + (n - 10) * 0.2;  // 20% harder each endless wave
      const speedMult = 1 + (n - 10) * 0.03;  // 3% faster per wave

      // Base: wave 10 composition scaled up
      let soldiers = Math.floor(20 * scale);
      let tanks = Math.floor(10 * scale);
      let speedsters = Math.floor(10 * scale);
      let bosses = Math.floor(5 * scale);
      let scouts = n >= 15 ? Math.floor(10 * scale) : 0;

      // Every 5th endless wave gets extra bosses
      if (n % 5 === 0) bosses += Math.floor(n / 5);

      // Build queue
      const queue = [];
      for (let i = 0; i < scouts; i++) queue.push('SCOUT');
      for (let i = 0; i < soldiers; i++) queue.push('SOLDIER');
      for (let i = 0; i < tanks; i++) queue.push('TANK');
      for (let i = 0; i < speedsters; i++) queue.push('SPEEDSTER');
      for (let i = 0; i < bosses; i++) queue.push('BOSS');

      // Shuffle the queue so enemies don't clump by type
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }

      return queue;
    }

    function buildWaveQueue() {
      waveEnemyQueue = [];
      if (currentWave <= BASE_WAVES) {
        const waveDef = WAVE_DEFINITIONS[currentWave - 1];
        for (const group of waveDef) {
          for (let i = 0; i < group.count; i++) {
            waveEnemyQueue.push(group.type);
          }
        }
      } else {
        waveEnemyQueue = generateWave(currentWave);
      }
    }

    function startWave() {
      if (!validatePath()) {
        pathInvalidFlash = 0.5;
        showTooltip('Path not connected!');
        return;
      }
      // Reset power-ups for this wave
      powerFreezeAvail = true;
      powerNukeAvail = true;
      powerBoostAvail = true;
      powerFreezeTimer = 0;
      powerBoostTimer = 0;
      buildWaveQueue();
      spawnTimer = 0;
      previewTimer = WAVE_PREVIEW_DURATION;
      gameState = GameStates.WAVE_ACTIVE;
      selectedTower = null;
      towerRangeTimer = 0;
      updateUpgradeButton();
      setStartButton(false);
      updatePowerButtons();
    }

    function updateWave(dt) {
      if (gameState !== GameStates.WAVE_ACTIVE) return;

      // Wave preview — skip spawning for the first 2 seconds
      if (previewTimer > 0) {
        previewTimer -= dt;
        // Keep power-up timers ticking during preview
        if (powerFreezeTimer > 0) powerFreezeTimer -= dt;
        if (powerBoostTimer > 0) powerBoostTimer -= dt;
        if (powerFlashTimer > 0) powerFlashTimer -= dt;
        updatePowerButtons();
        return;
      }

      if (powerFreezeTimer <= 0) {
        const effectiveInterval = SPAWN_INTERVAL * currentDifficulty.spawnIntervalMult;
        spawnTimer += dt;
        if (spawnTimer >= effectiveInterval && waveEnemyQueue.length > 0) {
          spawnTimer = 0;
          spawnEnemy(waveEnemyQueue.shift());
        }
      }

      if (waveEnemyQueue.length === 0 && enemies.length === 0) {
        currentWave++;
        if (currentWave > BASE_WAVES) {
          // Endless mode — keep going
          clearPath();
          waveSpeedMult = 1 + (currentWave - 10) * 0.03;  // update speed scaling
          currency += WAVE_BONUS;
          gameState = GameStates.PLANNING;
          setStartButton(false);
          updateHUD();
          updateBuyHpButton();
          updatePowerButtons();
          playWaveCompleteSound();
        } else {
          resetPathBudget();
          currency += WAVE_BONUS;
          gameState = GameStates.PLANNING;
          setStartButton(pathTiles.length > 0);
          updateHUD();
          updateBuyHpButton();
          updatePowerButtons();
          playWaveCompleteSound();
        }
      }
    }

    // === AUDIO ===
    let audioCtx = null;
    let muted = localStorage.getItem('vibe-muted') === '1';

    function vibrate(ms = 50) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }
    function playTone(freq, duration, type = 'square', vol = 0.1) {
      if (muted) return;
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = type;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start();
        osc.stop(ctx.currentTime + duration);
      } catch (e) {}
    }
    function playPlaceSound() { playTone(440, 0.08, 'square', 0.08); }
    function playRemoveSound() { playTone(330, 0.08, 'square', 0.08); }
    function playShootSound() { playTone(880, 0.05, 'sine', 0.05); }
    function playSpawnSound() { playTone(220, 0.1, 'triangle', 0.08); }
    function playDeathSound() { playTone(150, 0.15, 'sawtooth', 0.1); }
    function playBaseDamageSound() { playTone(80, 0.3, 'sawtooth', 0.15); }
    function playWaveCompleteSound() {
      playTone(440, 0.1, 'sine', 0.1);
      setTimeout(() => playTone(554, 0.1, 'sine', 0.1), 100);
      setTimeout(() => playTone(659, 0.2, 'sine', 0.1), 200);
    }

    // === FLASH EFFECTS ===
    let flashTiles = [];
    function flashTile(col, row, color, duration) {
      flashTiles.push({ col, row, color, duration, elapsed: 0 });
    }

    // === INPUT ===
    // === INPUT (Pointer Events — unified touch/mouse, avoids iOS Safari dual-fire bug) ===
    let activeTouchId = null; // Track unique pointer to avoid iOS Safari mouse-emulation bugs

    function screenToCell(screenX, screenY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (screenX - rect.left) * scaleX;
      const y = (screenY - rect.top) * scaleY;
      const col = Math.floor(x / cellSize);
      const row = Math.floor(y / cellSize);
      console.log('[screenToCell] x:', x, 'y:', y, 'col:', col, 'row:', row);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return { col, row };
    }

    function handlePointerDown(e) {
      console.log('[pointerdown] type:', e.pointerType, 'x:', e.clientX, 'y:', e.clientY, 'gameState:', gameState);
      if (gameState !== GameStates.PLANNING && gameState !== GameStates.WAVE_ACTIVE) { console.log('[pointerdown] REJECTED: wrong state'); return; }
      e.preventDefault();

      // Reject if this is a mouse event emulated after touch (iOS Safari fix)
      if (e.pointerType === 'mouse' && activeTouchId === null) {
        // Could be real mouse or emulated — accept it
      }
      if (e.pointerType === 'touch') {
        activeTouchId = e.pointerId;
      }

      const cell = screenToCell(e.clientX, e.clientY);
      console.log('[pointerdown] cell:', cell);
      if (!cell) { console.log('[pointerdown] REJECTED: no cell'); return; }

      pointerDown = true;
      pointerStart = cell;
      pointerLastCell = cell;

      longPressTimer = setTimeout(() => {
        if (pointerDown && pointerStart && pointerStart.col === cell.col && pointerStart.row === cell.row) {
          if (isPathTile(cell.col, cell.row)) {
            console.log('[longpress] removing tile');
            removePathTile(cell.col, cell.row, inWave);
            pointerDown = false;
            pointerStart = null;
          }
        }
      }, LONG_PRESS_DELAY);
    }

    function handlePointerMove(e) {
      if (!pointerDown || (gameState !== GameStates.PLANNING && gameState !== GameStates.WAVE_ACTIVE)) return;
      // Only handle the active pointer id (ignores other fingers)
      if (e.pointerType === 'touch' && e.pointerId !== activeTouchId) return;
      e.preventDefault();

      const cell = screenToCell(e.clientX, e.clientY);
      if (!cell) return;

      if (pointerLastCell && (cell.col !== pointerLastCell.col || cell.row !== pointerLastCell.row)) {
        console.log('[pointermove] drawing from', pointerLastCell, 'to', cell);
        if (isCellEmpty(cell.col, cell.row) && !isPathTile(cell.col, cell.row)) {
          placePathTile(cell.col, cell.row, true); // duringWave = true for drag
        }
        pointerLastCell = cell;
      }
    }

    function handlePointerUp(e) {
      console.log('[pointerup] pointerDown was:', pointerDown);
      if (!pointerDown) { console.log('[pointerup] REJECTED: not down'); return; }
      // Allow pointer up during WAVE_ACTIVE for rerouting
      const inWave = gameState === GameStates.WAVE_ACTIVE;
      e.preventDefault();
      clearTimeout(longPressTimer);

      const cell = pointerStart;
      if (!cell) { pointerDown = false; pointerStart = null; pointerLastCell = null; return; }

      const moved = pointerLastCell && (
        Math.abs(pointerLastCell.col - pointerStart.col) > 1 ||
        Math.abs(pointerLastCell.row - pointerStart.row) > 1
      );

      console.log('[pointerup] cell:', cell, 'moved:', moved);

      if (!moved) {
        const now = Date.now();
        const isDoubleTap = lastTapCell &&
          lastTapCell.col === cell.col &&
          lastTapCell.row === cell.row &&
          now - lastTapTime < DOUBLE_TAP_DELAY;
        console.log('[pointerup] tap detected, isDoubleTap:', isDoubleTap, 'cellType:', getCellAt(cell.col, cell.row));

        if (isPathTile(cell.col, cell.row)) {
          console.log('[pointerup] removing path tile');
          removePathTile(cell.col, cell.row, inWave);
        } else if (getCellAt(cell.col, cell.row) === CELL_TYPES.EMPTY) {
          console.log('[pointerup] placing path tile');
          placePathTile(cell.col, cell.row, inWave);
        } else if (getCellAt(cell.col, cell.row) === CELL_TYPES.TOWER) {
          const tower = getTowerAt(cell.col, cell.row);
          selectedTower = tower;
          towerRangeTimer = 999;
          tower.upgradeFlash = 1.0;
          updateUpgradeButton();
        }

        lastTapCell = cell;
        lastTapTime = now;
      }

      pointerDown = false;
      pointerStart = null;
      activeTouchId = null;
    }

    function handlePointerCancel(e) {
      console.log('[pointercancel]');
      clearTimeout(longPressTimer);
      pointerDown = false;
      pointerStart = null;
      pointerLastCell = null;
      activeTouchId = null;
    }

    function isCellEmpty(col, row) {
      return getCellAt(col, row) === CELL_TYPES.EMPTY;
    }

    function isRerouting() {
      return gameState === GameStates.WAVE_ACTIVE;
    }

    function setupInput() {
      // Use Pointer Events API — unified touch/mouse handling, avoids iOS Safari
      // dual-fire bug where touchend is followed by spurious mousedown/mouseup
      canvas.addEventListener('pointerdown', handlePointerDown, { passive: false });
      canvas.addEventListener('pointermove', handlePointerMove, { passive: false });
      canvas.addEventListener('pointerup', handlePointerUp, { passive: false });
      canvas.addEventListener('pointercancel', handlePointerCancel, { passive: false });
      canvas.addEventListener('pointerleave', handlePointerUp, { passive: false });
      // Prevent mouse emulated events on iOS after touch
      canvas.addEventListener('mousedown', e => e.preventDefault(), { passive: false });
      // Prevent context menu and text selection
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    // === HUD ===
    let lastWaveText = '';
    let lastHpText = '';
    let lastCurrencyText = '';
    let lastBudgetText = '';

    function updateHUD() {
      const waveStr = currentWave <= BASE_WAVES
        ? `WAVE ${currentWave}/${BASE_WAVES}`
        : `WAVE ${currentWave} 🔁`;
      if (waveStr !== lastWaveText) {
        waveText.textContent = waveStr;
        lastWaveText = waveStr;
      }

      const hpPct = baseHP / BASE_HP;
      const filled = Math.round(hpPct * 10);
      const empty = 10 - filled;
      const hpStr = `HP: ${'█'.repeat(filled)}${'░'.repeat(empty)}`;
      if (hpStr !== lastHpText) {

    function startGame() {
      hideOverlay();
      gameState = GameStates.PLANNING;
      // Require at least one path tile to be placed before starting a wave
      setStartButton(pathTiles.length > 0);
      updateBuyHpButton();
      updatePowerButtons();
    }

    function clearPath() {
      // Remove all path tiles and refund their cost back to budget
      for (const tile of pathTiles) {
        grid[tile.row][tile.col] = CELL_TYPES.EMPTY;
        tileBudget++;
      }
      pathTiles = [];
      updateHUD();
      if (gameState === GameStates.PLANNING) setStartButton(false);
      playRemoveSound();
    }

    function clearPathReroute() {
      // Clear all path tiles during WAVE_ACTIVE, refunding each at REROUTE_COST
      const count = pathTiles.length;
      if (count === 0) return;
      currency += count * REROUTE_COST;
      showTooltip(`REROUTE ${count * REROUTE_COST}💰 refund!`);
      for (const tile of pathTiles) {
        grid[tile.row][tile.col] = CELL_TYPES.EMPTY;
        tileBudget++;
      }
      pathTiles = [];
      updateHUD();
      playRemoveSound();
    }

    function resetPathBudget() {
      // Tile budget progression (after each wave completes):
      // Wave 1 (start): 20 | Wave 1 complete: +7 → 27
      // Wave 2 complete: +7 → 34 | Wave 3: 41 | Wave 4: 48
      // Wave 5: 55 | Wave 6: 62 | Wave 7: 69 | Wave 8: 76
      // Wave 9 complete: +4 → 80 | Wave 10: cap 80
      // Waves 11+: +2 each → capped at 110
      if (tileBudget >= MAX_TILE_BUDGET) { updateHUD(); return; }
      if (currentWave === BASE_WAVES) {
        // Wave 10: no accumulation
      } else if (currentWave > BASE_WAVES) {
        const target = 80 + (currentWave - BASE_WAVES) * TILE_ACCUM_ENDLESS;
        tileBudget = Math.min(target, MAX_TILE_BUDGET);
      } else if (currentWave === BASE_WAVES - 1) {
        // Wave 9 complete: +4 → reaches 80
        tileBudget = Math.min(tileBudget + TILE_WAVE9_BONUS, MAX_TILE_BUDGET);
      } else {
        // Waves 1-8: +7 per completed wave
        tileBudget = Math.min(tileBudget + TILE_ACCUM_WAVES, MAX_TILE_BUDGET);
      }
      updateHUD();
    }

    function buyHP() {
      if (gameState !== GameStates.PLANNING) return;
      if (currency < HP_COST) {
        showTooltip('Not enough currency!');
        return;
      }
      if (baseHP >= BASE_HP) {
        showTooltip('HP already full!');
        return;
      }
      currency -= HP_COST;
      baseHP = Math.min(baseHP + HP_RESTORE, BASE_HP);
      updateHUD();
      updateBuyHpButton();
      playPlaceSound();
      vibrate();
    }

    function updateBuyHpButton() {
      const btn = document.getElementById('buy-hp-btn');
      if (!btn) return;
      const canAfford = currency >= HP_COST;
      const hpNotFull = baseHP < BASE_HP;
      const inPlanning = gameState === GameStates.PLANNING;
      btn.disabled = !canAfford || !hpNotFull || !inPlanning;
    }
